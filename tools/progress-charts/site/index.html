<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Body System — Kiro Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
/* Light theme mirrors Performance tab (projection-design-system.css tokens). */
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#FFFFFF;
  color:#161D26;
  display:flex;
  flex-direction:column;
}
.subnav{
  background:#FAFAFA;
  border-bottom:1px solid #E0E0E0;
  padding:0 24px;
  display:flex;
  align-items:center;
  gap:0;
  flex-shrink:0;
}
.subnav-brand{
  color:#0F1111;
  font-weight:700;
  font-size:0.92em;
  padding:12px 16px 12px 0;
  border-right:1px solid #E0E0E0;
  margin-right:4px;
  letter-spacing:1.3px;
  text-transform:uppercase;
}
.subnav-link{
  color:#6B6B6B;
  text-decoration:none;
  padding:12px 18px;
  font-size:0.94em;
  font-weight:500;
  border-bottom:2px solid transparent;
  transition:all .15s;
  cursor:pointer;
  letter-spacing:.3px;
  user-select:none;
}
.subnav-link:hover{ color:#161D26; background:rgba(0,102,204,0.06); }
.subnav-link.active{ color:#0066CC; border-bottom-color:#0066CC; }
.frame-wrap{flex:1;position:relative;min-height:0}
.frame-wrap iframe{width:100%;height:100%;border:none;display:block;background:#FFFFFF}
</style>
</head>
<body>
<div class="subnav">
  <span class="subnav-brand">Body System</span>
  <a class="subnav-link active" data-view="overview.html">Overview</a>
  <a class="subnav-link" data-view="activity.html">Agent Activity</a>
</div>
<div class="frame-wrap">
  <iframe id="bsFrame" src="overview.html"></iframe>
</div>
<script>
(function(){
  const frame = document.getElementById('bsFrame');
  const links = document.querySelectorAll('.subnav-link');
  const STORAGE_KEY = 'body_subtab_view';
  const CURRENT_VIEWS = ['overview.html', 'activity.html'];

  function setActive(view){
    links.forEach(l => l.classList.toggle('active', l.dataset.view === view));
    frame.src = view + (view.includes('?') ? '&' : '?') + 't=' + Date.now();
    try { localStorage.setItem(STORAGE_KEY, view); } catch(e){}
  }

  let initial = 'overview.html';
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (CURRENT_VIEWS.includes(saved)) initial = saved;
  } catch(e){}
  if (initial !== 'overview.html') setActive(initial);

  links.forEach(l => {
    l.addEventListener('click', (e) => {
      e.preventDefault();
      setActive(l.dataset.view);
    });
  });
})();
</script>
</body>
</html>
