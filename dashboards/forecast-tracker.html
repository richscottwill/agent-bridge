<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>PS Forecast Tracker — All Markets</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
<script src="canon-chart.js?v=2026-04-20"></script>
<link rel="preload" href="data/forecast-data.json" as="fetch" crossorigin>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e0e0e0}
.header{padding:24px 32px 16px;border-bottom:1px solid #2a2d35}
.header h1{font-size:22px;font-weight:600;color:#fff}
.header p{font-size:15px;color:#888;margin-top:4px}
.controls{display:flex;gap:12px;padding:16px 32px;border-bottom:1px solid #2a2d35;flex-wrap:wrap;align-items:center}
.controls label{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.tab-row{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;font-size:15px;cursor:pointer;background:transparent;border:1px solid #2a2d35;color:#888}
.tab.active{background:#1a3a5c;border-color:#4a9eff;color:#4a9eff}
.tab:hover{border-color:#4a9eff}
select{background:#1a1d27;border:1px solid #2a2d35;color:#e0e0e0;padding:6px 12px;border-radius:6px;font-size:15px;cursor:pointer}
select:hover{border-color:#4a9eff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:24px 32px}
.card{background:#1a1d27;border:1px solid #2a2d35;border-radius:10px;padding:20px}
.card-full{grid-column:1/-1}
.card h3{font-size:16px;font-weight:600;color:#ccc;margin-bottom:12px}
.chart-box{position:relative;height:400px}
.kpi-row{display:flex;gap:16px;padding:0 32px 16px;flex-wrap:wrap}
.kpi{background:#1a1d27;border:1px solid #2a2d35;border-radius:10px;padding:16px 20px;flex:1;min-width:140px}
.kpi .label{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.kpi .value{font-size:24px;font-weight:700;color:#fff;margin-top:4px}
.kpi .sub{font-size:14px;color:#888;margin-top:2px}
.good{color:#4ade80}.warn{color:#e0e0e0}.bad{color:#f87171}
table{width:100%;border-collapse:collapse;font-size:15px}
th{text-align:left;padding:8px 12px;border-bottom:1px solid #2a2d35;color:#888;font-weight:500;font-size:13px;text-transform:uppercase}
td{padding:8px 12px;border-bottom:1px solid #1f222b}
tr:hover{background:#1f222b}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:13px;font-weight:600}
.badge-green{background:#064e3b;color:#4ade80}
.badge-yellow{background:#2a2d35;color:#e0e0e0}
.badge-red{background:#7f1d1d;color:#f87171}
.badge-gray{background:#374151;color:#9ca3af}
.legend-row{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:14px;color:#888}
.legend-dot{width:10px;height:10px;border-radius:50%}
.legend-line{width:20px;height:2px;border-radius:1px}
.ts{font-size:13px;color:#444;text-align:right;padding:16px 32px}
/* ── TOC ── */
.toc{display:flex;gap:6px;padding:6px 32px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #2a2d35;background:#12141c}
.toc-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-right:2px}
.toc a{font-size:12px;color:#888;text-decoration:none;padding:2px 8px;border-radius:3px;transition:all .15s}
.toc a:hover{color:#93b4f5;background:rgba(30,58,138,.15)}
.toc .toc-sep{color:#333;font-size:12px}
</style>
</head>
<body>
<div class="toc">
  <span class="toc-label">Jump to</span>
  <a href="#sec-kpis">KPIs</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-chart">Chart</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-projections">Projections</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-detail">Weekly Detail</a>
</div>
<div class="header">
  <h1>📊 PS Forecast Tracker — All Markets</h1>
  <p>Weekly actuals with month-end projections • Data from ps-analytics.duckdb • <span id="dataTs" style="color:#4a9eff"></span></p>
</div>
<div class="controls">
  <div><label>Market</label><br><div class="tab-row" id="marketTabs"></div></div>
  <div style="margin-left:auto"><label>Metric</label><br>
    <div class="tab-row" id="metricTabs"></div>
  </div>
</div>
<div id="sec-kpis"></div>
<div class="kpi-row" id="kpiRow"></div>
<div class="grid">
  <div class="card card-full" id="sec-chart">
    <h3 id="chartTitle" style="display:flex;justify-content:space-between;align-items:center">
      Weekly Trend
      <span style="font-weight:400;font-size:13px">
        <button id="chartModeBtn" class="tab" style="font-size:12px;padding:3px 10px">Show calibration detail</button>
      </span>
    </h3>
    <div class="chart-box"><canvas id="mainChart"></canvas></div>
  </div>
  <div class="card card-full" id="sec-projections">
    <h3>Projections</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px" id="projGrid">
      <div><h4 style="font-size:14px;color:#6c7086;text-transform:uppercase;margin-bottom:8px">Month-End</h4><div id="monthProj"></div></div>
      <div><h4 style="font-size:14px;color:#6c7086;text-transform:uppercase;margin-bottom:8px">Quarter-End</h4><div id="quarterProj"></div></div>
      <div><h4 style="font-size:14px;color:#6c7086;text-transform:uppercase;margin-bottom:8px">Year-End</h4><div id="yearProj"></div></div>
    </div>
  </div>
  <div class="card card-full" id="sec-detail">
    <h3>Weekly Detail</h3>
    <div style="overflow-x:auto;max-height:500px;overflow-y:auto">
      <table><thead><tr>
        <th>Week</th><th style="text-align:right">Regs</th><th style="text-align:right">Pred</th><th style="text-align:right">OP2</th><th style="text-align:right">Cost</th>
        <th style="text-align:right">CPA</th><th>WoW Δ</th>
      </tr></thead><tbody id="weeklyBody"></tbody></table>
    </div>
  </div>
</div>
<div class="ts" id="genTs"></div>
<script>
let DATA = null;
fetch('data/forecast-data.json?' + Date.now())
  .then(r => r.json())
  .then(d => { DATA = d; initFromData(); })
  .catch(() => { document.body.innerHTML = '<p style="color:#f87171;padding:40px">Failed to load data/forecast-data.json — run the refresh script.</p>'; });


function initFromData() {
// Display order matches callout dashboard: WW and EU5 first, then key markets.
// Individual EU5 member markets (UK/DE/FR/IT/ES) stay selectable here because
// the Forecast Tracker is the "drill down" view; WBR Callouts hides them.
const MARKET_ORDER = ['WW','US','EU5','CA','UK','DE','FR','IT','ES','JP','MX','AU'];
const markets = MARKET_ORDER.filter(m => DATA.markets.includes(m));
let curMarket = markets[0] || 'US';
let curMetric = 'regs';
let chartMode = 'default';
let chart = null;
document.getElementById('dataTs').textContent = 'Data through: ' + (DATA.last_data_date || 'W' + DATA.max_week);

function init() {
  const tabs = document.getElementById('marketTabs');
  markets.forEach(m => {
    const b = document.createElement('button');
    b.className = 'tab' + (m === curMarket ? ' active' : '');
    b.textContent = m;
    b.onclick = () => { curMarket = m; render(); };
    tabs.appendChild(b);
  });
  const metricTabs = document.getElementById('metricTabs');
  const metricDefs = [{key:'regs',label:'Registrations'},{key:'cost',label:'Cost'},{key:'cpa',label:'CPA'}];
  metricDefs.forEach(({key, label}) => {
    const b = document.createElement('button');
    b.className = 'tab' + (key === curMetric ? ' active' : '');
    b.textContent = label;
    b.dataset.metric = key;
    b.onclick = () => { curMetric = key; render(); };
    metricTabs.appendChild(b);
  });
  document.getElementById('genTs').textContent = 'Generated: ' + new Date().toLocaleString();
  render();
}

function fmt(v, type) {
  if (v == null) return '—';
  if (type === 'cost') return '$' + Math.round(v).toLocaleString();
  if (type === 'cpa') return '$' + Number(v).toFixed(2);
  return Math.round(v).toLocaleString();
}

function render() {
  document.querySelectorAll('#marketTabs .tab').forEach((b, i) => {
    b.className = 'tab' + (markets[i] === curMarket ? ' active' : '');
  });
  document.querySelectorAll('#metricTabs .tab').forEach(b => {
    b.className = 'tab' + (b.dataset.metric === curMetric ? ' active' : '');
  });
  const weeks = DATA.weekly[curMarket] || [];
  renderKPIs(weeks);
  renderChart(weeks);
  renderTable(weeks);
  renderProjections();
}

function renderKPIs(weeks, proj) {
  const row = document.getElementById('kpiRow');
  if (!weeks.length) { row.innerHTML = '<div class="kpi"><div class="label">No Data</div></div>'; return; }
  const maxWk = DATA.max_week || 15;
  const actualWeeks = weeks.filter(w => w.wk <= maxWk && (w.regs > 0 || w.cost > 0));
  const ytd = actualWeeks.reduce((s, w) => s + (w[curMetric] || 0), 0);
  const last = actualWeeks[actualWeeks.length - 1];
  const prev = actualWeeks.length > 1 ? actualWeeks[actualWeeks.length - 2] : null;
  const wow = prev && prev[curMetric] ? ((last[curMetric] - prev[curMetric]) / prev[curMetric] * 100).toFixed(1) : null;
  const wowClass = wow > 0 ? 'good' : wow < -5 ? 'bad' : 'warn';
  // Year-end prediction from W52
  const w52 = weeks.find(w => w.wk === 52);
  const yearEndPred = w52 && w52.pred_regs ? w52.pred_regs : null;
  row.innerHTML = `
    <div class="kpi"><div class="label">YTD ${curMetric}</div><div class="value">${fmt(ytd, curMetric)}</div><div class="sub">W1–W${maxWk}</div></div>
    <div class="kpi"><div class="label">Latest Week</div><div class="value">${fmt(last[curMetric], curMetric)}</div><div class="sub">${last.week}</div></div>
    <div class="kpi"><div class="label">WoW Change</div><div class="value ${wowClass}">${wow != null ? (wow > 0 ? '+' : '') + wow + '%' : '—'}</div></div>
    ${curMetric === 'regs' && yearEndPred ? `<div class="kpi"><div class="label">Year-End Pred</div><div class="value">${fmt(yearEndPred, 'regs')}</div><div class="sub">W52 forecast</div></div>` : ''}
    ${curMetric === 'regs' && last.op2_regs ? `<div class="kpi"><div class="label">OP2 Target</div><div class="value">${fmt(last.op2_regs, 'regs')}</div><div class="sub">weekly</div></div>` : ''}
  `;
}

function renderChart(weeks) {
  // Canon chart — single source of truth across Forecast Tracker and WBR Callouts.
  // The 'weeks' param is kept for call-site compatibility but no longer used;
  // CanonChart reads directly from DATA (forecast-data.json).
  document.getElementById('chartTitle').childNodes[0].textContent =
    'Registrations & Spend — ' + curMarket + '  ';
  chart = CanonChart.render('mainChart', {
    forecastData: DATA,
    market: curMarket,
    mode: chartMode,
    chartInstance: chart,
  });
  var btn = document.getElementById('chartModeBtn');
  if (btn) {
    btn.textContent = chartMode === 'calibration' ? 'Show default view' : 'Show calibration detail';
    btn.onclick = function () {
      chartMode = chartMode === 'calibration' ? 'default' : 'calibration';
      renderChart(weeks);
    };
  }
}

function renderTable(weeks) {
  const body = document.getElementById('weeklyBody');
  const maxWk = DATA.max_week || 15;
  body.innerHTML = weeks.map((w, i) => {
    const isActual = w.regs > 0 || w.cost > 0;
    const isFuture = w.wk > maxWk;
    const prev = i > 0 ? weeks[i - 1] : null;
    const prevRegs = prev && prev.regs > 0 ? prev.regs : (prev && prev.pred_regs ? prev.pred_regs : null);
    const curRegs = isActual ? w.regs : w.pred_regs;
    const wow = prevRegs && curRegs ? ((curRegs - prevRegs) / prevRegs * 100).toFixed(1) : null;
    const wowBadge = wow != null
      ? `<span class="badge ${wow > 5 ? 'badge-green' : wow < -5 ? 'badge-red' : 'badge-yellow'}">${wow > 0 ? '+' : ''}${wow}%</span>`
      : '<span class="badge badge-gray">—</span>';
    const rowStyle = isFuture ? 'opacity:0.5' : '';
    const predLabel = isFuture ? ' <span style="color:#f97316;font-size:12px">pred</span>' : '';
    const orange = 'color:#f97316';

    // Regs column: actual or predicted
    const regsVal = isActual ? fmt(w.regs, 'regs') : (w.pred_regs ? `<span style="${orange}">${fmt(w.pred_regs, 'regs')}</span>` : '—');
    // Pred column
    const predVal = w.pred_regs ? fmt(w.pred_regs, 'regs') : '—';
    // OP2 column
    const op2Val = w.op2_regs ? fmt(w.op2_regs, 'regs') : '—';
    // Cost column: actual or predicted
    const costVal = isActual && w.cost ? fmt(w.cost, 'cost') : (w.pred_cost ? `<span style="${orange}">${fmt(w.pred_cost, 'cost')}</span>` : '—');
    // CPA column: actual or predicted
    const cpaVal = isActual && w.cpa ? fmt(w.cpa, 'cpa') : (w.pred_cpa ? `<span style="${orange}">${fmt(w.pred_cpa, 'cpa')}</span>` : '—');

    return `<tr style="${rowStyle}">
      <td>${w.week}${predLabel}</td>
      <td style="text-align:right">${regsVal}</td>
      <td style="text-align:right;color:#f97316">${predVal}</td>
      <td style="text-align:right;color:#6c7086">${op2Val}</td>
      <td style="text-align:right">${costVal}</td>
      <td style="text-align:right">${cpaVal}</td>
      <td>${wowBadge}</td>
    </tr>`;
  }).join('');
}

function renderProjections() {
  const m = curMarket;
  const months = (DATA.monthly || {})[m] || [];
  const quarters = (DATA.quarterly || {})[m] || [];
  const yearly = (DATA.yearly || {})[m] || {};

  // Current month (Apr = index 3 for 0-based, but months are Jan=0)
  const now = new Date();
  const curMonthIdx = now.getMonth(); // 0-based
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const curMonth = months.find(r => r.period === monthNames[curMonthIdx]);
  const nextMonth = months.find(r => r.period === monthNames[(curMonthIdx + 1) % 12]);
  const monthTarget = curMonth || nextMonth;

  // Current quarter
  const curQ = 'Q' + (Math.floor(curMonthIdx / 3) + 1);
  const qTarget = quarters.find(r => r.period === curQ);

  // Render month-end
  const mel = document.getElementById('monthProj');
  if (monthTarget) {
    mel.innerHTML = projTable(monthTarget.period, monthTarget);
  } else {
    mel.innerHTML = '<p style="color:#555;font-size:15px">No monthly data</p>';
  }

  // Render quarter-end
  const qel = document.getElementById('quarterProj');
  if (qTarget) {
    qel.innerHTML = projTable(qTarget.period, qTarget);
  } else {
    qel.innerHTML = '<p style="color:#555;font-size:15px">No quarterly data</p>';
  }

  // Render year-end
  const yel = document.getElementById('yearProj');
  if (yearly.pred_regs_annual) {
    yel.innerHTML = `
      <table style="font-size:15px"><tbody>
        <tr><td style="color:#888">Pred Regs</td><td style="text-align:right;font-weight:600">${fmt(yearly.pred_regs_annual, 'regs')}</td></tr>
        <tr><td style="color:#888">YTD Actual</td><td style="text-align:right">${fmt(yearly.actual_regs_ytd, 'regs')}</td></tr>
        ${yearly.actual_cost_ytd ? `<tr><td style="color:#888">YTD Spend</td><td style="text-align:right">${fmt(yearly.actual_cost_ytd, 'cost')}</td></tr>` : ''}
        ${yearly.actual_cpa_ytd ? `<tr><td style="color:#888">YTD CPA</td><td style="text-align:right">${fmt(yearly.actual_cpa_ytd, 'cpa')}</td></tr>` : ''}
        <tr><td style="color:#888">Months w/ Actuals</td><td style="text-align:right">${yearly.months_with_actuals}/12</td></tr>
      </tbody></table>`;
  } else {
    yel.innerHTML = '<p style="color:#555;font-size:15px">No yearly data</p>';
  }
}

function projTable(label, d) {
  const hasActual = d.actual_regs != null;
  return `
    <table style="font-size:15px"><tbody>
      <tr><td style="color:#888">Period</td><td style="text-align:right;font-weight:600">${label}</td></tr>
      ${hasActual ? `<tr><td style="color:#888">Actual Regs</td><td style="text-align:right">${fmt(d.actual_regs, 'regs')}</td></tr>` : ''}
      <tr><td style="color:#888">Pred Regs</td><td style="text-align:right;color:#f97316">${fmt(d.pred_regs, 'regs')}</td></tr>
      ${d.ci_lo ? `<tr><td style="color:#888">CI Low</td><td style="text-align:right;color:#6c7086">${fmt(d.ci_lo, 'regs')}</td></tr>` : ''}
      ${d.actual_cost ? `<tr><td style="color:#888">Spend</td><td style="text-align:right">${fmt(d.actual_cost, 'cost')}</td></tr>` : ''}
      ${d.actual_cpa ? `<tr><td style="color:#888">CPA</td><td style="text-align:right">${fmt(d.actual_cpa, 'cpa')}</td></tr>` : ''}
      ${hasActual && d.pred_regs ? `<tr><td style="color:#888">Error</td><td style="text-align:right;color:${Math.abs(d.actual_regs - d.pred_regs) / d.pred_regs < 0.1 ? '#4ade80' : '#e0e0e0'}">${((d.actual_regs - d.pred_regs) / d.pred_regs * 100).toFixed(1)}%</td></tr>` : ''}
    </tbody></table>`;
}

init();
}
</script>

<script src="./shared/section-freshness.js" defer></script>
</body>
</html>
