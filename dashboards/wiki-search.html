<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki Search — Kiro Dashboard</title>
<!-- Shared projection-engine design system — same tokens as the Performance tab so both
     surfaces feel like one tool. Dark-theme search chrome replaced with light tokens
     (2026-04-30). -->
<link rel="stylesheet" href="projection-design-system.css?v=2026-04-30">
<style>
/* ========================================================================
   Wiki Search — light-theme rebuild (2026-04-30)
   Mirrors Performance/Projection design language: same color tokens,
   same card shape (FAFAFA panels, E0E0E0 borders, 8px radius), same
   typography (Amazon Ember, tabular nums, 12/13/16/24/96 size scale).
   Front-page feed replaces the flat "recent" list when no query is active.
   ======================================================================== */
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  font-family:var(--font-sans);
  background:var(--color-neutral-bg);
  color:var(--color-text-body);
  font-size:var(--size-body);
  line-height:1.5;
  font-variant-numeric:tabular-nums;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  -webkit-font-smoothing:antialiased;
}

/* Search bar ── clean chrome, sits above the feed */
.search-bar{padding:var(--gap-md) var(--gap-lg) var(--gap-sm);flex-shrink:0;background:var(--color-neutral-bg);border-bottom:1px solid var(--color-panel-border)}
.search-bar h2{font-size:18px;font-weight:700;color:var(--color-text-hero);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.search-bar h2 span{font-size:13px;color:var(--color-text-subtle);font-weight:400}
.search-row{display:flex;gap:var(--gap-sm);align-items:center}
.search-input{flex:1;background:#fff;border:1px solid var(--color-panel-border);color:var(--color-text-body);padding:10px 14px;border-radius:6px;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
.search-input:focus{border-color:var(--color-brand);box-shadow:0 0 0 3px rgba(0,102,204,0.10)}
.search-input::placeholder{color:var(--color-text-subtle)}
.sort-select{background:#fff;border:1px solid var(--color-panel-border);color:var(--color-text-body);padding:7px 10px;border-radius:6px;font-size:13px;font-family:inherit;outline:none;cursor:pointer;min-width:150px;transition:border-color .15s}
.sort-select:focus,.sort-select:hover{border-color:var(--color-brand)}

/* Filter section ── compact, collapsible */
.filter-section{flex-shrink:0;border-bottom:1px solid var(--color-panel-border);display:flex;flex-direction:column;gap:0;background:var(--color-panel-bg)}
.filter-header{display:flex;align-items:center;gap:6px;padding:4px var(--gap-lg);cursor:pointer;border-bottom:1px solid var(--color-panel-border);user-select:none;transition:background .12s}
.filter-header:hover{background:rgba(0,102,204,0.05)}
.filter-header .fh-icon{font-size:10px;color:var(--color-text-subtle);transition:transform .15s}
.filter-header .fh-label{font-size:var(--size-meta);color:var(--color-text-subtle);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.filter-header .fh-active{font-size:var(--size-meta);color:var(--color-brand)}
.filter-rows{padding:6px var(--gap-lg);display:flex;flex-direction:column;gap:4px}
.filter-rows.collapsed{display:none}
.filter-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.filter-label{font-size:var(--size-meta);color:var(--color-text-subtle);text-transform:uppercase;letter-spacing:1px;min-width:55px;flex-shrink:0;font-weight:600}
.f{padding:3px 8px;border-radius:4px;font-size:var(--size-meta);cursor:pointer;background:#fff;border:1px solid var(--color-panel-border);color:var(--color-text-body);transition:all .12s;white-space:nowrap;font-family:inherit}
.f:hover{border-color:var(--color-brand);color:var(--color-brand)}
.f.on{background:var(--color-brand);border-color:var(--color-brand);color:var(--color-text-on-brand)}
.f .fc{font-size:11px;color:var(--color-text-subtle);margin-left:2px}
.f.on .fc{color:rgba(255,255,255,0.75)}
.result-count{font-size:13px;color:var(--color-text-meta);margin-left:auto;flex-shrink:0}
.main{flex:1;display:flex;min-height:0;position:relative;background:var(--color-neutral-bg)}
.results{flex:1;overflow-y:auto;padding:var(--gap-md) var(--gap-lg) var(--gap-lg)}

/* ── Result card (used when searching / filtering) ── */
.rc{background:var(--color-panel-bg);border:1px solid var(--color-panel-border);border-radius:8px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.rc:hover{border-color:var(--color-brand);box-shadow:0 1px 4px rgba(0,102,204,0.08)}
.rc-head{display:flex;align-items:flex-start;gap:8px}
.rc-title{font-size:15px;font-weight:600;color:var(--color-text-hero);flex:1;line-height:1.35}
.rc-title mark{background:rgba(0,102,204,0.15);color:var(--color-brand);border-radius:2px;padding:0 2px}
.rc-badges{display:flex;gap:3px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.b{display:inline-block;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:600;white-space:nowrap;letter-spacing:.02em}
.b-cat{background:#E8F0FA;color:var(--color-brand)}
.b-final{background:#E6F7EE;color:#0C7A3D}
.b-active{background:#E6F7EE;color:#0C7A3D}
.b-draft{background:#F3F3F3;color:var(--color-text-meta)}
.b-review{background:#FFF4D6;color:#8A6200}
.b-pending{background:#FFF4D6;color:#8A6200}
.b-mkt{background:#EEF5EA;color:#2F6B33;font-size:10px}
.b-topic{background:#F5EDE3;color:#8A5A1A;font-size:10px}
.b-tag{background:#F2EBFA;color:#6B3FA0;font-size:10px}
.b-sp-pub{background:#EEF5EA;color:#2F6B33;font-size:10px}
.b-sp-stale{background:#FFEDD6;color:#B05A00;font-size:10px}
.b-sp-local{background:#F3F3F3;color:var(--color-text-meta);font-size:10px}
.b-stale{background:#FEE2E2;color:var(--color-danger);font-size:10px}
.b-archive{background:#F3F3F3;color:var(--color-text-meta);font-size:10px}
.rc-snip{font-size:13px;color:var(--color-text-meta);line-height:1.5;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-snip mark{background:rgba(0,102,204,0.12);color:var(--color-brand);border-radius:2px;padding:0 2px}
.rc-meta{display:flex;gap:12px;margin-top:6px;font-size:12px;color:var(--color-text-subtle);flex-wrap:wrap}

/* ── Viewer (right drawer) ── */
.viewer{display:none;width:50%;max-width:720px;min-width:380px;background:var(--color-panel-bg);border-left:1px solid var(--color-panel-border);flex-direction:column;overflow:hidden}
.viewer.open{display:flex}
.viewer-head{padding:14px 18px;border-bottom:1px solid var(--color-panel-border);display:flex;align-items:flex-start;gap:8px;flex-shrink:0;background:#fff}
.viewer-title{font-size:16px;font-weight:700;color:var(--color-text-hero);flex:1;line-height:1.3}
.viewer-close{background:none;border:none;color:var(--color-text-subtle);font-size:22px;cursor:pointer;padding:2px 6px;border-radius:3px;flex-shrink:0;line-height:1}
.viewer-close:hover{color:var(--color-text-hero);background:rgba(0,0,0,0.05)}
.viewer-meta{padding:8px 18px;border-bottom:1px solid var(--color-panel-border);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;background:#fff}
.viewer-body{flex:1;overflow-y:auto;padding:18px;font-size:15px;color:var(--color-text-body);line-height:1.7;background:#fff}
.viewer-body h1{font-size:22px;font-weight:700;color:var(--color-text-hero);margin:18px 0 10px;border-bottom:1px solid var(--color-panel-border);padding-bottom:6px}
.viewer-body h2{font-size:18px;font-weight:700;color:var(--color-text-hero);margin:16px 0 8px}
.viewer-body h3{font-size:15px;font-weight:700;color:var(--color-text-body);margin:10px 0 4px}
.viewer-body p{margin:6px 0}
.viewer-body ul,.viewer-body ol{margin:6px 0 6px 20px}
.viewer-body li{margin:3px 0}
.viewer-body code{background:#F3F3F3;padding:1px 5px;border-radius:3px;font-size:13px;color:#8A3A1A;font-family:var(--font-mono)}
.viewer-body pre{background:#F8F8F8;border:1px solid var(--color-panel-border);padding:12px;border-radius:4px;overflow-x:auto;margin:8px 0;font-size:13px;line-height:1.5}
.viewer-body pre code{background:none;padding:0;color:var(--color-text-body)}
.viewer-body blockquote{border-left:3px solid var(--color-brand);padding-left:12px;color:var(--color-text-meta);margin:8px 0}
.viewer-body table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
.viewer-body th,.viewer-body td{border:1px solid var(--color-panel-border);padding:7px 10px;text-align:left}
.viewer-body th{background:var(--color-panel-bg);color:var(--color-text-meta);font-weight:600}
.viewer-body hr{border:none;border-top:1px solid var(--color-panel-border);margin:12px 0}
.viewer-body a{color:var(--color-brand);text-decoration:none}
.viewer-body a:hover{text-decoration:underline}
.viewer-body strong{color:var(--color-text-hero)}
.viewer-body em{color:var(--color-text-body)}
.viewer-loading{padding:40px;text-align:center;color:var(--color-text-subtle)}
.wiki-toc{background:var(--color-panel-bg);border:1px solid var(--color-panel-border);border-radius:6px;padding:10px 14px;margin-bottom:14px}
.wiki-toc summary{font-size:13px;font-weight:600;color:var(--color-text-meta);cursor:pointer;user-select:none;text-transform:uppercase;letter-spacing:.06em}
.wiki-toc summary:hover{color:var(--color-text-hero)}
.wiki-toc ul{list-style:none;margin:6px 0 0;padding:0}
.wiki-toc li{margin:2px 0}
.wiki-toc a{font-size:14px;color:var(--color-brand);text-decoration:none}
.wiki-toc a:hover{text-decoration:underline}
.wiki-toc .toc-h3{padding-left:14px}
.stale-banner{background:#FFF4D6;border:1px solid #F5D87A;color:#8A6200;padding:8px 12px;border-radius:6px;margin-bottom:12px;font-size:14px;display:flex;align-items:center;gap:6px}
.stale-banner .stale-icon{font-size:18px}
.backlinks{background:var(--color-panel-bg);border:1px solid var(--color-panel-border);border-radius:6px;padding:10px 14px;margin-top:16px}
.backlinks-title{font-size:12px;font-weight:700;color:var(--color-text-subtle);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.backlinks a{display:inline-block;font-size:13px;color:var(--color-brand);text-decoration:none;padding:3px 9px;background:#E8F0FA;border-radius:3px;margin:2px 3px 2px 0;cursor:pointer;transition:background .12s}
.backlinks a:hover{background:#D6E5F5}
.backlinks .bl-count{font-size:11px;color:var(--color-text-subtle);margin-left:2px}
.upload-zone{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.92);z-index:100;align-items:center;justify-content:center;flex-direction:column;backdrop-filter:blur(4px)}
.upload-zone.active{display:flex}
.upload-box{border:2px dashed var(--color-brand);border-radius:12px;padding:40px 60px;text-align:center;color:var(--color-brand);font-size:16px;pointer-events:none;background:#fff}
.upload-box .icon{font-size:42px;margin-bottom:10px;opacity:.6}
.recent-header{font-size:12px;color:var(--color-text-subtle);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--color-panel-border)}
.empty{text-align:center;padding:60px 20px;color:var(--color-text-subtle)}
.empty .icon{font-size:48px;margin-bottom:10px;opacity:.4}
.empty h3{font-size:17px;color:var(--color-text-body);margin-bottom:4px}
.empty p{font-size:14px;max-width:420px;margin:0 auto;line-height:1.5}

/* ── Stats bar (footer) ── */
.stats{display:flex;gap:14px;padding:6px var(--gap-lg);border-top:1px solid var(--color-panel-border);flex-shrink:0;background:var(--color-panel-bg);font-size:12px;color:var(--color-text-subtle);flex-wrap:wrap}
.stats .s{display:flex;align-items:center;gap:3px}
.stats .sn{color:var(--color-text-body);font-weight:600}
.results::-webkit-scrollbar,.viewer-body::-webkit-scrollbar{width:8px}
.results::-webkit-scrollbar-track,.viewer-body::-webkit-scrollbar-track{background:transparent}
.results::-webkit-scrollbar-thumb,.viewer-body::-webkit-scrollbar-thumb{background:#D0D0D0;border-radius:4px}
.results::-webkit-scrollbar-thumb:hover,.viewer-body::-webkit-scrollbar-thumb:hover{background:var(--color-brand)}
@media(max-width:800px){.viewer{width:100%!important;max-width:100%!important;position:absolute;top:0;left:0;right:0;bottom:0;z-index:10}}

/* ── Group toggle ── */
.group-toggle{background:none;border:1px solid var(--color-panel-border);color:var(--color-brand);font-size:11px;padding:2px 8px;border-radius:3px;cursor:pointer;margin-left:auto;white-space:nowrap;transition:all .12s;font-family:inherit}
.group-toggle:hover{border-color:var(--color-brand);background:#E8F0FA}
.group-children{margin-bottom:4px}
.rc-child{opacity:.85}
.rc-child:hover{opacity:1}

/* ── Group container ── */
.group-wrap{margin-bottom:10px}
.group-header{display:flex;align-items:center;gap:6px;padding:6px 12px;background:#E8F0FA;border:1px solid #CCE0F5;border-bottom:none;border-radius:8px 8px 0 0;font-size:12px;color:var(--color-brand);cursor:pointer;font-weight:600}
.group-header:hover{background:#D6E5F5}
.group-header .gh-icon{font-size:10px;opacity:.7}
.group-header .gh-count{background:rgba(0,102,204,0.15);padding:1px 7px;border-radius:3px;font-size:11px;font-weight:600}
.group-wrap>.rc:first-of-type{border-radius:0 0 8px 8px}
.group-wrap.expanded .group-header{border-radius:8px 8px 0 0;border-bottom:1px solid #CCE0F5}

/* ── Archive toggle ── */
.archive-toggle{transition:all .15s}
.archive-toggle.on{background:#FEE2E2!important;border-color:#F5A6A6!important;color:var(--color-danger)!important}

/* ── Viewer related links ── */
.viewer-related{padding:8px 18px;border-bottom:1px solid var(--color-panel-border);flex-shrink:0;max-height:120px;overflow-y:auto;background:#fff}
.viewer-related-label{font-size:11px;color:var(--color-text-subtle);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.viewer-related-links{display:flex;flex-wrap:wrap;gap:4px}
.rel-link{position:relative;display:inline-block;font-size:13px;color:var(--color-brand);text-decoration:none;padding:2px 9px;background:#F3F7FC;border:1px solid #D6E5F5;border-radius:4px;cursor:pointer;transition:all .12s;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rel-link:hover{background:#E8F0FA;border-color:var(--color-brand)}
.rel-link .rel-cat{font-size:10px;color:var(--color-text-subtle);margin-left:3px}
.rel-tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:0;width:300px;background:#fff;border:1px solid var(--color-panel-border);border-radius:6px;padding:10px 12px;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,0.12);pointer-events:none;color:var(--color-text-body)}
.rel-link:hover .rel-tooltip{display:block}
.rel-tooltip-title{font-size:13px;font-weight:600;color:var(--color-text-hero);margin-bottom:3px;white-space:normal}
.rel-tooltip-cat{font-size:11px;color:var(--color-brand);margin-bottom:4px}
.rel-tooltip-snip{font-size:12px;color:var(--color-text-meta);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:normal}

/* ── Viewer back button ── */
.viewer-back{background:#fff;border:1px solid var(--color-panel-border);color:var(--color-brand);font-size:12px;padding:3px 9px;border-radius:4px;cursor:pointer;flex-shrink:0;transition:all .12s;display:none;font-family:inherit}
.viewer-back:hover{border-color:var(--color-brand);background:#E8F0FA}
.viewer-back.has-history{display:inline-flex;align-items:center;gap:3px}

/* ── View toggle ── */
.view-toggle{display:inline-flex;background:#fff;border:1px solid var(--color-panel-border);border-radius:6px;padding:2px;gap:2px;margin-right:6px}
.view-toggle .vt{background:none;border:none;color:var(--color-text-meta);font-size:13px;padding:5px 11px;border-radius:4px;cursor:pointer;font-family:inherit;transition:all .12s}
.view-toggle .vt:hover{color:var(--color-text-hero)}
.view-toggle .vt.on{background:var(--color-brand);color:var(--color-text-on-brand)}

/* ── Pipeline view ── */
.pipeline{flex:1;display:flex;gap:10px;padding:var(--gap-md) var(--gap-lg) var(--gap-lg);overflow-x:auto;overflow-y:hidden;background:var(--color-neutral-bg)}
.pipe-col{flex:1;min-width:280px;max-width:400px;display:flex;flex-direction:column;background:var(--color-panel-bg);border:1px solid var(--color-panel-border);border-radius:8px;overflow:hidden}
.pipe-col-head{padding:10px 14px;border-bottom:1px solid var(--color-panel-border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:#fff}
.pipe-col-title{font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.pipe-col-count{background:#F3F3F3;padding:1px 8px;border-radius:10px;font-size:11px;color:var(--color-text-meta);font-weight:600}
.pipe-col-head.draft .pipe-col-title{color:var(--color-text-meta)}
.pipe-col-head.review .pipe-col-title{color:#8A6200}
.pipe-col-head.final .pipe-col-title{color:#0C7A3D}
.pipe-col-head.archived .pipe-col-title{color:var(--color-danger)}
.pipe-col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.pipe-card{background:#fff;border:1px solid var(--color-panel-border);border-radius:6px;padding:10px 12px;cursor:pointer;transition:all .12s;position:relative}
.pipe-card:hover{border-color:var(--color-brand);box-shadow:0 1px 4px rgba(0,102,204,0.08)}
.pipe-card.viewing{border-color:var(--color-brand);background:#F3F7FC}
.pipe-card-title{font-size:13px;font-weight:600;color:var(--color-text-hero);line-height:1.35;margin-bottom:4px;padding-right:44px}
.pipe-card-meta{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.pipe-card-meta .b{font-size:10px;padding:1px 5px}
.pipe-card-foot{font-size:11px;color:var(--color-text-subtle);margin-top:6px;display:flex;justify-content:space-between;gap:6px}
.pipe-actions{position:absolute;top:6px;right:6px;display:flex;gap:2px;opacity:0;transition:opacity .12s}
.pipe-card:hover .pipe-actions{opacity:1}
.pipe-act{background:#fff;border:1px solid var(--color-panel-border);color:var(--color-text-meta);font-size:11px;padding:2px 6px;border-radius:3px;cursor:pointer;font-family:inherit;transition:all .12s}
.pipe-act:hover{border-color:var(--color-brand);color:var(--color-brand);background:#E8F0FA}
.pipe-act.promote:hover{border-color:#0C7A3D;color:#0C7A3D;background:#E6F7EE}
.pipe-act.demote:hover{border-color:var(--color-danger);color:var(--color-danger);background:#FEE2E2}
.pipe-group-by{background:#fff;border:1px solid var(--color-panel-border);color:var(--color-text-body);padding:6px 10px;border-radius:4px;font-size:13px;font-family:inherit;outline:none;cursor:pointer}
.pipe-overlay-badge{display:inline-block;font-size:10px;color:var(--color-brand);margin-left:4px;background:#E8F0FA;padding:0 5px;border-radius:2px}
.pipe-group-header{font-size:11px;color:var(--color-text-subtle);text-transform:uppercase;letter-spacing:.5px;padding:4px 2px 2px;margin-top:4px;border-top:1px solid var(--color-panel-border)}
.pipe-group-header:first-child{margin-top:0;border-top:none}
.pipe-empty{text-align:center;padding:20px 10px;color:var(--color-text-subtle);font-size:12px;font-style:italic}

/* ════════════════════════════════════════════════════════════════════
   Front-page feed (no query, no filters) — SharePoint-style section grid
   ════════════════════════════════════════════════════════════════════ */
.home-feed{display:flex;flex-direction:column;gap:var(--gap-lg);padding-bottom:var(--gap-lg)}
.home-section{background:var(--color-panel-bg);border:1px solid var(--color-panel-border);border-radius:8px;padding:var(--gap-md) var(--gap-lg) var(--gap-lg)}
.home-section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:var(--gap-md);gap:var(--gap-sm)}
.home-section-title{font-size:var(--size-section);font-weight:var(--weight-section);color:var(--color-text-hero);letter-spacing:-0.01em}
.home-section-sub{font-size:var(--size-ui);color:var(--color-text-meta);font-weight:400}
.home-section-action{font-size:var(--size-ui);color:var(--color-brand);background:none;border:none;cursor:pointer;font-family:inherit;padding:2px 6px;border-radius:4px;transition:background .12s}
.home-section-action:hover{background:#E8F0FA;text-decoration:underline}

/* Hero row — two-column for This Week + Quick picks on wide screens */
.home-hero{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(0,1fr);gap:var(--gap-lg)}
@media(max-width:1100px){.home-hero{grid-template-columns:1fr}}

/* Market grid inside This Week */
.mkt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:var(--gap-sm)}
.mkt-tile{background:#fff;border:1px solid var(--color-panel-border);border-radius:6px;padding:10px 12px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:3px;min-height:72px}
.mkt-tile:hover{border-color:var(--color-brand);box-shadow:0 1px 4px rgba(0,102,204,0.08);transform:translateY(-1px)}
.mkt-tile-head{display:flex;align-items:baseline;justify-content:space-between;gap:6px}
.mkt-tile-code{font-weight:700;font-size:13px;color:var(--color-brand);letter-spacing:.02em;text-transform:uppercase}
.mkt-tile-week{font-size:11px;color:var(--color-text-subtle);font-weight:500;font-variant-numeric:tabular-nums}
.mkt-tile-title{font-size:12px;color:var(--color-text-body);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mkt-tile-age{font-size:11px;color:var(--color-text-subtle);margin-top:auto;font-variant-numeric:tabular-nums}
.mkt-tile.stale .mkt-tile-code{color:var(--color-warning)}
.mkt-tile-empty{background:#fff;border:1px dashed var(--color-panel-border);border-radius:6px;padding:10px 12px;color:var(--color-text-subtle);font-size:12px;font-style:italic}

/* Quick picks (hub docs) — list of pinned-feel cards */
.pick-list{display:flex;flex-direction:column;gap:6px}
.pick-card{background:#fff;border:1px solid var(--color-panel-border);border-radius:6px;padding:9px 12px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:3px}
.pick-card:hover{border-color:var(--color-brand);box-shadow:0 1px 4px rgba(0,102,204,0.08)}
.pick-card-title{font-size:13px;font-weight:600;color:var(--color-text-hero);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pick-card-meta{display:flex;gap:6px;font-size:11px;color:var(--color-text-subtle);flex-wrap:wrap;align-items:center}
.pick-rank{color:var(--color-brand);font-weight:700;font-variant-numeric:tabular-nums;font-size:11px}

/* Topic tiles */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:var(--gap-sm)}
.topic-tile{background:#fff;border:1px solid var(--color-panel-border);border-radius:6px;padding:12px 14px;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:space-between;gap:var(--gap-sm)}
.topic-tile:hover{border-color:var(--color-brand);background:#F3F7FC}
.topic-tile-name{font-size:14px;font-weight:600;color:var(--color-text-hero)}
.topic-tile-count{font-size:13px;font-weight:700;color:var(--color-brand);font-variant-numeric:tabular-nums;background:#E8F0FA;padding:2px 9px;border-radius:10px;min-width:30px;text-align:center}

/* Recent updates — compact card grid */
.recent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--gap-sm)}
.recent-card{background:#fff;border:1px solid var(--color-panel-border);border-radius:6px;padding:10px 12px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:4px}
.recent-card:hover{border-color:var(--color-brand);box-shadow:0 1px 4px rgba(0,102,204,0.08)}
.recent-card-title{font-size:13px;font-weight:600;color:var(--color-text-hero);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.recent-card-meta{display:flex;gap:6px;font-size:11px;color:var(--color-text-subtle);flex-wrap:wrap;align-items:center}

/* Needs attention — 3-col of counts with click-to-filter */
.attn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap-md)}
@media(max-width:800px){.attn-grid{grid-template-columns:1fr}}
.attn-card{background:#fff;border:1px solid var(--color-panel-border);border-radius:6px;padding:12px 14px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:4px;border-left:3px solid var(--color-panel-border)}
.attn-card:hover{border-color:var(--color-brand);box-shadow:0 1px 4px rgba(0,102,204,0.08)}
.attn-card.warn{border-left-color:var(--color-warning)}
.attn-card.danger{border-left-color:var(--color-danger)}
.attn-card.info{border-left-color:var(--color-brand)}
.attn-label{font-size:11px;font-weight:600;color:var(--color-text-subtle);text-transform:uppercase;letter-spacing:.06em}
.attn-value{font-size:28px;font-weight:700;color:var(--color-text-hero);font-variant-numeric:tabular-nums;line-height:1.1}
.attn-desc{font-size:12px;color:var(--color-text-meta);line-height:1.4}

/* Category grid — the SharePoint "libraries" block */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--gap-sm)}
.cat-tile{background:#fff;border:1px solid var(--color-panel-border);border-radius:6px;padding:10px 14px;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:space-between;gap:var(--gap-sm)}
.cat-tile:hover{border-color:var(--color-brand);background:#F3F7FC}
.cat-tile-name{font-size:13px;font-weight:500;color:var(--color-text-body);line-height:1.3}
.cat-tile-count{font-size:12px;font-weight:700;color:var(--color-text-meta);font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="search-bar">
  <h2>Wiki Search <span id="totalCount"></span></h2>
  <div class="search-row">
    <div class="view-toggle">
      <button class="vt on" id="vt-search" onclick="setView('search')">🔍 Search</button>
      <button class="vt" id="vt-pipeline" onclick="setView('pipeline')">📋 Pipeline</button>
    </div>
    <input type="text" class="search-input" id="searchInput" placeholder="Search by keyword, topic, market, or concept — fuzzy matching enabled" autofocus>
    <select class="pipe-group-by" id="pipeGroupBy" style="display:none" onchange="renderPipeline()">
      <option value="status">Columns: Status</option>
      <option value="category">Columns: Category</option>
      <option value="market">Columns: Market</option>
    </select>
    <button class="f archive-toggle" id="archiveToggle" onclick="toggleArchive()" style="display:none">🗑 Archived <span class="fc" id="archiveCount"></span></button>
    <select class="sort-select" id="sortSelect">
      <option value="relevance">Sort: Relevance</option>
      <option value="updated-desc">Updated (newest)</option>
      <option value="updated-asc">Updated (oldest)</option>
      <option value="words-desc">Longest first</option>
      <option value="words-asc">Shortest first</option>
      <option value="title-asc">Title A→Z</option>
      <option value="title-desc">Title Z→A</option>
    </select>
  </div>
</div>
<div class="filter-section" id="filterSection"></div>
<div class="main">
  <div class="results" id="results"></div>
  <div class="pipeline" id="pipeline" style="display:none"></div>
  <div class="viewer" id="viewer">
    <div class="viewer-head">
      <button class="viewer-back" id="viewerBack" onclick="goBack()">← Back</button>
      <div class="viewer-title" id="viewerTitle"></div>
      <button class="viewer-close" onclick="closeViewer()">&times;</button>
    </div>
    <div class="viewer-meta" id="viewerMeta"></div>
    <div class="viewer-related" id="viewerRelated" style="display:none"></div>
    <div class="viewer-body" id="viewerBody"><div class="viewer-loading">Select a document to view</div></div>
  </div>
</div>
<div class="upload-zone" id="uploadZone">
  <div class="upload-box"><div class="icon">📄</div><div>Drop markdown file to preview</div>
  <div style="font-size:13px;color:#555;margin-top:6px">File will be indexed in-memory for this session</div></div>
</div>
<div class="stats" id="statsBar"></div>
<script>
// ═══════════════════════════════════════════════════════════════
// Wiki Search v3 — 7 features: recent feed, TOC, stale banner,
// backlinks, tag taxonomy, file upload, fuzzy/semantic search
// ═══════════════════════════════════════════════════════════════

let IX=null;
const F={category:'all',status:'all',market:'all',topic:'all',sharepoint:'all'};
let currentSort='relevance';
let viewingDoc=null;
let viewHistory=[];  // navigation history stack
let uploadedDocs=[];  // in-memory uploaded docs
let showArchived=false;  // archive toggle — hidden by default
let expandedGroups=new Set();  // track which groups are expanded
let currentView='search';  // 'search' or 'pipeline'
let pipeGroupBy='status';  // status | category | market

// ── Pipeline status overlay (localStorage bump without editing frontmatter) ──
const STATUS_OVERRIDES_KEY='wiki_pipeline_status_overrides_v1';
function loadStatusOverrides(){
  try{return JSON.parse(localStorage.getItem(STATUS_OVERRIDES_KEY)||'{}')}catch(e){return{}}
}
function saveStatusOverrides(o){localStorage.setItem(STATUS_OVERRIDES_KEY,JSON.stringify(o))}
function effectiveStatus(doc){
  const o=loadStatusOverrides();
  return o[doc.id]||doc.status||'DRAFT';
}
function bumpStatus(id,direction,event){
  if(event){event.stopPropagation();event.preventDefault()}
  const allDocs=[...(IX?IX.documents:[]),...uploadedDocs];
  const doc=allDocs.find(d=>d.id===id);
  if(!doc)return;
  const order=['DRAFT','REVIEW','FINAL'];
  const cur=effectiveStatus(doc);
  const curIdx=order.indexOf(cur);
  if(curIdx<0)return;
  const next=order[curIdx+(direction==='up'?1:-1)];
  if(!next)return;
  const o=loadStatusOverrides();
  // If override matches file status, remove (clean slate)
  if(next===(doc.status||'DRAFT'))delete o[id];
  else o[id]=next;
  saveStatusOverrides(o);
  if(currentView==='pipeline')renderPipeline();else doSearch();
}
function clearStatusOverride(id,event){
  if(event){event.stopPropagation();event.preventDefault()}
  const o=loadStatusOverrides();
  delete o[id];
  saveStatusOverrides(o);
  if(currentView==='pipeline')renderPipeline();else doSearch();
}

// ── Feature 7: Synonym map for fuzzy/semantic search ──
const SYNONYMS={
  'lp':['landing page','landing pages','polaris'],
  'landing page':['lp','polaris','landing pages'],
  'landing pages':['lp','polaris','landing page'],
  'polaris':['lp','landing page','landing pages'],
  'ad copy':['creative','creatives','headline','headlines','rsa'],
  'creative':['ad copy','creatives','headline','rsa'],
  'creatives':['ad copy','creative','headline','rsa'],
  'headline':['ad copy','creative','rsa','headlines'],
  'rsa':['ad copy','creative','responsive search ad'],
  'budget':['spend','forecast','pacing','cost'],
  'spend':['budget','cost','pacing','forecast'],
  'forecast':['budget','spend','pacing','projection'],
  'pacing':['budget','spend','forecast'],
  'test':['testing','experiment','experiments','a/b test','weblab'],
  'testing':['test','experiment','experiments','a/b test','weblab'],
  'experiment':['test','testing','experiments','weblab'],
  'weblab':['test','testing','experiment'],
  'bid':['bidding','cpc','cpa','bid strategy'],
  'bidding':['bid','cpc','cpa','bid strategy'],
  'cpc':['bid','bidding','cost per click','cpa'],
  'cpa':['bid','bidding','cost per acquisition','cpc'],
  'cvr':['conversion rate','conversion','conversions'],
  'conversion':['cvr','conversion rate','conversions'],
  'nb':['new buyer','new buyers','new business','acquisition'],
  'new buyer':['nb','acquisition','new buyers'],
  'acquisition':['nb','new buyer','new buyers'],
  'aeo':['ai overview','ai overviews','zero click','zero-click'],
  'ai overview':['aeo','ai overviews','zero click'],
  'wbr':['weekly business review','callout','callouts'],
  'callout':['wbr','callouts','weekly business review'],
  'mbr':['monthly business review'],
  'oci':['one click install','one-click install'],
  'f90':['lifecycle','first 90 days'],
  'lifecycle':['f90','first 90 days'],
  'keyword':['keywords','search term','search terms','query'],
  'keywords':['keyword','search terms','queries'],
  'sitelink':['sitelinks','site link','ad extension'],
  'sitelinks':['sitelink','site links','ad extensions'],
  'roi':['return on investment','roas','efficiency'],
  'roas':['return on ad spend','roi','efficiency'],
  'reg':['registration','registrations','regs','sign up','signup'],
  'regs':['registration','registrations','reg','sign up'],
  'registration':['reg','regs','registrations','sign up','signup'],
};

// Trigram generator for fuzzy matching
function trigrams(s){
  const t=new Set();
  const p='  '+s.toLowerCase()+'  ';
  for(let i=0;i<p.length-2;i++)t.add(p.slice(i,i+3));
  return t;
}
function trigramSimilarity(a,b){
  const ta=trigrams(a),tb=trigrams(b);
  let shared=0;
  ta.forEach(t=>{if(tb.has(t))shared++});
  return shared/(ta.size+tb.size-shared);
}

// Expand query with synonyms
function expandQuery(q){
  const tokens=q.split(/\s+/).filter(t=>t.length>=2);
  const expanded=new Set(tokens);
  // Check multi-word synonyms first
  const ql=q.toLowerCase();
  for(const[key,syns]of Object.entries(SYNONYMS)){
    if(ql.includes(key)){
      syns.forEach(s=>s.split(/\s+/).forEach(w=>expanded.add(w)));
    }
  }
  // Then single-word synonyms
  tokens.forEach(tk=>{
    const syns=SYNONYMS[tk];
    if(syns)syns.forEach(s=>s.split(/\s+/).forEach(w=>expanded.add(w)));
  });
  return[...expanded];
}

// ── Load ──
fetch('data/wiki-search-index.json?'+Date.now()).then(r=>r.json()).then(data=>{
  IX=data;
  document.getElementById('totalCount').textContent=data.total_docs+' docs'+(data.total_archived?' · '+data.total_archived+' archived':'');
  buildFilters(data);
  buildStats(data);
  doSearch();
}).catch(e=>{
  console.error(e);
  document.getElementById('results').innerHTML='<div class="empty"><div class="icon">⚠️</div><h3>Index not found</h3><p>Run build-wiki-index.py</p></div>';
});

// ── Filters (with tag row) ──
function buildFilters(data){
  const sec=document.getElementById('filterSection');
  // Compute SharePoint status counts from documents
  const sp=data.sharepoint||{};
  const spRows={};
  if(sp.published!==undefined)spRows['published']=sp.published;
  if(sp.stale)spRows['stale']=sp.stale;
  if(sp.local_only!==undefined)spRows['local-only']=sp.local_only;
  const rows=[
    {key:'status',label:'Status',items:data.statuses||{},all:true},
    {key:'market',label:'Market',items:data.markets||{},all:true},
    {key:'topic',label:'Topic',items:data.topics||{},all:true},
    {key:'category',label:'Type',items:data.categories||{},all:true},
    {key:'sharepoint',label:'SharePoint',items:spRows,all:true},
  ];
  let html='<div class="filter-header" onclick="toggleFilters()"><span class="fh-icon" id="filterIcon">▾</span><span class="fh-label">Filters</span><span class="fh-active" id="filterActiveLabel"></span></div>';
  html+='<div class="filter-rows" id="filterRows">';
  html+=rows.map(r=>{
    const sorted=Object.entries(r.items).sort((a,b)=>b[1]-a[1]);
    const allBtn='<button class="f on" data-fk="'+r.key+'" data-fv="all">All</button>';
    const btns=sorted.map(([k,v])=>'<button class="f" data-fk="'+r.key+'" data-fv="'+esc(k)+'">'+esc(k)+' <span class="fc">'+v+'</span></button>').join('');
    return '<div class="filter-row"><span class="filter-label">'+r.label+'</span>'+allBtn+btns+'</div>';
  }).join('');
  html+='</div>';
  sec.innerHTML=html;
  // Restore collapsed state
  const collapsed=localStorage.getItem('wiki_filters_collapsed')==='true';
  if(collapsed){
    document.getElementById('filterRows').classList.add('collapsed');
    document.getElementById('filterIcon').textContent='▸';
  }
  // Show archive toggle in search row if archived docs exist
  const archiveCount=data.total_archived||0;
  if(archiveCount>0){
    const archBtn=document.getElementById('archiveToggle');
    if(archBtn){archBtn.style.display='';document.getElementById('archiveCount').textContent=archiveCount;}
  }
  // Ensure result count is on the last filter row
  const lastRow=sec.querySelector('.filter-row:last-child');
  if(lastRow&&!document.getElementById('resultCount')){
    lastRow.insertAdjacentHTML('beforeend','<span class="result-count" id="resultCount"></span>');
  }
  sec.addEventListener('click',e=>{
    const btn=e.target.closest('.f:not(.archive-toggle)');
    if(!btn)return;
    const fk=btn.dataset.fk,fv=btn.dataset.fv;
    if(!fk)return;
    F[fk]=fv;
    sec.querySelectorAll('.f[data-fk="'+fk+'"]').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    updateFilterActiveLabel();
    doSearch();
  });
}

function toggleArchive(){
  showArchived=!showArchived;
  const btn=document.getElementById('archiveToggle');
  if(btn)btn.classList.toggle('on',showArchived);
  doSearch();
}

function toggleFilters(){
  const rows=document.getElementById('filterRows');
  const icon=document.getElementById('filterIcon');
  if(!rows)return;
  const collapsed=rows.classList.toggle('collapsed');
  icon.textContent=collapsed?'▸':'▾';
  localStorage.setItem('wiki_filters_collapsed',collapsed);
}

function updateFilterActiveLabel(){
  const el=document.getElementById('filterActiveLabel');
  if(!el)return;
  const active=Object.entries(F).filter(([k,v])=>v!=='all').map(([k,v])=>v);
  el.textContent=active.length?'| '+active.join(' · '):'';
}

function buildStats(data){
  const bar=document.getElementById('statsBar');
  const st=data.statuses||{};
  const grpCount=data.groups?Object.keys(data.groups).length:0;
  let h='<span class="s"><span class="sn">'+data.total_docs+'</span> docs</span>';
  if(st.FINAL)h+='<span class="s"><span class="sn">'+st.FINAL+'</span> final</span>';
  if(st.DRAFT)h+='<span class="s"><span class="sn">'+st.DRAFT+'</span> draft</span>';
  if(st.REVIEW)h+='<span class="s"><span class="sn">'+st.REVIEW+'</span> review</span>';
  if(grpCount)h+='<span class="s"><span class="sn">'+grpCount+'</span> groups</span>';
  if(data.total_archived)h+='<span class="s"><span class="sn">'+data.total_archived+'</span> archived</span>';
  if(data.total_all&&data.total_all>data.total_docs)h+='<span class="s" style="color:#444"><span class="sn">'+(data.total_all-data.total_docs)+'</span> grouped</span>';
  h+='<span class="s">Updated '+new Date(data.generated).toLocaleString()+'</span>';
  h+='<span class="s" style="margin-left:auto;color:#444">/ to focus · Esc to clear · drag .md to upload</span>';
  bar.innerHTML=h;
}

// ── Sort ──
document.getElementById('sortSelect').addEventListener('change',e=>{
  currentSort=e.target.value;
  doSearch();
});

// ── Search ──
const si=document.getElementById('searchInput');
let dt=null;
si.addEventListener('input',()=>{clearTimeout(dt);dt=setTimeout(()=>{if(currentView==='pipeline')renderPipeline();else doSearch()},120)});

function doSearch(){
  if(!IX)return;
  if(currentView==='pipeline'){renderPipeline();return}
  const q=si.value.trim().toLowerCase();
  let docs=[...IX.documents,...uploadedDocs];

  // Archive filter: hide archived unless toggle is on
  if(showArchived){
    docs=docs.filter(d=>d.archived);
  } else {
    docs=docs.filter(d=>!d.archived);
  }

  // Apply filters
  if(F.category!=='all')docs=docs.filter(d=>d.category===F.category);
  if(F.status!=='all')docs=docs.filter(d=>d.status===F.status);
  if(F.market!=='all')docs=docs.filter(d=>d.markets&&d.markets.includes(F.market));
  if(F.topic!=='all')docs=docs.filter(d=>d.primary_topic===F.topic);
  if(F.sharepoint!=='all'){
    if(F.sharepoint==='published')docs=docs.filter(d=>d.published);
    else if(F.sharepoint==='stale')docs=docs.filter(d=>d.sharepoint_stale);
    else if(F.sharepoint==='local-only')docs=docs.filter(d=>!d.published&&(d.source||'').startsWith('wiki-'));
  }

  // Feature 1: SharePoint-style home feed when no query + no filters
  if(!q){
    const noFilters=F.category==='all'&&F.status==='all'&&F.market==='all'&&F.topic==='all'&&F.sharepoint==='all';
    if(noFilters&&!showArchived&&currentSort==='relevance'){
      renderHomeFeed(docs);
      updCount(docs.length);
      return;
    }
    if(currentSort==='relevance'){
      docs=[...docs].sort((a,b)=>(b.updated||'').localeCompare(a.updated||''));
    } else {
      docs=sortDocs(docs);
    }
    const grouped=applyGrouping(docs);
    render(grouped.slice(0,60),q,noFilters&&currentSort==='relevance');
    updCount(countVisible(grouped));
    return;
  }

  // Feature 7: Expand query with synonyms + fuzzy matching
  const origTokens=q.split(/\s+/).filter(t=>t.length>=2);
  const expandedTokens=expandQuery(q);
  const synOnly=expandedTokens.filter(t=>!origTokens.includes(t));

  const scored=docs.map(doc=>{
    let sc=0;
    const tl=doc.title.toLowerCase();
    const sl=doc.snippet.toLowerCase();
    const st=doc.search_text||'';

    // Exact full-query matches (highest weight)
    if(tl.includes(q))sc+=100;
    if(sl.includes(q))sc+=40;
    if(q.length>3&&st.includes(q))sc+=20;

    // Original token matches
    origTokens.forEach(tk=>{
      if(tl.includes(tk))sc+=30;
      if(doc.headings.some(h=>h.toLowerCase().includes(tk)))sc+=15;
      if(doc.tags.some(t=>t.toLowerCase().includes(tk)))sc+=20;
      if((doc.markets||[]).some(m=>m.toLowerCase()===tk))sc+=25;
      if((doc.topics||[]).some(t=>t.toLowerCase().includes(tk)))sc+=20;
      if(doc.keywords.some(k=>k.includes(tk)))sc+=8;
      if(doc.category.toLowerCase().includes(tk))sc+=5;
      if(doc.status.toLowerCase()===tk)sc+=5;
      if(sl.includes(tk))sc+=10;
      if(st.includes(tk))sc+=3;
    });

    // Synonym expansion matches (lower weight — 40% of original)
    synOnly.forEach(tk=>{
      if(tl.includes(tk))sc+=12;
      if(doc.headings.some(h=>h.toLowerCase().includes(tk)))sc+=6;
      if(doc.tags.some(t=>t.toLowerCase().includes(tk)))sc+=8;
      if((doc.topics||[]).some(t=>t.toLowerCase().includes(tk)))sc+=8;
      if(doc.keywords.some(k=>k.includes(tk)))sc+=3;
      if(sl.includes(tk))sc+=4;
      if(st.includes(tk))sc+=1;
    });

    // Trigram fuzzy matching on title (catches typos + partial matches)
    if(q.length>=4){
      const sim=trigramSimilarity(q,doc.title.toLowerCase());
      if(sim>0.15)sc+=Math.round(sim*50);
    }

    // Boosts
    if(doc.status==='FINAL')sc*=1.15;
    if(doc.updated){
      const age=(Date.now()-new Date(doc.updated).getTime())/(864e5);
      if(age<7)sc*=1.2;else if(age<30)sc*=1.1;
    }
    return{doc,score:sc};
  });

  let results=scored.filter(s=>s.score>0);
  if(currentSort==='relevance'){
    results.sort((a,b)=>b.score-a.score);
  } else {
    results=sortDocs(results.map(s=>s.doc)).map(d=>({doc:d,score:0}));
  }
  const final=results.map(s=>s.doc);
  const grouped=applyGrouping(final);
  updCount(countVisible(grouped));
  render(grouped.slice(0,80),q,false);
}

// ── SharePoint-style home feed (no query, no filters) ──
function renderHomeFeed(allDocs){
  const c=document.getElementById('results');
  const today=new Date();
  const daysAgo=(d)=>d?Math.floor((today-new Date(d))/864e5):999;
  const ageLabel=(d)=>{
    if(!d)return '';
    const n=daysAgo(d);
    if(n===0)return 'today';
    if(n===1)return '1 day ago';
    if(n<7)return n+' days ago';
    if(n<30)return Math.floor(n/7)+'w ago';
    if(n<365)return Math.floor(n/30)+'mo ago';
    return Math.floor(n/365)+'y ago';
  };

  // ── Section 1: This week — latest callout per market ──
  const wantedMarkets=['US','AU','MX','CA','JP','EU5','WW'];

  const latestByMkt={};
  callouts.forEach(d=>{
    (d.markets||[]).forEach(m=>{
      if(!wantedMarkets.includes(m))return;
      const cur=latestByMkt[m];
      if(!cur||(d.updated||'')>(cur.updated||''))latestByMkt[m]=d;

  const mktTiles=wantedMarkets.map(m=>{
    const d=latestByMkt[m];

    const stale=age>10?' stale':'';

    return '<div class="mkt-tile'+stale+'" onclick="openDoc(\''+d.id+'\')">'+
      '<div class="mkt-tile-head"><span class="mkt-tile-code">'+m+'</span>'+
      '<span class="mkt-tile-week">'+(age>10?'⚠ ':'')+ageLabel(d.updated)+'</span></div>'+

  const thisWeekSection=

      '</div>'+
      '<div class="mkt-grid">'+mktTiles+'</div>'+

  // ── Section 2: Quick picks — hub docs (most incoming links, FINAL+ACTIVE only) ──
  const incoming={};

  const idToDoc={};

  // ── Section 5: Needs attention ──
  const staleFinal=allDocs.filter(d=>d.status==='FINAL'&&d.updated&&daysAgo(d.updated)>90&&d.category!=='WBR Callout').length;
  const inReview=allDocs.filter(d=>d.status==='REVIEW').length;

  const spLocalOnly=allDocs.filter(d=>(d.source||'').startsWith('wiki-')&&d.source!=='wiki-reviews'&&d.source!=='wiki-meta'&&!d.published).length;
  const attnCards=[
    {cls:'warn',label:'Stale FINAL docs',value:staleFinal,desc:'FINAL status, last updated >90 days ago',action:()=>{setSortAndGo('updated-asc');applyStatusFilter('FINAL')}},
    {cls:'info',label:'In review',value:inReview,desc:'REVIEW status, awaiting publication or edits',action:()=>applyStatusFilter('REVIEW')},
    {cls:'warn',label:'Local only, not on SharePoint',value:spLocalOnly,desc:'Ready to publish — not yet mirrored to SP',action:()=>applySpFilter('local-only')},
  ];
  if(spStale){
    attnCards.push({cls:'danger',label:'SharePoint behind local',value:spStale,desc:'Local copy newer than SharePoint',action:()=>applySpFilter('stale')});
  }
  window._attnActions=attnCards.map(a=>a.action);
  const attnSection=

        attnCards.map((a,i)=>

  // ── Section 6: Categories (SharePoint "libraries" block) ──
  const catCounts={};
  allDocs.forEach(d=>{catCounts[d.category]=(catCounts[d.category]||0)+1});
  const catTiles=Object.entries(catCounts)
    .sort((a,b)=>b[1]-a[1])

      '<div class="cat-tile" onclick="applyCategoryFilter(\''+esc(cat).replace(/'/g,'\\\'')+'\')">'+

// ── Grouping: collapse iterations and callout series ──
function applyGrouping(docs){
  // When searching or archive mode, don't group — show flat
  const q=si.value.trim();
  if(q||showArchived)return docs.map(d=>({doc:d,children:[]}));

  const seen=new Set();
  const result=[];
  // Build group map from visible docs
  const groupMap={};
  docs.forEach(d=>{
    const gk=d.group_key;
    if(gk){
      if(!groupMap[gk])groupMap[gk]=[];
      groupMap[gk].push(d);
    }
  });
  docs.forEach(d=>{
    if(seen.has(d.id))return;
    const gk=d.group_key;
    if(gk&&groupMap[gk]&&groupMap[gk].length>1){
      // This doc is part of a group
      const members=groupMap[gk];
      const latest=members.find(m=>m.group_role==='latest')||members[0];
      if(seen.has(latest.id))return;
      // Mark all as seen
      members.forEach(m=>seen.add(m.id));
      const children=members.filter(m=>m.id!==latest.id);
      result.push({doc:latest,children});
    } else {
      seen.add(d.id);
      result.push({doc:d,children:[]});
    }
  });
  return result;
}

function countVisible(grouped){
  // Count unique visible items (groups count as 1)
  return grouped.length;
}

function toggleGroup(gk){
  if(expandedGroups.has(gk))expandedGroups.delete(gk);
  else expandedGroups.add(gk);
  doSearch();
}

function sortDocs(docs){
  const s=currentSort;
  if(s==='relevance')return docs;
  const arr=[...docs];
  if(s==='updated-desc')arr.sort((a,b)=>(b.updated||'').localeCompare(a.updated||''));
  if(s==='updated-asc')arr.sort((a,b)=>(a.updated||'').localeCompare(b.updated||''));
  if(s==='words-desc')arr.sort((a,b)=>(b.word_count||0)-(a.word_count||0));
  if(s==='words-asc')arr.sort((a,b)=>(a.word_count||0)-(b.word_count||0));
  if(s==='title-asc')arr.sort((a,b)=>a.title.localeCompare(b.title));
  if(s==='title-desc')arr.sort((a,b)=>b.title.localeCompare(a.title));
  return arr;
}

function updCount(n){
  const el=document.getElementById('resultCount');
  if(el)el.textContent=n+' result'+(n!==1?'s':'');
}

// ── Render ──
function render(items,q,isRecentFeed){
  const c=document.getElementById('results');
  if(!items.length){
    c.innerHTML=q
      ?'<div class="empty"><div class="icon">🔍</div><h3>No results for "'+esc(q)+'"</h3><p>Try different keywords or broaden filters. Synonyms are checked automatically.</p></div>'
      :showArchived
        ?'<div class="empty"><div class="icon">🗑️</div><h3>No archived documents</h3><p>Archived docs appear here when the archive toggle is on.</p></div>'
        :'<div class="empty"><div class="icon">📚</div><h3>No documents match these filters</h3><p>Adjust filters above or clear search.</p></div>';
    return;
  }
  const tokens=q?q.split(/\s+/).filter(t=>t.length>=2):[];
  let html='';
  // Feature 1: Recent changes header
  if(isRecentFeed)html+='<div class="recent-header">📝 Recently Updated</div>';
  if(showArchived)html+='<div class="recent-header">🗑️ Archived Documents</div>';
  html+=items.map(item=>{
    const doc=item.doc||item;
    const children=item.children||[];
    if(children.length>0){
      // Wrap in group container with header
      const isExpanded=expandedGroups.has(doc.group_key);
      const gk=esc(doc.group_key||'');
      let h='<div class="group-wrap'+(isExpanded?' expanded':'')+'">';
      h+='<div class="group-header" onclick="toggleGroup(\''+gk+'\')">';
      h+='<span class="gh-icon">'+(isExpanded?'▾':'▸')+'</span>';
      h+='<span>'+esc(doc.title)+'</span>';
      h+='<span class="gh-count">'+(children.length+1)+' versions</span>';
      h+='</div>';
      h+=renderDocCard(doc,tokens,0);
      if(isExpanded){
        h+='<div class="group-children">';
        children.forEach(child=>{h+=renderDocCard(child,tokens,0,true)});
        h+='</div>';
      }
      h+='</div>';
      return h;
    }
    return renderDocCard(doc,tokens,0);
  }).join('');
  c.innerHTML=html;
}

function setView(v){
  currentView=v;
  document.getElementById('vt-search').classList.toggle('on',v==='search');
  document.getElementById('vt-pipeline').classList.toggle('on',v==='pipeline');
  document.getElementById('results').style.display=v==='search'?'':'none';
  document.getElementById('pipeline').style.display=v==='pipeline'?'flex':'none';
  document.getElementById('pipeGroupBy').style.display=v==='pipeline'?'':'none';
  document.getElementById('sortSelect').style.display=v==='pipeline'?'none':'';
  si.placeholder=v==='pipeline'?'Filter pipeline by keyword…':'Search by keyword, topic, market, or concept — fuzzy matching enabled';
  if(v==='pipeline')renderPipeline();else doSearch();
}

function renderPipeline(){
  if(!IX)return;
  pipeGroupBy=document.getElementById('pipeGroupBy').value||'status';
  const q=si.value.trim().toLowerCase();
  let docs=[...IX.documents,...uploadedDocs];
  // Archive filter
  docs=docs.filter(d=>showArchived?d.archived:!d.archived);
  // Apply sidebar filters
  if(F.category!=='all')docs=docs.filter(d=>d.category===F.category);
  if(F.status!=='all')docs=docs.filter(d=>effectiveStatus(d)===F.status);
  if(F.market!=='all')docs=docs.filter(d=>d.markets&&d.markets.includes(F.market));
  if(F.topic!=='all')docs=docs.filter(d=>d.primary_topic===F.topic);
  if(F.sharepoint!=='all'){
    if(F.sharepoint==='published')docs=docs.filter(d=>d.published);
    else if(F.sharepoint==='stale')docs=docs.filter(d=>d.sharepoint_stale);
    else if(F.sharepoint==='local-only')docs=docs.filter(d=>!d.published&&(d.source||'').startsWith('wiki-'));
  }
  // Keyword filter
  if(q){
    docs=docs.filter(d=>
      d.title.toLowerCase().includes(q)||
      d.snippet.toLowerCase().includes(q)||
      (d.search_text||'').includes(q)||
      (d.markets||[]).some(m=>m.toLowerCase().includes(q))||
      (d.topics||[]).some(t=>t.toLowerCase().includes(q))
    );
  }
  // Collapse group versions — pipeline shows latest only
  const seen=new Set();
  const groupMap={};
  docs.forEach(d=>{if(d.group_key){if(!groupMap[d.group_key])groupMap[d.group_key]=[];groupMap[d.group_key].push(d)}});
  const filtered=[];
  docs.forEach(d=>{
    if(seen.has(d.id))return;
    if(d.group_key&&groupMap[d.group_key]&&groupMap[d.group_key].length>1){
      const members=groupMap[d.group_key];
      const latest=members.find(m=>m.group_role==='latest')||members[0];
      members.forEach(m=>seen.add(m.id));
      if(!seen.has(latest.id+'_added')){filtered.push(latest);seen.add(latest.id+'_added')}
    } else {
      seen.add(d.id);
      filtered.push(d);
    }
  });

  // Build columns based on pipeGroupBy
  const cols={};
  const colOrder=[];
  const colClass={};
  if(pipeGroupBy==='status'){
    colOrder.push('DRAFT','REVIEW','FINAL');
    cols.DRAFT=[];cols.REVIEW=[];cols.FINAL=[];
    colClass.DRAFT='draft';colClass.REVIEW='review';colClass.FINAL='final';
    filtered.forEach(d=>{
      const s=effectiveStatus(d);
      if(cols[s])cols[s].push(d);
      else{
        if(!cols._other){cols._other=[];colOrder.push('_other');colClass._other='draft'}
        cols._other.push(d);
      }
    });
  } else if(pipeGroupBy==='category'){
    filtered.forEach(d=>{
      const c=d.category||'Uncategorized';
      if(!cols[c]){cols[c]=[];colOrder.push(c);colClass[c]='draft'}
      cols[c].push(d);
    });
    colOrder.sort((a,b)=>cols[b].length-cols[a].length);
  } else if(pipeGroupBy==='market'){
    filtered.forEach(d=>{
      const mkts=(d.markets&&d.markets.length)?d.markets:['No market'];
      mkts.forEach(m=>{
        if(!cols[m]){cols[m]=[];colOrder.push(m);colClass[m]='draft'}
        cols[m].push(d);
      });
    });
    colOrder.sort((a,b)=>cols[b].length-cols[a].length);
  }

  // Sort within columns: newest updated first
  Object.keys(cols).forEach(k=>cols[k].sort((a,b)=>(b.updated||'').localeCompare(a.updated||'')));

  // Render
  const container=document.getElementById('pipeline');
  const labels={DRAFT:'Draft',REVIEW:'Review',FINAL:'Final',ACTIVE:'Active',_other:'Other'};
  const html=colOrder.map(colKey=>{
    const label=labels[colKey]||colKey;
    const cls=colClass[colKey]||'draft';
    const items=cols[colKey];
    const cards=items.length
      ?items.map(d=>renderPipeCard(d,colKey)).join('')
      :'<div class="pipe-empty">No items</div>';
    return '<div class="pipe-col">'+
      '<div class="pipe-col-head '+cls+'"><span class="pipe-col-title">'+esc(label)+'</span><span class="pipe-col-count">'+items.length+'</span></div>'+
      '<div class="pipe-col-body">'+cards+'</div></div>';
  }).join('');
  container.innerHTML=html||'<div class="empty" style="margin:auto"><div class="icon">📋</div><h3>No articles match these filters</h3><p>Clear filters or switch to Search view.</p></div>';
  // Update count
  updCount(filtered.length);
}

function renderPipeCard(doc,colKey){
  const overrides=loadStatusOverrides();
  const isOverride=!!overrides[doc.id];
  const effStatus=effectiveStatus(doc);
  const isViewing=viewingDoc===doc.id;
  const mkts=(doc.markets||[]).slice(0,3).map(m=>'<span class="b b-mkt">'+m+'</span>').join('');
  const tops=(doc.topics||[]).slice(0,2).map(t=>'<span class="b b-topic">'+esc(t)+'</span>').join('');
  // Status transition actions
  const order=['DRAFT','REVIEW','FINAL'];
  const idx=order.indexOf(effStatus);
  let actions='';
  if(idx>0)actions+='<button class="pipe-act demote" onclick="bumpStatus(\''+doc.id+'\',\'down\',event)" title="Demote to '+order[idx-1]+'">←</button>';
  if(idx>=0&&idx<order.length-1)actions+='<button class="pipe-act promote" onclick="bumpStatus(\''+doc.id+'\',\'up\',event)" title="Promote to '+order[idx+1]+'">→</button>';
  if(isOverride)actions+='<button class="pipe-act" onclick="clearStatusOverride(\''+doc.id+'\',event)" title="Reset to frontmatter status ('+(doc.status||'DRAFT')+')">✕</button>';
  // Age
  let age='';
  if(doc.updated){
    const days=Math.floor((Date.now()-new Date(doc.updated).getTime())/(864e5));
    age=days===0?'today':days<30?days+'d':Math.floor(days/30)+'mo';
  }
  return '<div class="pipe-card'+(isViewing?' viewing':'')+'" onclick="openDoc(\''+doc.id+'\')">'+
    (actions?'<div class="pipe-actions">'+actions+'</div>':'')+
    '<div class="pipe-card-title">'+esc(doc.title)+(isOverride?'<span class="pipe-overlay-badge">override</span>':'')+'</div>'+
    '<div class="pipe-card-meta">'+
      '<span class="b b-cat">'+esc(doc.category||'—')+'</span>'+
      mkts+tops+
    '</div>'+
    '<div class="pipe-card-foot">'+
      '<span>'+(doc.word_count?doc.word_count.toLocaleString()+' words':'—')+'</span>'+
      '<span>'+age+'</span>'+
    '</div></div>';
}

function renderDocCard(doc,tokens,childCount,isChild){
  const title=tokens.length?hl(doc.title,tokens):esc(doc.title);
  const snip=tokens.length?hl(doc.snippet,tokens):esc(doc.snippet);
  const sc=doc.status==='FINAL'?'b-final':doc.status==='ACTIVE'?'b-active':doc.status==='REVIEW'?'b-review':doc.status==='PENDING'?'b-pending':'b-draft';
  const mkts=(doc.markets||[]).slice(0,4).map(m=>'<span class="b b-mkt">'+m+'</span>').join('');
  const tops=(doc.topics||[]).slice(0,3).map(t=>'<span class="b b-topic">'+esc(t)+'</span>').join('');
  const tgs=(doc.tags||[]).slice(0,2).map(t=>'<span class="b b-tag">'+esc(t)+'</span>').join('');
  const isViewing=viewingDoc===doc.id;
  // Stale indicator on card
  let staleTag='';
  if(doc.updated){
    const age=(Date.now()-new Date(doc.updated).getTime())/(864e5);
    if(age>90)staleTag='<span class="b b-stale">⚠ stale</span>';
  }
  // Archive badge
  const archiveBadge=doc.archived?'<span class="b b-archive">archived</span>':'';
  // SharePoint badge (only for wiki articles that could be published)
  let spBadge='';
  if((doc.source||'').startsWith('wiki-')&&doc.source!=='wiki-reviews'&&doc.source!=='wiki-meta'){
    if(doc.sharepoint_stale)spBadge='<span class="b b-sp-stale" title="SharePoint copy is older than local">📤 stale</span>';
    else if(doc.published)spBadge='<span class="b b-sp-pub" title="Published to SharePoint">📤 SP</span>';
    else spBadge='<span class="b b-sp-local" title="Local only — not on SharePoint">📄 local</span>';
  }
  const childCls=isChild?' rc-child':'';
  return '<div class="rc'+childCls+'" style="'+(isViewing?'border-color:var(--color-brand);background:#F3F7FC':'')+(isChild?';margin-left:18px;border-left:2px solid #CCE0F5':'')+'" onclick="openDoc(\''+doc.id+'\')">'+
    '<div class="rc-head"><div class="rc-title">'+title+'</div>'+
    '<div class="rc-badges">'+(doc.status?'<span class="b '+sc+'">'+doc.status+'</span>':'')+spBadge+'<span class="b b-cat">'+esc(doc.category)+'</span>'+mkts+tops+tgs+staleTag+archiveBadge+'</div></div>'+
    '<div class="rc-snip">'+snip+'</div>'+
    '<div class="rc-meta">'+
      (doc.word_count?'<span>'+doc.word_count.toLocaleString()+' words</span>':'')+
      (doc.updated?'<span>'+doc.updated+'</span>':'')+
      (doc.audience?'<span>'+esc(doc.audience)+'</span>':'')+
      (doc.doc_type?'<span>'+esc(doc.doc_type)+'</span>':'')+
      ((doc.related_docs||[]).length?'<span style="color:var(--color-brand)">🔗 '+doc.related_docs.length+' related</span>':'')+
    '</div></div>';
}

// ── Document viewer ──
function openDoc(id,fromLink){
  // Push to history if navigating from a link (not from result list)
  if(fromLink&&viewingDoc&&viewingDoc!==id){
    viewHistory.push(viewingDoc);
  } else if(!fromLink){
    viewHistory=[];  // clicking from result list resets history
  }
  viewingDoc=id;
  updateBackButton();
  const allDocs=[...(IX?IX.documents:[]),...uploadedDocs];
  const doc=allDocs.find(d=>d.id===id);
  if(!doc)return;
  const v=document.getElementById('viewer');
  v.classList.add('open');
  document.getElementById('viewerTitle').textContent=doc.title;
  const sc=doc.status==='FINAL'?'b-final':doc.status==='ACTIVE'?'b-active':doc.status==='REVIEW'?'b-review':doc.status==='PENDING'?'b-pending':'b-draft';
  const mkts=(doc.markets||[]).map(m=>'<span class="b b-mkt">'+m+'</span>').join('');
  const tops=(doc.topics||[]).map(t=>'<span class="b b-topic">'+esc(t)+'</span>').join('');
  const tags=(doc.tags||[]).map(t=>'<span class="b b-tag" style="cursor:pointer" onclick="event.stopPropagation();F.tag=\''+esc(t)+'\';refreshTagFilter(\''+esc(t)+'\');doSearch()">'+esc(t)+'</span>').join('');
  document.getElementById('viewerMeta').innerHTML=
    (doc.status?'<span class="b '+sc+'">'+doc.status+'</span>':'')+
    '<span class="b b-cat">'+esc(doc.category)+'</span>'+
    mkts+tops+tags+
    (doc.word_count?'<span class="b b-draft">'+doc.word_count.toLocaleString()+' words</span>':'')+
    (doc.updated?'<span class="b b-draft">'+doc.updated+'</span>':'');

  const body=document.getElementById('viewerBody');
  body.innerHTML='<div class="viewer-loading">Loading document…</div>';

  // Render related links
  renderRelatedLinks(doc);

  // Check if uploaded doc (has inline body)
  if(doc._body){
    renderViewerBody(body,doc,doc._body);
    doSearch();
    return;
  }

  fetch('data/wiki-docs/'+id+'.txt?'+Date.now())
    .then(r=>{if(!r.ok)throw new Error('Not found');return r.text()})
    .then(md=>renderViewerBody(body,doc,md))
    .catch(()=>{body.innerHTML='<div class="viewer-loading">Could not load document body.<br>Snippet:<br><br>'+esc(doc.snippet)+'</div>'});
  doSearch();
}

function renderViewerBody(body,doc,md){
  let html='';

  // Feature 3: Stale banner
  if(doc.updated){
    const age=Math.floor((Date.now()-new Date(doc.updated).getTime())/(864e5));
    if(age>90){
      html+='<div class="stale-banner"><span class="stale-icon">⚠️</span> Last updated '+age+' days ago — this document may need verification</div>';
    }
  }

  // Render markdown
  const rendered=renderMarkdown(md);

  // Feature 2: Auto-TOC
  const tmp=document.createElement('div');
  tmp.innerHTML=rendered;
  const headers=tmp.querySelectorAll('h1,h2,h3');
  if(headers.length>2){
    html+='<details class="wiki-toc" open><summary>Contents ('+headers.length+')</summary><ul>';
    headers.forEach((hdr,i)=>{
      hdr.id='toc-'+i;
      const cls=hdr.tagName==='H3'?' class="toc-h3"':'';
      html+='<li'+cls+'><a href="#toc-'+i+'" onclick="event.preventDefault();document.getElementById(\'toc-'+i+'\').scrollIntoView({behavior:\'smooth\'})">'+hdr.textContent+'</a></li>';
    });
    html+='</ul></details>';
  }

  html+=tmp.innerHTML;

  // Feature 4: Backlinks / related docs (bottom of viewer — links to related)
  const rels=doc.related_docs||[];
  if(rels.length>0){
    html+='<div class="backlinks"><div class="backlinks-title">🔗 Related Pages</div>';
    rels.forEach(r=>{
      html+='<a onclick="event.preventDefault();openDoc(\''+r.id+'\',true)">'+esc(r.title)+'<span class="bl-count">'+r.shared+'</span></a>';
    });
    html+='</div>';
  }

  body.innerHTML=html;
}

function refreshTagFilter(tag){
  const sec=document.getElementById('filterSection');
  const btns=sec.querySelectorAll('.f[data-fk="tag"]');
  btns.forEach(b=>{b.classList.toggle('on',b.dataset.fv===tag)});
}

function renderRelatedLinks(doc){
  const container=document.getElementById('viewerRelated');
  const rels=doc.related_docs||[];
  if(!rels.length){container.style.display='none';return}
  container.style.display='block';
  let html='<div class="viewer-related-label">🔗 Related ('+rels.length+')</div><div class="viewer-related-links">';
  rels.forEach(r=>{
    html+='<a class="rel-link" onclick="event.preventDefault();openDoc(\''+r.id+'\',true)">'+
      esc(r.title)+
      '<span class="rel-cat">'+esc(r.category||'')+'</span>'+
      '<div class="rel-tooltip">'+
        '<div class="rel-tooltip-title">'+esc(r.title)+'</div>'+
        '<div class="rel-tooltip-cat">'+esc(r.category||'')+'</div>'+
        '<div class="rel-tooltip-snip">'+esc(r.snippet||'')+'</div>'+
      '</div>'+
    '</a>';
  });
  html+='</div>';
  container.innerHTML=html;
}

function goBack(){
  if(!viewHistory.length)return;
  const prevId=viewHistory.pop();
  viewingDoc=prevId;
  updateBackButton();
  // Re-open without pushing to history
  const allDocs=[...(IX?IX.documents:[]),...uploadedDocs];
  const doc=allDocs.find(d=>d.id===prevId);
  if(!doc)return;
  const v=document.getElementById('viewer');
  v.classList.add('open');
  document.getElementById('viewerTitle').textContent=doc.title;
  const sc=doc.status==='FINAL'?'b-final':doc.status==='ACTIVE'?'b-active':doc.status==='REVIEW'?'b-review':doc.status==='PENDING'?'b-pending':'b-draft';
  const mkts=(doc.markets||[]).map(m=>'<span class="b b-mkt">'+m+'</span>').join('');
  const tops=(doc.topics||[]).map(t=>'<span class="b b-topic">'+esc(t)+'</span>').join('');
  const tags=(doc.tags||[]).map(t=>'<span class="b b-tag">'+esc(t)+'</span>').join('');
  document.getElementById('viewerMeta').innerHTML=
    (doc.status?'<span class="b '+sc+'">'+doc.status+'</span>':'')+
    '<span class="b b-cat">'+esc(doc.category)+'</span>'+mkts+tops+tags+
    (doc.word_count?'<span class="b b-draft">'+doc.word_count.toLocaleString()+' words</span>':'')+
    (doc.updated?'<span class="b b-draft">'+doc.updated+'</span>':'');
  renderRelatedLinks(doc);
  const body=document.getElementById('viewerBody');
  body.innerHTML='<div class="viewer-loading">Loading…</div>';
  if(doc._body){renderViewerBody(body,doc,doc._body);doSearch();return}
  fetch('data/wiki-docs/'+prevId+'.txt?'+Date.now())
    .then(r=>{if(!r.ok)throw new Error('Not found');return r.text()})
    .then(md=>renderViewerBody(body,doc,md))
    .catch(()=>{body.innerHTML='<div class="viewer-loading">Could not load document.</div>'});
  doSearch();
}

function updateBackButton(){
  const btn=document.getElementById('viewerBack');
  if(!btn)return;
  if(viewHistory.length>0){
    btn.classList.add('has-history');
    // Show the title of the previous doc
    const allDocs=[...(IX?IX.documents:[]),...uploadedDocs];
    const prev=allDocs.find(d=>d.id===viewHistory[viewHistory.length-1]);
    btn.textContent='← '+(prev?prev.title.slice(0,25)+(prev.title.length>25?'…':''):'Back');
  } else {
    btn.classList.remove('has-history');
  }
}

function closeViewer(){
  viewingDoc=null;
  viewHistory=[];
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('viewerRelated').style.display='none';
  updateBackButton();
  doSearch();
}

// ── Simple markdown renderer ──
function renderMarkdown(md){
  let h=md.replace(/<!--[\s\S]*?-->/g,'');
  h=h.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,code)=>'<pre><code>'+code+'</code></pre>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/~~(.+?)~~/g,'<s>$1</s>');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/^---+$/gm,'<hr>');
  h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  h=h.replace(/^[\-\*] (.+)$/gm,'<li>$1</li>');
  h=h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  h=h.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
  h=h.replace(/<\/ul>\s*<ul>/g,'');
  h=h.replace(/^\|(.+)\|$/gm,(match)=>{
    const cells=match.split('|').filter(c=>c.trim());
    if(cells.every(c=>/^[\s\-:]+$/.test(c)))return'';
    return '<tr>'+cells.map(c=>'<td>'+c.trim()+'</td>').join('')+'</tr>';
  });
  h=h.replace(/(<tr>[\s\S]*?<\/tr>)/g,'<table>$1</table>');
  h=h.replace(/<\/table>\s*<table>/g,'');
  h=h.replace(/^(?!<[hupoltbd]|<\/|<br|<hr|<block|<pre|<code|<table|<tr|<s>)(.+)$/gm,'<p>$1</p>');
  h=h.replace(/<p>\s*<\/p>/g,'');
  return h;
}

// ── Feature 6: File upload via drag-and-drop ──
const uz=document.getElementById('uploadZone');
let dragCounter=0;
document.addEventListener('dragenter',e=>{
  e.preventDefault();
  dragCounter++;
  if(e.dataTransfer.types.includes('Files'))uz.classList.add('active');
});
document.addEventListener('dragleave',e=>{
  e.preventDefault();
  dragCounter--;
  if(dragCounter<=0){uz.classList.remove('active');dragCounter=0;}
});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  uz.classList.remove('active');
  dragCounter=0;
  const files=e.dataTransfer.files;
  for(let i=0;i<files.length;i++){
    const file=files[i];
    if(!file.name.endsWith('.md')&&!file.name.endsWith('.txt')&&!file.name.endsWith('.markdown'))continue;
    const reader=new FileReader();
    reader.onload=ev=>{
      const text=ev.target.result;
      const id='upload-'+Date.now()+'-'+i;
      // Parse basic frontmatter
      let title=file.name.replace(/\.(md|txt|markdown)$/,'').replace(/[-_]/g,' ');
      const titleMatch=text.match(/^#\s+(.+)/m);
      if(titleMatch)title=titleMatch[1].trim();
      // Build a minimal doc object
      const words=text.split(/\s+/).length;
      const headings=[];
      text.split('\n').forEach(line=>{
        const m=line.match(/^#{1,3}\s+(.+)/);
        if(m)headings.push(m[1].trim());
      });
      const snippet=text.replace(/[#*_`~>|]/g,'').replace(/\n+/g,' ').slice(0,400);
      const doc={
        id,title,path:'uploaded/'+file.name,source:'upload',category:'Uploaded',
        status:'',audience:'',doc_type:'',level:'',tags:[],markets:[],topics:[],
        headings,snippet,keywords:[],updated:new Date().toISOString().slice(0,10),
        created:new Date().toISOString().slice(0,10),word_count:words,
        search_text:text.toLowerCase().slice(0,2000),related_docs:[],_body:text
      };
      uploadedDocs.push(doc);
      // Update count
      document.getElementById('totalCount').textContent=(IX?IX.total_docs:0)+uploadedDocs.length+' docs'+(IX&&IX.total_archived?' · '+IX.total_archived+' archived':'');
      doSearch();
      openDoc(id);
    };
    reader.readAsText(file);
  }
});

// ── Utilities ──
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function hl(text,tokens){
  if(!tokens.length)return esc(text);
  let r=esc(text);
  tokens.forEach(t=>{
    const e=t.replace(/[.*+?^${}()|[\]\\]/g,'\\' + '$' + '&');
    r=r.replace(new RegExp('('+e+')','gi'),'<mark>$1</mark>');
  });
  return r;
}

// ── Keyboard ──
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==si){e.preventDefault();si.focus()}
  if(e.key==='Escape'){
    if(viewingDoc){closeViewer();return}
    if(si.value){si.value='';doSearch();return}
    Object.keys(F).forEach(k=>F[k]='all');
    document.querySelectorAll('.f').forEach(b=>{
      b.classList.toggle('on',b.dataset.fv==='all');
    });
    doSearch();
  }
});
