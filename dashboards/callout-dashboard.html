<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>WBR Callout Dashboard — All Markets</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
<script src="canon-chart.js?v=2026-04-20"></script>
<link rel="preload" href="data/callout-data.json" as="fetch" crossorigin>
<link rel="preload" href="data/forecast-data.json" as="fetch" crossorigin>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e0e0e0}
.header{padding:24px 32px 16px;border-bottom:1px solid #2a2d35}
.header h1{font-size:22px;font-weight:600;color:#fff}
.header p{font-size:15px;color:#888;margin-top:4px}
.controls{display:flex;gap:12px;padding:16px 32px;border-bottom:1px solid #2a2d35;flex-wrap:wrap;align-items:center}
.controls label{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.tab-row{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;font-size:15px;cursor:pointer;background:transparent;border:1px solid #2a2d35;color:#888}
.tab.active{background:#1a3a5c;border-color:#4a9eff;color:#4a9eff}
.tab:hover{border-color:#4a9eff}
select{background:#1a1d27;border:1px solid #2a2d35;color:#e0e0e0;padding:6px 12px;border-radius:6px;font-size:15px;cursor:pointer}
select:hover{border-color:#4a9eff}
.nav-btn{background:#1a1d27;border:1px solid #2a2d35;color:#888;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:16px}
.nav-btn:hover{border-color:#4a9eff;color:#4a9eff}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.kpi-row{display:flex;gap:16px;padding:0 32px 16px;flex-wrap:wrap}
.kpi{background:#1a1d27;border:1px solid #2a2d35;border-radius:10px;padding:16px 20px;flex:1;min-width:140px}
.kpi .label{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.kpi .value{font-size:24px;font-weight:700;color:#fff;margin-top:4px}
.kpi .sub{font-size:14px;color:#888;margin-top:2px}
.good{color:#4ade80}.warn{color:#e0e0e0}.bad{color:#f87171}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 32px 16px}
.card{background:#1a1d27;border:1px solid #2a2d35;border-radius:10px;padding:20px}
.card-full{grid-column:1/-1}
.card h3{font-size:16px;font-weight:600;color:#ccc;margin-bottom:12px}
.chart-box{position:relative;height:350px}
table{width:100%;border-collapse:collapse;font-size:15px}
th{text-align:left;padding:6px 10px;border-bottom:1px solid #2a2d35;color:#888;font-weight:500;font-size:13px;text-transform:uppercase}
td{padding:6px 10px;border-bottom:1px solid #1f222b}
tr:hover{background:#1f222b}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:13px;font-weight:600}
.badge-green{background:#064e3b;color:#4ade80}
.badge-yellow{background:#2a2d35;color:#e0e0e0}
.badge-red{background:#7f1d1d;color:#f87171}
.badge-gray{background:#374151;color:#9ca3af}
.list{list-style:none;padding:0}
.list li{padding:5px 0;border-bottom:1px solid #1f222b;font-size:15px;line-height:1.4}
.list li:last-child{border-bottom:none}
.list li::before{content:"\2013";color:#666;margin-right:8px}
.list-important{color:#e0e0e0}
.list-important::before{content:"\25CF";color:#e0e0e0;margin-right:8px;font-size:10px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.proj-card{background:#0f1117;border:1px solid #2a2d35;border-radius:8px;padding:10px}
.proj-label{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.proj-value{font-size:19px;font-weight:700;color:#fff}
.proj-sub{font-size:13px;color:#888;margin-top:2px}
.proj-ci{font-size:12px;color:#555;margin-top:1px}
.dt td:first-child{color:#888;font-size:13px;text-transform:uppercase;letter-spacing:.3px;width:70px}
.dt td{padding:5px 8px}
.dt td:nth-child(2){width:80px}
.dt td:nth-child(3){width:70px}
.dt td:nth-child(4){width:70px}
.stakeholder-row{display:flex;justify-content:space-between;font-size:15px;padding:3px 0;border-bottom:1px solid #1f222b}
.stakeholder-row:last-child{border-bottom:none}
.stakeholder-row .role{color:#888}
.stakeholder-row .name{color:#fff;font-weight:500}
.empty-state{text-align:center;padding:40px;color:#888;font-size:16px}
.ts{font-size:13px;color:#444;text-align:right;padding:16px 32px}
/* ── TOC ── */
.toc{display:flex;gap:6px;padding:6px 32px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #2a2d35;background:#12141c}
.toc-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-right:2px}
.toc a{font-size:12px;color:#888;text-decoration:none;padding:2px 8px;border-radius:3px;transition:all .15s}
.toc a:hover{color:#93b4f5;background:rgba(30,58,138,.15)}
.toc .toc-sep{color:#333;font-size:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="toc">
  <span class="toc-label">Jump to</span>
  <a href="#sec-kpis">KPIs</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-callout">Callout</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-trend">Trend</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-channels">Channels</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-projections">Projections</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-context">Context</a>
</div>
<div class="header">
  <h1>WBR Callout Dashboard</h1>
  <p>Weekly callout context, decisions, and performance drivers by market &bull; <span id="dataTs" style="color:#4a9eff"></span></p>
</div>
<div class="controls">
  <div><label>Market</label><br><div class="tab-row" id="marketTabs"></div></div>
  <div style="margin-left:auto"><label>Week</label><br>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="nav-btn" id="prevWeek">&#9664;</button>
      <select id="weekSelect"></select>
      <button class="nav-btn" id="nextWeek">&#9654;</button>
    </div>
  </div>
</div>
<div id="sec-kpis"></div>
<div class="kpi-row" id="kpiRow"></div>
<div class="grid" id="mainGrid">
  <div class="card card-full empty-state">Loading&hellip;</div>
</div>
<div class="ts" id="genTs"></div>
<script>
let DATA=null,FORECAST=null,curMarket=null,curWeek=null,chart=null,chartMode='default';
Promise.all([
  fetch('data/callout-data.json?'+Date.now()).then(r=>r.json()),
  fetch('data/forecast-data.json?'+Date.now()).then(r=>r.json()),
]).then(([cd,fc])=>{DATA=cd;FORECAST=fc;init()})
  .catch(()=>{document.getElementById('mainGrid').innerHTML='<div class="card card-full empty-state bad">Failed to load data</div>'});

function init(){
  curMarket=DATA.markets[0]||'US';curWeek=DATA.weeks[0]||'W15';
  const tabs=document.getElementById('marketTabs');
  DATA.markets.forEach(m=>{const b=document.createElement('button');b.className='tab'+(m===curMarket?' active':'');b.textContent=m;b.onclick=()=>{curMarket=m;render()};tabs.appendChild(b)});
  const sel=document.getElementById('weekSelect');
  DATA.weeks.forEach(w=>{const o=document.createElement('option');o.value=w;o.textContent=w;if(w===curWeek)o.selected=true;sel.appendChild(o)});
  sel.onchange=()=>{curWeek=sel.value;render()};
  document.getElementById('prevWeek').onclick=()=>nav(1);
  document.getElementById('nextWeek').onclick=()=>nav(-1);
  document.getElementById('dataTs').textContent='Data: '+new Date(DATA.generated).toLocaleDateString();
  document.getElementById('genTs').textContent='Rendered: '+new Date().toLocaleString();
  render();
}
function nav(dir){const i=DATA.weeks.indexOf(curWeek),n=i+dir;if(n>=0&&n<DATA.weeks.length){curWeek=DATA.weeks[n];document.getElementById('weekSelect').value=curWeek;render()}}
function fmt(v,t){if(v==null)return'\u2014';if(t==='$')return'$'+Math.round(v).toLocaleString();if(t==='%')return(v>0?'+':'')+Number(v).toFixed(1)+'%';if(t==='cpa')return'$'+Number(v).toFixed(0);if(t==='cvr')return Number(v).toFixed(2)+'%';return Math.round(v).toLocaleString()}
function cls(v,inv){if(v==null)return'';if(inv)return v>5?'bad':v<-5?'good':'warn';return v>5?'good':v<-5?'bad':'warn'}
function fb(f){const c=f==='good'?'badge-green':f==='bad'?'badge-red':f==='warn'?'badge-yellow':'badge-gray';return'<span class="badge '+c+'">'+(f||'').toUpperCase()+'</span>'}
function delta(v,inv){if(v==null)return'';const c=inv?(v>5?'bad':v<-5?'good':'warn'):(v>5?'good':v<-5?'bad':'warn');return'<span class="'+c+'">'+(v>0?'+':'')+v.toFixed(0)+'%</span>'}

function render(){
  document.querySelectorAll('#marketTabs .tab').forEach(b=>{b.className='tab'+(b.textContent===curMarket?' active':'')});
  document.getElementById('prevWeek').disabled=DATA.weeks.indexOf(curWeek)>=DATA.weeks.length-1;
  document.getElementById('nextWeek').disabled=DATA.weeks.indexOf(curWeek)<=0;
  const c=(DATA.callouts[curMarket]||{})[curWeek];
  const g=document.getElementById('mainGrid');
  if(!c){g.innerHTML='<div class="card card-full empty-state">No data for '+curMarket+' '+curWeek+'</div>';document.getElementById('kpiRow').innerHTML='';return}
  const m=c.metrics||{};

  // KPIs
  const kpis=[];
  function kpiSub(wow,yoy,vs4,inv){
    let parts=[];
    if(wow!=null)parts.push('<span class="'+cls(wow,inv)+'">'+fmt(wow,'%')+' WoW</span>');
    if(yoy!=null)parts.push('<span class="'+cls(yoy,inv)+'">'+fmt(yoy,'%')+' YoY</span>');
    if(vs4!=null)parts.push('<span class="'+cls(vs4,inv)+'">'+fmt(vs4,'%')+' 4wk</span>');
    return parts.join(' &middot; ');
  }
  if(m.regs!=null)kpis.push({l:'Registrations',v:fmt(m.regs),s:kpiSub(m.regs_wow,m.regs_yoy,m.regs_vs4wk,false)});
  if(m.spend!=null)kpis.push({l:'Spend',v:fmt(m.spend,'$'),s:kpiSub(m.spend_wow,m.spend_yoy,m.spend_vs4wk,false)});
  if(m.cpa!=null)kpis.push({l:'CPA',v:fmt(m.cpa,'cpa'),s:kpiSub(m.cpa_wow,m.cpa_yoy,m.cpa_vs4wk,true)});
  console.log('KPI YoY debug:', curMarket, curWeek, 'regs_yoy=',m.regs_yoy, 'spend_yoy=',m.spend_yoy, 'cpa_yoy=',m.cpa_yoy);
  if(m.ie_ccp!=null)kpis.push({l:'ie%CCP',v:m.ie_ccp+'%',s:m.ie_ccp>100?'<span class="bad">Above target</span>':'',c:m.ie_ccp>100?'bad':m.ie_ccp>90?'warn':'good'});
  document.getElementById('kpiRow').innerHTML=kpis.map(k=>'<div class="kpi"><div class="label">'+k.l+'</div><div class="value">'+k.v+'</div><div class="sub '+(k.c||'')+'">'+k.s+'</div></div>').join('');

  let html='';
  // Full callout text
  var calloutHtml=(c.full_callout||c.headline||'').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  html+='<div class="card card-full" id="sec-callout" style="border-left:3px solid #4a9eff"><h3>'+curWeek+' \u2014 '+curMarket+'<span style="color:#888;font-weight:400;font-size:14px;float:right">'+(c.period||'')+'</span></h3><div style="font-size:16px;line-height:1.6">'+calloutHtml+'</div></div>';
  // Chart
  html+='<div class="card card-full" id="sec-trend"><h3 style="display:flex;justify-content:space-between;align-items:center">Weekly Trend <span style="font-weight:400;font-size:13px"><button id="chartModeBtn" class="tab" style="font-size:12px;padding:3px 10px">Show calibration detail</button></span></h3><div class="chart-box"><canvas id="trendChart"></canvas></div></div>';
  // Brand / NB
  html+=channelCard('Brand',c.brand_detail,'sec-channels');
  html+=channelCard('Nonbrand',c.nb_detail);
  // Projections (full width)
  html+='<div class="card card-full" id="sec-projections"><h3>Projections</h3><div id="projContent"></div></div>';
  // External Factors (full width)
  html+='<div class="card card-full" id="sec-context"><h3>Context &amp; External Factors</h3><ul class="list" id="extList"></ul></div>';
  // Drivers / Blocked
  html+='<div class="card"><h3>Performance Drivers</h3><ul class="list" id="driverList"></ul></div>';
  html+='<div class="card"><h3>Stakeholders</h3><div id="stakeCard"></div></div>';

  g.innerHTML=html;
  renderProj(c.projections||{});
  renderList('driverList',c.decisions);
  renderExternal(c.external_factors);
  renderStake(DATA.stakeholders[curMarket]||{});
  renderChart(c);
}

function channelCard(title,d,anchorId){
  var idAttr=anchorId?' id="'+anchorId+'"':'';
  if(!d)return'<div class="card"'+idAttr+'><h3>'+title+'</h3><div style="color:#888;font-size:15px">No data</div></div>';
  var cost=d.cost||((d.cpa&&d.regs)?Math.round(d.cpa*d.regs):null);
  var costFmt=cost?'$'+cost.toLocaleString():'\u2014';
  return'<div class="card"'+idAttr+'><h3>'+title+'</h3>'+
    '<table class="dt" style="table-layout:fixed"><colgroup><col style="width:60px"><col style="width:75px"><col style="width:65px"><col style="width:65px"><col style="width:65px"></colgroup>'+
    '<thead><tr><th></th><th style="text-align:right">Value</th><th style="text-align:right">WoW</th><th style="text-align:right">YoY</th><th style="text-align:right">4wk avg</th></tr></thead><tbody>'+
    mRow('Regs',fmt(d.regs),d.regs_wow,false,d.regs_yoy,false,d.regs_vs4wk,false)+
    mRow('Cost',costFmt,d.cost_wow,false,d.cost_yoy,false,d.cost_vs4wk,false)+
    mRow('CPA',fmt(d.cpa,'cpa'),d.cpa_wow,true,d.cpa_yoy,true,d.cpa_vs4wk,true)+
    mRow('CVR',fmt(d.cvr,'cvr'),d.cvr_wow,false,d.cvr_yoy,false,d.cvr_vs4wk,false)+
    mRow('Clicks',fmt(d.clicks),d.clicks_wow,false,d.clicks_yoy,false,d.clicks_vs4wk,false)+
    '</tbody></table></div>';
}

function mRow(label,value,wow,wInv,yoy,yInv,vs4,v4Inv){
  return'<tr><td>'+label+'</td><td style="text-align:right;font-weight:600;color:#fff">'+value+'</td><td style="text-align:right">'+delta(wow,wInv)+'</td><td style="text-align:right">'+delta(yoy,yInv)+'</td><td style="text-align:right">'+delta(vs4,v4Inv)+'</td></tr>';
}

function renderExternal(items){
  const el=document.getElementById('extList');
  if(!items||!items.length){el.innerHTML='<li style="color:#888">None</li>';return}
  el.innerHTML=items.map(i=>{
    if(typeof i==='string')return'<li>'+i+'</li>';
    if(i.important)return'<li class="list-important">'+i.text+'</li>';
    return'<li>'+i.text+'</li>';
  }).join('');
}

function renderProj(proj){
  const el=document.getElementById('projContent');
  if(!proj||(!proj.month_end&&!proj.quarter_end&&!proj.next_week)){el.innerHTML='<div style="color:#888;font-size:15px">No projection data</div>';return}
  function pc(title,pe){
    if(!pe)return'';
    let ci=pe.ci_lo&&pe.ci_hi?'<div class="proj-ci">CI: '+fmt(pe.ci_lo)+'\u2013'+fmt(pe.ci_hi)+'</div>':'';
    let vs='';
    if(pe.vs_op2_spend!=null){const c=pe.vs_op2_spend>0?'warn':'good';vs='<div class="proj-sub '+c+'">'+(pe.vs_op2_spend>0?'+':'')+pe.vs_op2_spend.toFixed(1)+'% vs OP2</div>'}
    return'<div class="proj-card"><div class="proj-label">'+title+(pe.period?' ('+pe.period+')':'')+'</div><div class="proj-value">'+fmt(pe.regs_proj)+' regs</div>'+ci+'<div class="proj-sub">'+fmt(pe.spend_proj,'$')+'</div>'+(pe.cpa_proj?'<div class="proj-sub">'+fmt(pe.cpa_proj,'cpa')+' CPA</div>':'')+vs+'</div>';
  }
  el.innerHTML='<div class="proj-grid">'+pc('Next Week',proj.next_week)+pc('Month-End',proj.month_end)+pc('Quarter-End',proj.quarter_end)+(proj.year_end?pc('Year-End',proj.year_end):'')+'</div>';
}

function renderList(id,items){
  const el=document.getElementById(id);
  if(!items||!items.length){el.innerHTML='<li style="color:#888">None</li>';return}
  el.innerHTML=items.map(i=>'<li>'+i+'</li>').join('');
}

function renderAnomalies(a){
  const card=document.getElementById('anomalyCard');
  const content=document.getElementById('anomalyContent');
  if(!a||!a.length){card.style.display='none';return}
  card.style.display='block';

  // Detect if WW (anomalies have market prefix like "AU Regs")
  const isWW=curMarket==='WW';

  if(isWW){
    // Group by market
    const byMarket={};
    a.forEach(x=>{
      const m=x.metric||'';
      const parts=m.match(/^(\w{2})\s+(.+)$/);
      const mkt=parts?parts[1]:'Other';
      const metric=parts?parts[2]:m;
      if(!byMarket[mkt])byMarket[mkt]=[];
      byMarket[mkt].push({...x,metric:metric});
    });
    const sections=Object.entries(byMarket).map(([mkt,items])=>groupHtml(mkt,items)).filter(s=>s);
    content.innerHTML=sections.join('');
  } else {
    // Group by overall/brand/nb
    const groups={overall:[],brand:[],nb:[]};
    a.forEach(x=>{
      const cat=x.category||'overall';
      if(groups[cat])groups[cat].push(x);
      else groups.overall.push(x);
    });
    const sections=[groupHtml('Overall',groups.overall),groupHtml('Brand',groups.brand),groupHtml('Non-Brand',groups.nb)].filter(s=>s);
    content.innerHTML=sections.join('');
  }
}

function hint(x){
  const m=(x.metric||'').toLowerCase();
  const dev=x.deviation||'';
  const down=dev.startsWith('-');
  if(m.includes('regs')&&down) return 'Volume decline — check CVR, budget, or seasonality';
  if(m.includes('regs')&&!down) return 'Volume spike — verify data, check promos or holiday recovery';
  if(m.includes('cpa')&&!down) return 'Efficiency degrading — check CVR compression or CPC inflation';
  if(m.includes('cpa')&&down) return 'Efficiency improving — validate sustainability';
  if(m.includes('cvr')&&down) return 'Conversion drop — check LP changes, tracking, or audience shift';
  if(m.includes('cvr')&&!down) return 'Conversion spike — check query mix or LP improvements';
  if(m.includes('cost')&&!down) return 'Spend increase — check budget changes or bid strategy';
  if(m.includes('cost')&&down) return 'Spend decrease — check budget caps or delivery issues';
  if(m.includes('cpc')&&!down) return 'CPC rising — check auction competition or bid strategy';
  if(m.includes('cpc')&&down) return 'CPC declining — bid efficiency or lower competition';
  return '';
}

function devColor(x){
  if(x.flag==='good') return '#4ade80';
  if(x.flag==='bad') return '#f87171';
  return '#e0e0e0';
}

function groupHtml(title,items){
  if(!items.length) return '';
  let rows=items.map(x=>{
    const color=devColor(x);
    const cleanMetric=(x.metric||'').replace(/^Brand\s+/i,'').replace(/^Nb\s+/i,'');
    const h=hint(x);
    return '<tr><td style="font-size:14px">'+cleanMetric+'</td>'+
      '<td style="text-align:right;font-size:14px">'+(x.value||'\u2014')+'</td>'+
      '<td style="text-align:right;font-size:14px">'+(x.avg_8wk||'\u2014')+'</td>'+
      '<td style="text-align:right;font-weight:600;color:'+color+'">'+x.deviation+'</td>'+
      '<td style="font-size:13px;color:#888;max-width:180px">'+h+'</td></tr>';
  }).join('');
  return '<div style="border-top:1px solid #2a2d35;padding-top:12px"><div style="font-size:14px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">'+title+'</div>'+
    '<table style="font-size:14px"><thead><tr><th>Metric</th><th style="text-align:right">Value</th><th style="text-align:right">Avg</th><th style="text-align:right">Dev</th><th>Context</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function renderStake(st){
  const el=document.getElementById('stakeCard');
  el.innerHTML=Object.entries(st).map(([r,n])=>'<div class="stakeholder-row"><span class="role">'+r.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())+'</span><span class="name">'+n+'</span></div>').join('')||'<div style="color:#888">No data</div>';
}

function renderChart(c){
  // Canon chart — data comes from forecast-data.json (predictions_history + weekly).
  // The callout entry 'c' is only used for highlighting the selected week.
  if(!FORECAST){return}
  chart = CanonChart.render('trendChart', {
    forecastData: FORECAST,
    market: curMarket,
    mode: chartMode,
    highlightWeek: curWeek,
    chartInstance: chart,
  });
  // Wire up the mode toggle (button is re-rendered with the card each render)
  var btn = document.getElementById('chartModeBtn');
  if(btn){
    btn.textContent = chartMode === 'calibration' ? 'Show default view' : 'Show calibration detail';
    btn.onclick = function(){
      chartMode = chartMode === 'calibration' ? 'default' : 'calibration';
      renderChart(c);
    };
  }
}
</script>
</body>
</html>
