<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Weekly Review — Callout + Forecast Tracker</title>

<!-- Shared projection-engine design language. Weekly Review now uses the
     same token system (colors, spacing, typography, KPI tiles, sec-panel
     cards) as projection.html so the two views feel like one tool. -->
<link rel="stylesheet" href="../projection-design-system.css?v=2026-04-28">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
<script src="../canon-chart.js?v=2026-04-28"></script>
<link rel="preload" href="../data/callout-data.json" as="fetch" crossorigin>
<link rel="preload" href="../data/forecast-data.json" as="fetch" crossorigin>
<style>
/* ========================================================================
   Weekly Review — overrides + minor extensions to projection-design-system.css
   Keeps 95% of styling inherited from the shared token system; only adds
   local pieces (TOC, weekly-detail table cells, projection card grid).
   ======================================================================== */

/* Use the shared page frame paradigm */
body {
  font-family: var(--font-sans);
  color: var(--color-text-body);
  background: var(--color-neutral-bg);
  line-height: 1.5;
}

.wr-frame {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 var(--gap-lg);
}

/* Table of contents strip — compact nav at the top */
.wr-toc {
  display: flex;
  gap: var(--gap-xs);
  padding: var(--gap-xs) 0;
  flex-wrap: wrap;
  align-items: center;
  border-bottom: 1px solid var(--color-panel-border);
  font-size: var(--size-meta);
}
.wr-toc-label {
  color: var(--color-text-subtle);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-right: var(--gap-xs);
  font-weight: 600;
}
.wr-toc a {
  color: var(--color-text-meta);
  text-decoration: none;
  padding: 2px var(--gap-xs);
  border-radius: 3px;
  transition: color 120ms ease, background-color 120ms ease;
}
.wr-toc a:hover { color: var(--color-brand); background: rgba(0, 102, 204, 0.06); }
.wr-toc-sep { color: var(--color-panel-border); }

/* Header — matches .page-header semantics from projection-design-system */
.wr-header {
  padding: var(--gap-lg) 0 var(--gap-md);
  border-bottom: 1px solid var(--color-panel-border);
  margin-bottom: var(--gap-lg);
}
.wr-header h1 {
  font-size: var(--size-section);
  font-weight: 600;
  color: var(--color-text-hero);
  letter-spacing: -0.01em;
}
.wr-header-meta {
  font-size: var(--size-meta);
  color: var(--color-text-meta);
  margin-top: 4px;
}
.wr-header-meta .wr-ts-accent { color: var(--color-brand); }

/* Controls row — sits above the KPI strip. Three columns. */
.wr-controls {
  display: flex;
  gap: var(--gap-lg);
  padding: var(--gap-md) 0;
  flex-wrap: wrap;
  align-items: flex-end;
  border-bottom: 1px solid var(--color-panel-border);
  margin-bottom: var(--gap-lg);
}
.wr-control-group { display: flex; flex-direction: column; gap: 4px; }
.wr-control-label {
  font-size: var(--size-meta);
  color: var(--color-text-subtle);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}
.wr-tab-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.wr-tab {
  padding: 5px 12px;
  border-radius: 4px;
  font-size: var(--size-ui);
  cursor: pointer;
  background: var(--color-neutral-bg);
  border: 1px solid var(--color-panel-border);
  color: var(--color-text-body);
  font-family: inherit;
  transition: all 120ms ease;
}
.wr-tab:hover { border-color: var(--color-brand); color: var(--color-brand); }
.wr-tab.active {
  background: var(--color-brand);
  color: var(--color-text-on-brand);
  border-color: var(--color-brand);
}
/* WR-C7 (2026-04-28): forecast-only markets (no callout narrative yet) get
   a dashed border so the gap is visible without hiding the tab. Selecting
   one still works; callout section renders its empty state. */
.wr-tab.wr-tab-no-callout {
  border-style: dashed;
  color: var(--color-text-subtle);
}
.wr-tab.wr-tab-no-callout:hover {
  border-style: dashed;
  color: var(--color-brand);
}
.wr-tab.wr-tab-no-callout.active {
  background: var(--color-brand);
  color: var(--color-text-on-brand);
  border-color: var(--color-brand);
  border-style: solid;
}
.wr-week-nav {
  display: flex;
  align-items: center;
  gap: 4px;
}
.wr-nav-btn {
  background: var(--color-neutral-bg);
  border: 1px solid var(--color-panel-border);
  color: var(--color-text-body);
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: var(--size-ui);
  font-family: inherit;
  transition: border-color 120ms ease, color 120ms ease;
}
.wr-nav-btn:hover { border-color: var(--color-brand); color: var(--color-brand); }
.wr-nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.wr-metric-group { margin-left: auto; }
/* WR-B1 (2026-04-28): metric control rendered as a connected 3-cell
   segmented control. Tightens the horizontal footprint of the secondary
   filter so the Market tab row gets the space it needs for 12 markets. */
.wr-metric-group .wr-tab-row {
  display: inline-flex;
  border: 1px solid var(--color-panel-border);
  border-radius: 4px;
  overflow: hidden;
  gap: 0;
}
.wr-metric-group .wr-tab {
  border-radius: 0;
  border: none;
  border-left: 1px solid var(--color-panel-border);
  padding: 5px 12px;
}
.wr-metric-group .wr-tab:first-child { border-left: none; }
.wr-metric-group .wr-tab.active {
  background: var(--color-brand);
  color: var(--color-text-on-brand);
  border-color: var(--color-brand);
}

/* KPI row — reuse .hero-kpi from projection-design-system.css but in a row */
.wr-kpi-row {
  display: flex;
  gap: var(--gap-md);
  margin-bottom: var(--gap-lg);
  flex-wrap: wrap;
}
.wr-kpi-row .hero-kpi {
  flex: 1;
  min-width: 150px;
  padding: var(--gap-md);
  background: var(--color-panel-bg);
  border: 1px solid var(--color-panel-border);
  border-radius: 8px;
  text-align: left;
}

/* Grid of sec-panel cards — two-column on desktop, one-column mobile */
.wr-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--gap-lg);
  margin-bottom: var(--gap-lg);
}
.wr-grid-full { grid-column: 1 / -1; }
@media (max-width: 900px) { .wr-grid { grid-template-columns: 1fr; } }

/* Section divider between tracker + callout halves */
.wr-section-divider {
  padding: var(--gap-md) 0 var(--gap-sm);
  font-size: var(--size-meta);
  color: var(--color-text-subtle);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
  margin-top: var(--gap-lg);
  border-top: 1px solid var(--color-panel-border);
}

/* Chart wrapper — matches projection.html .chart-wrap height + bounds */
.wr-chart-wrap {
  height: 420px;
  max-height: 420px;
  position: relative;
}
.wr-chart-wrap canvas {
  width: 100% !important;
  height: 100% !important;
}

/* Table styling — inherits sec-panel parent, adds column-specific rules */
.wr-weekly-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--size-ui);
  font-variant-numeric: tabular-nums;
}
.wr-weekly-table thead th {
  text-align: left;
  padding: 6px 10px;
  font-size: var(--size-meta);
  color: var(--color-text-subtle);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  border-bottom: 1px solid var(--color-panel-border);
  position: sticky;
  top: 0;
  background: var(--color-panel-bg);
}
.wr-weekly-table th.r { text-align: right; }
.wr-weekly-table td {
  padding: 5px 10px;
  border-bottom: 1px solid #F3F3F3;
  color: var(--color-text-body);
}
.wr-weekly-table td.r { text-align: right; }
.wr-weekly-table tr:hover td { background: #FAFAFA; }
.wr-weekly-table tr.selected td {
  background: rgba(0, 102, 204, 0.06);
  border-bottom-color: rgba(0, 102, 204, 0.15);
}
.wr-weekly-table .pred-val { color: #B05A00; }   /* muted orange for predictions */
.wr-weekly-table .pred-lbl { color: #B05A00; font-size: var(--size-meta); margin-left: 2px; }
.wr-weekly-table .future-row td { opacity: 0.55; }

/* Brand/NB detail table — reused in channel cards */
.wr-channel-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--size-ui);
  font-variant-numeric: tabular-nums;
}
.wr-channel-table thead th {
  text-align: right;
  padding: 4px 6px;
  font-size: var(--size-meta);
  color: var(--color-text-subtle);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  border-bottom: 1px solid var(--color-panel-border);
}
.wr-channel-table thead th:first-child { text-align: left; }
.wr-channel-table td { padding: 4px 6px; text-align: right; color: var(--color-text-body); }
.wr-channel-table td:first-child {
  text-align: left;
  color: var(--color-text-subtle);
  font-size: var(--size-meta);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 600;
}
.wr-channel-table td.value-cell { font-weight: 600; color: var(--color-text-hero); }

/* Up/down delta tags — shared color language with projection.html */
.wr-delta { font-variant-numeric: tabular-nums; font-weight: 500; }
.wr-delta.good { color: var(--color-success); }
.wr-delta.bad  { color: var(--color-danger); }
.wr-delta.warn { color: var(--color-text-meta); }

/* WR-C5 (2026-04-28): .wr-proj-* classes removed — projection sub-panel
   deleted from the page; projection engine (projection.html) owns
   forward-looking forecast cards. */

/* List inside sec-panels — keeps readability but tightens density */
.wr-list {
  list-style: none;
  padding: 0;
  font-size: var(--size-ui);
}
.wr-list li {
  padding: 5px 0;
  border-bottom: 1px solid #F3F3F3;
  color: var(--color-text-body);
  line-height: 1.5;
}
.wr-list li:last-child { border-bottom: none; }
.wr-list li::before { content: "\2013"; color: var(--color-text-subtle); margin-right: 8px; }
.wr-list li.important::before { content: "\25CF"; color: var(--color-brand); font-size: var(--size-meta); }

/* Stakeholder rows */
.wr-stake-row {
  display: flex;
  justify-content: space-between;
  font-size: var(--size-ui);
  padding: 4px 0;
  border-bottom: 1px solid #F3F3F3;
}
.wr-stake-row:last-child { border-bottom: none; }
.wr-stake-row .role { color: var(--color-text-subtle); }
.wr-stake-row .name { color: var(--color-text-hero); font-weight: 500; }

/* Table-scroll wrapper for weekly detail */
.wr-table-scroll {
  overflow-x: auto;
  overflow-y: auto;
  max-height: 520px;
  border: 1px solid var(--color-panel-border);
  border-radius: 4px;
}

/* Empty state — matches projection.html subtle tone */
.wr-empty {
  text-align: center;
  padding: var(--gap-xl) var(--gap-lg);
  color: var(--color-text-subtle);
  font-size: var(--size-body);
  background: var(--color-panel-bg);
  border: 1px dashed var(--color-panel-border);
  border-radius: 8px;
}

/* Callout narrative — highlighted left border in brand blue like the hero.
   WR-C3 (2026-04-28): split heading into meta + headline lines so the h3
   carries the one-line summary instead of generic W17-US scaffolding. */
.wr-callout-main {
  border-left: 3px solid var(--color-brand);
}
.wr-callout-meta {
  font-size: var(--size-meta);
  color: var(--color-text-subtle);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 4px;
}
.wr-callout-headline {
  font-size: var(--size-body);
  font-weight: 600;
  color: var(--color-text-hero);
  line-height: 1.4;
  text-transform: none;
  letter-spacing: 0;
  margin-bottom: var(--gap-sm);
}
/* Legacy selectors kept for any other code paths — now unused on the
   rendered page after WR-C3 but harmless. */
.wr-callout-main h3 { display: flex; justify-content: space-between; align-items: center; }
.wr-callout-period {
  font-weight: 400;
  font-size: var(--size-meta);
  color: var(--color-text-meta);
  text-transform: none;
  letter-spacing: 0;
}
.wr-callout-narrative {
  font-size: var(--size-body);
  line-height: 1.7;
  color: var(--color-text-body);
}

/* Chart mode toggle — secondary disclosure-btn styled for weekly review */
.wr-chart-mode-btn {
  font-size: var(--size-meta);
  padding: 3px 10px;
  font-weight: 400;
}

/* Generated footer */
.wr-ts {
  font-size: var(--size-meta);
  color: var(--color-text-subtle);
  text-align: right;
  padding: var(--gap-md) 0;
  font-variant-numeric: tabular-nums;
}
</style>
</head>
<body>
<div class="wr-frame">

<!-- TOC strip — compact jump-to nav -->
<div class="wr-toc">
  <span class="wr-toc-label">Jump to</span>
  <a href="#sec-kpis">KPIs</a>
  <span class="wr-toc-sep">&middot;</span>
  <a href="#sec-trend">Trend</a>
  <span class="wr-toc-sep">&middot;</span>
  <a href="#sec-detail">Weekly Detail</a>
  <span class="wr-toc-sep">&middot;</span>
  <a href="#sec-callout">Callout</a>
  <span class="wr-toc-sep">&middot;</span>
  <a href="#sec-channels">Channels</a>
  <span class="wr-toc-sep">&middot;</span>
  <a href="#sec-context">Context</a>
</div>

<!-- Header -->
<div class="wr-header">
  <h1>Weekly Review</h1>
  <p class="wr-header-meta">Callout narrative + full-year tracker &middot; <span class="wr-ts-accent" id="dataTs"></span></p>
</div>

<!-- Controls -->
<div class="wr-controls">
  <div class="wr-control-group">
    <span class="wr-control-label">Market</span>
    <div class="wr-tab-row" id="marketTabs"></div>
  </div>
  <div class="wr-control-group">
    <span class="wr-control-label">Week</span>
    <div class="wr-week-nav">
      <button class="wr-nav-btn" id="prevWeek" aria-label="Previous week">&#9664;</button>
      <select id="weekSelect" class="control-input"></select>
      <button class="wr-nav-btn" id="nextWeek" aria-label="Next week">&#9654;</button>
    </div>
  </div>
  <div class="wr-control-group wr-metric-group">
    <span class="wr-control-label">Metric</span>
    <div class="wr-tab-row" id="metricTabs"></div>
  </div>
</div>

<!-- ============ TRACKER SECTION (top — chart + KPIs + weekly detail) ============ -->
<div id="sec-kpis"></div>
<div class="wr-kpi-row" id="kpiRow"></div>
<div class="wr-grid">
  <div class="sec-panel wr-grid-full" id="sec-trend">
    <h3 style="display:flex;justify-content:space-between;align-items:center">
      <span>Weekly Trend &mdash; highlighting selected week</span>
      <button id="chartModeBtn" class="wr-tab wr-chart-mode-btn">Show calibration detail</button>
    </h3>
    <div class="wr-chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>
  <div class="sec-panel wr-grid-full" id="sec-detail">
    <h3>Weekly Detail</h3>
    <div class="wr-table-scroll">
      <table class="wr-weekly-table">
        <thead><tr>
          <th>Week</th>
          <th class="r">Regs</th>
          <th class="r" title="Calibration delta — actual vs predicted (past weeks only)">vs Pred</th>
          <th class="r">OP2</th>
          <th class="r">Cost</th>
          <th class="r">CPA</th>
          <th class="r">WoW &Delta;</th>
        </tr></thead>
        <tbody id="weeklyBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ============ CALLOUT SECTION (bottom — narrative context) ============ -->
<div class="wr-section-divider">Callout context for selected week</div>
<div class="wr-grid" id="calloutGrid">
  <div class="wr-grid-full wr-empty">Loading&hellip;</div>
</div>
<!-- WR-C2 (2026-04-28): removed #genTs footer timestamp — page-render
     time is always "now" and wasn't useful. Single data-freshness
     timestamp lives in the header #dataTs. -->

</div> <!-- /.wr-frame -->

<script>
// ============================================================================
// Weekly Review — merged forecast-tracker + callout-dashboard (shape A),
// restyled 2026-04-28 to share design language with projection.html.
// Callout narrative on top, full-year tracker below. Both share the market
// tab row and the week selector; picking a week highlights it on the chart
// and drives the callout narrative.
// ============================================================================

let CALLOUTS = null;  // callout-data.json
let FORECAST = null;  // forecast-data.json
let curMarket = null;
let curWeek = null;
let curMetric = 'regs';
let chart = null;
let chartMode = 'default';

Promise.all([
  fetch('../data/callout-data.json?' + Date.now()).then(r => r.json()),
  fetch('../data/forecast-data.json?' + Date.now()).then(r => r.json()),
]).then(([cd, fc]) => {
  CALLOUTS = cd;
  FORECAST = fc;
  init();
}).catch((e) => {
  console.error('Weekly Review data load failed:', e);
  document.getElementById('calloutGrid').innerHTML =
    '<div class="wr-grid-full wr-empty" style="color:var(--color-danger);border-color:#F2A4A4">Failed to load data. Run refresh-forecast.py and refresh-callouts.py.</div>';
});

function init() {
  // Display order mirrors callout dashboard: WW + EU5 first, then key markets.
  const MARKET_ORDER = ['WW','US','EU5','CA','UK','DE','FR','IT','ES','JP','MX','AU'];
  // WR-C7 (2026-04-28): use UNION of callout + forecast markets so the EU5
  // member markets (UK/DE/FR/IT/ES) surface as tabs even when the callout
  // pipeline hasn't authored narrative for them yet. Forecast-only markets
  // render with a † marker and dashed tab border; selecting one shows KPIs
  // + chart + table normally and surfaces "No callout for {market}" in the
  // callout section. Prior behavior was intersection, which silently
  // swallowed any market present in only one data source.
  const calloutSet = new Set(CALLOUTS.markets || []);
  const forecastSet = new Set(FORECAST.markets || []);
  const markets = MARKET_ORDER.filter(m => calloutSet.has(m) || forecastSet.has(m));

  // WR-P1 (2026-04-28): URL state + explicit latest-week default.
  // Prior behavior set curWeek = CALLOUTS.weeks[0] which worked by
  // coincidence (weeks array happens to be newest-first). Now we
  // (a) read ?market=X&week=W17 from the URL, (b) pick the highest
  // week index that has callout data for curMarket (forecast-only
  // markets get the week slot from curMarket's nearest sibling).
  // Writes URL on every render so copy-paste of the address bar
  // reproduces the exact view.
  const urlParams = new URLSearchParams(location.search);
  const urlMarket = urlParams.get('market');
  const urlWeek   = urlParams.get('week');
  curMarket = (urlMarket && markets.includes(urlMarket)) ? urlMarket : (markets[0] || 'US');
  const calloutWeeks = CALLOUTS.weeks || [];
  // Prefer a callout week for the current market; fall back to the global
  // first week; then to a synthetic "W{max_week}" if no callouts loaded.
  const marketCallouts = CALLOUTS.callouts?.[curMarket] || {};
  const validWeeks = calloutWeeks.filter(w => marketCallouts[w]);
  curWeek = (urlWeek && (validWeeks.includes(urlWeek) || calloutWeeks.includes(urlWeek)))
    ? urlWeek
    : (validWeeks[0] || calloutWeeks[0] || 'W' + (FORECAST.max_week || 15));

  // Market tabs
  const tabs = document.getElementById('marketTabs');
  markets.forEach(m => {
    const b = document.createElement('button');
    const forecastOnly = !calloutSet.has(m);
    b.className = 'wr-tab' +
      (m === curMarket ? ' active' : '') +
      (forecastOnly ? ' wr-tab-no-callout' : '');
    b.textContent = forecastOnly ? m + '\u2020' : m;  // dagger indicates no callout
    b.dataset.market = m;  // WR-C7: stable ref for active-state toggle
    if (forecastOnly) b.title = 'Forecast only — no callout narrative for this market yet.';
    b.onclick = () => { curMarket = m; render(); };
    tabs.appendChild(b);
  });

  // Week selector + nav
  const sel = document.getElementById('weekSelect');
  (CALLOUTS.weeks || []).forEach(w => {
    const o = document.createElement('option');
    o.value = w; o.textContent = w;
    if (w === curWeek) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = () => { curWeek = sel.value; render(); };
  document.getElementById('prevWeek').onclick = () => navWeek(1);
  document.getElementById('nextWeek').onclick = () => navWeek(-1);

  // Metric tabs (segmented control per WR-B1). Short labels inside the
  // control; full form ("Registrations") still used for the KPI label.
  const metricTabs = document.getElementById('metricTabs');
  const metricDefs = [
    {key:'regs', label:'Regs'},
    {key:'cost', label:'Cost'},
    {key:'cpa',  label:'CPA'},
  ];
  metricDefs.forEach(({key, label}) => {
    const b = document.createElement('button');
    b.className = 'wr-tab' + (key === curMetric ? ' active' : '');
    b.textContent = label;
    b.dataset.metric = key;
    b.onclick = () => { curMetric = key; renderKPIs(); };
    metricTabs.appendChild(b);
  });

  // WR-C2: single data-freshness timestamp in the header. Sharpens the
  // format to "Data as of Sun Apr 27 · Forecast through W17" so the reader
  // can tell at a glance whether the page is fresh or stale.
  const calloutDate = new Date(CALLOUTS.generated || Date.now());
  const weekday = calloutDate.toLocaleDateString('en-US', { weekday: 'short' });
  const monthDay = calloutDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  document.getElementById('dataTs').textContent =
    `Data as of ${weekday} ${monthDay} \u00b7 Forecast through ${FORECAST.last_data_date || 'W' + FORECAST.max_week}`;

  render();
}

function navWeek(dir) {
  const weeks = CALLOUTS.weeks || [];
  const i = weeks.indexOf(curWeek);
  const n = i + dir;
  if (n >= 0 && n < weeks.length) {
    curWeek = weeks[n];
    document.getElementById('weekSelect').value = curWeek;
    render();
  }
}

// ============================================================================
// Formatting helpers — shared across callout + tracker sections
// ============================================================================

function fmt(v, t) {
  if (v == null) return '\u2014';
  if (t === '$' || t === 'cost') return '$' + Math.round(v).toLocaleString();
  if (t === '%') return (v > 0 ? '+' : '') + Number(v).toFixed(1) + '%';
  if (t === 'cpa') return '$' + Number(v).toFixed(0);
  if (t === 'cvr') return Number(v).toFixed(2) + '%';
  return Math.round(v).toLocaleString();
}

function cls(v, inv) {
  if (v == null) return '';
  if (inv) return v > 5 ? 'bad' : v < -5 ? 'good' : 'warn';
  return v > 5 ? 'good' : v < -5 ? 'bad' : 'warn';
}

function delta(v, inv) {
  if (v == null) return '';
  const c = cls(v, inv);
  return '<span class="wr-delta ' + c + '">' + (v > 0 ? '+' : '') + v.toFixed(0) + '%</span>';
}

// WR-C1 (2026-04-28): single WoW helper used by both renderKPIs() and
// renderTable(). Fixes two edge cases:
//   (1) the prior truthy guard (`prev && prev[curMetric]`) treats legit
//       zero-prior as missing data, swallowing the "went from 0 to N"
//       signal a future metric (CVR, CPCs, etc.) might need.
//   (2) the prior threshold was asymmetric (wow > 0 → good at +0.1%,
//       wow < -5 → bad) which made +0.3% noise look like growth and
//       -4.7% drops look neutral. Now routes through cls() so thresholds
//       are symmetric ±5% (matches the helper already used elsewhere).
function safeWoW(cur, prev) {
  if (cur == null || prev == null) return null;
  if (prev === 0) return cur === 0 ? 0 : null;   // 0 → 0 = flat; 0 → N = skip
  return (cur - prev) / prev * 100;
}

// ============================================================================
// RENDER — orchestrates callout + tracker on every market/week change
// ============================================================================

function render() {
  // WR-P1: keep URL in sync with state so the current view is shareable.
  try {
    const params = new URLSearchParams({ market: curMarket, week: curWeek });
    const next = params.toString();
    if (next !== location.search.slice(1)) {
      history.replaceState({}, '', '?' + next);
    }
  } catch (e) { /* URL API sandboxed — silent fallback */ }

  // Update active states (WR-C7: use data-market instead of textContent
  // since forecast-only markets carry a dagger suffix in their label).
  document.querySelectorAll('#marketTabs .wr-tab').forEach(b => {
    const m = b.dataset.market;
    const forecastOnly = b.classList.contains('wr-tab-no-callout');
    b.className = 'wr-tab' +
      (m === curMarket ? ' active' : '') +
      (forecastOnly ? ' wr-tab-no-callout' : '');
  });
  const weeks = CALLOUTS.weeks || [];
  document.getElementById('prevWeek').disabled = weeks.indexOf(curWeek) >= weeks.length - 1;
  document.getElementById('nextWeek').disabled = weeks.indexOf(curWeek) <= 0;

  renderCallout();
  renderKPIs();
  renderChart();
  renderTable();
}

// ============================================================================
// CALLOUT — bottom section (narrative, decisions, stakeholders, channels)
// ============================================================================

function renderCallout() {
  const c = (CALLOUTS.callouts[curMarket] || {})[curWeek];
  const g = document.getElementById('calloutGrid');
  if (!c) {
    g.innerHTML = '<div class="wr-grid-full wr-empty" id="sec-callout">No callout for ' + curMarket + ' ' + curWeek + '</div>';
    return;
  }

  let html = '';

  // WR-C3 (2026-04-28): headline de-duplication.
  // full_callout historically starts with the same text as headline, so
  // rendering full_callout alone buried the one-line summary inside
  // paragraph 1 of prose. Lift the headline into the h3 and strip it
  // from the body so the reader scans {market}·{week}·{period} →
  // one-line summary → detail instead of {market}·{week} → prose that
  // starts with the summary.
  const headlineText = (c.headline || '').trim();
  const fullText = (c.full_callout || '').trim();
  const bodyText = (fullText && headlineText && fullText.startsWith(headlineText))
    ? fullText.slice(headlineText.length).trimStart()
    : fullText;
  const bodyHtml = bodyText.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
  const h3Content = headlineText || (curMarket + ' ' + curWeek);

  html += '<div class="sec-panel wr-grid-full wr-callout-main" id="sec-callout">' +
    '<div class="wr-callout-meta">' + curMarket + ' &middot; ' + curWeek +
      (c.period ? ' &middot; ' + c.period : '') + '</div>' +
    '<h3 class="wr-callout-headline">' + h3Content + '</h3>' +
    (bodyHtml ? '<div class="wr-callout-narrative">' + bodyHtml + '</div>' : '') +
    '</div>';

  // Brand + Non-Brand channel detail
  html += channelCard('Brand', c.brand_detail, 'sec-channels');
  html += channelCard('Nonbrand', c.nb_detail);

  // WR-C5 (2026-04-28): "Projections" sub-panel removed — projection engine
  // (projection.html) owns forward-looking scenarios. Weekly review's job is
  // grading last-week's forecast, not duplicating the forecast itself.
  // Projection data still feeds the OP2 Pacing KPI (WR-C6) via renderKPIs.

  // External factors
  html += '<div class="sec-panel wr-grid-full" id="sec-context"><h3>Context &amp; External Factors</h3><ul class="wr-list" id="extList"></ul></div>';

  // Drivers + stakeholders
  html += '<div class="sec-panel"><h3>Performance Drivers</h3><ul class="wr-list" id="driverList"></ul></div>';
  html += '<div class="sec-panel"><h3>Stakeholders</h3><div id="stakeCard"></div></div>';

  g.innerHTML = html;

  renderList('driverList', c.decisions);
  renderExternal(c.external_factors);
  renderStake((CALLOUTS.stakeholders || {})[curMarket] || {});
}

function channelCard(title, d, anchorId) {
  const idAttr = anchorId ? ' id="' + anchorId + '"' : '';
  if (!d) return '<div class="sec-panel"' + idAttr + '><h3>' + title + '</h3><div style="color:var(--color-text-subtle);font-size:var(--size-ui)">No data</div></div>';
  const cost = d.cost || ((d.cpa && d.regs) ? Math.round(d.cpa * d.regs) : null);
  const costFmt = cost ? '$' + cost.toLocaleString() : '\u2014';
  return '<div class="sec-panel"' + idAttr + '><h3>' + title + '</h3>' +
    '<table class="wr-channel-table" style="table-layout:fixed"><colgroup><col style="width:60px"><col style="width:75px"><col style="width:65px"><col style="width:65px"><col style="width:65px"></colgroup>' +
    '<thead><tr><th></th><th>Value</th><th>WoW</th><th>YoY</th><th>4wk avg</th></tr></thead><tbody>' +
    mRow('Regs', fmt(d.regs), d.regs_wow, false, d.regs_yoy, false, d.regs_vs4wk, false) +
    mRow('Cost', costFmt, d.cost_wow, false, d.cost_yoy, false, d.cost_vs4wk, false) +
    mRow('CPA', fmt(d.cpa, 'cpa'), d.cpa_wow, true, d.cpa_yoy, true, d.cpa_vs4wk, true) +
    mRow('CVR', fmt(d.cvr, 'cvr'), d.cvr_wow, false, d.cvr_yoy, false, d.cvr_vs4wk, false) +
    mRow('Clicks', fmt(d.clicks), d.clicks_wow, false, d.clicks_yoy, false, d.clicks_vs4wk, false) +
    '</tbody></table></div>';
}

function mRow(label, value, wow, wInv, yoy, yInv, vs4, v4Inv) {
  return '<tr><td>' + label + '</td>' +
    '<td class="value-cell">' + value + '</td>' +
    '<td>' + delta(wow, wInv) + '</td>' +
    '<td>' + delta(yoy, yInv) + '</td>' +
    '<td>' + delta(vs4, v4Inv) + '</td></tr>';
}

// WR-C5 (2026-04-28): renderProj + pc helpers removed. Projection engine
// owns forward-looking scenarios. Projection data that drives the OP2
// Pacing KPI (WR-C6) is pulled inline in renderKPIs via callout.projections.

function renderList(id, items) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!items || !items.length) { el.innerHTML = '<li style="color:var(--color-text-subtle)">None</li>'; return; }
  el.innerHTML = items.map(i => '<li>' + i + '</li>').join('');
}

function renderExternal(items) {
  const el = document.getElementById('extList');
  if (!el) return;
  if (!items || !items.length) { el.innerHTML = '<li style="color:var(--color-text-subtle)">None</li>'; return; }
  el.innerHTML = items.map(i => {
    if (typeof i === 'string') return '<li>' + i + '</li>';
    if (i.important) return '<li class="important">' + i.text + '</li>';
    return '<li>' + i.text + '</li>';
  }).join('');
}

function renderStake(st) {
  const el = document.getElementById('stakeCard');
  if (!el) return;
  el.innerHTML = Object.entries(st).map(([r, n]) =>
    '<div class="wr-stake-row"><span class="role">' +
    r.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) +
    '</span><span class="name">' + n + '</span></div>'
  ).join('') || '<div style="color:var(--color-text-subtle);font-size:var(--size-ui)">No data</div>';
}

// ============================================================================
// TRACKER — top section (KPIs, canon-chart, weekly detail table)
// ============================================================================

function renderKPIs() {
  const row = document.getElementById('kpiRow');
  // Highlight active metric tab
  document.querySelectorAll('#metricTabs .wr-tab').forEach(b => {
    b.className = 'wr-tab' + (b.dataset.metric === curMetric ? ' active' : '');
  });

  const weeks = (FORECAST.weekly && FORECAST.weekly[curMarket]) || [];
  if (!weeks.length) {
    row.innerHTML = '<div class="hero-kpi"><div class="hero-kpi-label">No Data</div></div>';
    return;
  }
  const maxWk = FORECAST.max_week || 15;
  const actualWeeks = weeks.filter(w => w.wk <= maxWk && (w.regs > 0 || w.cost > 0));
  const ytd = actualWeeks.reduce((s, w) => s + (w[curMetric] || 0), 0);
  const last = actualWeeks[actualWeeks.length - 1] || {};
  const prev = actualWeeks.length > 1 ? actualWeeks[actualWeeks.length - 2] : null;
  // WR-C1: safeWoW handles null / 0-prior / 0→0-flat explicitly.
  const wowRaw = safeWoW(last[curMetric], prev ? prev[curMetric] : null);
  const wow = wowRaw != null ? wowRaw.toFixed(1) : null;
  const wowClass = wowRaw == null ? 'warn' : cls(wowRaw, false);
  const w52 = weeks.find(w => w.wk === 52);
  // WR-C6 (2026-04-28): year-end prediction tile removed — Year-End is a
  // projection-engine concern; on a weekly review it's 35+ weeks away and
  // every week's tiny movement invites reaction to noise. Leaving the w52
  // lookup here commented out as a sign of intent; uncomment if we ever
  // want to surface YE elsewhere on this page.
  // const yearEndPred = w52 && w52.pred_regs ? w52.pred_regs : null;
  void w52;

  // WR-C6: OP2 Pacing tile. Two sources fold together — the weekly passive
  // target from FORECAST (last.op2_regs) AND the month-end pacing projection
  // from callouts (callout.projections.month_end.vs_op2_spend). We prefer
  // the month-end projection when it's populated (richer: includes pacing
  // sign + magnitude) and fall back to weekly actual vs weekly OP2 when
  // the refresh-callouts.py pipeline hasn't populated current-week
  // projections yet (common on W16/W17 pre-refresh).
  let op2PacingTile = '';
  if (curMetric === 'regs' && last.regs && last.op2_regs) {
    const weeklyDiff = last.regs - last.op2_regs;
    const weeklyPct = (weeklyDiff / last.op2_regs) * 100;
    const weeklyCls = cls(weeklyPct, false);
    const sign = weeklyPct > 0 ? '+' : '';
    const dir = weeklyDiff >= 0 ? 'ahead of' : 'behind';
    // Prefer month-end projection when present.
    const monthEnd = ((CALLOUTS.callouts[curMarket] || {})[curWeek] || {}).projections?.month_end;
    if (monthEnd && Number.isFinite(monthEnd.vs_op2_spend)) {
      const mPct = monthEnd.vs_op2_spend;
      const mCls = cls(mPct, false);
      const mSign = mPct > 0 ? '+' : '';
      const periodTag = monthEnd.period || 'Month-end';
      op2PacingTile = `<div class="hero-kpi">
        <div class="hero-kpi-label">vs OP2 (pacing)</div>
        <div class="hero-kpi-value wr-delta ${mCls}">${mSign}${mPct.toFixed(1)}%</div>
        <div class="hero-kpi-delta ${mCls}">${periodTag}: ${fmt(monthEnd.regs_proj || monthEnd.spend_proj)} proj</div>
      </div>`;
    } else {
      op2PacingTile = `<div class="hero-kpi">
        <div class="hero-kpi-label">vs OP2</div>
        <div class="hero-kpi-value wr-delta ${weeklyCls}">${sign}${weeklyPct.toFixed(1)}%</div>
        <div class="hero-kpi-delta ${weeklyCls}">${sign}${Math.round(weeklyDiff).toLocaleString()} ${dir} ${fmt(last.op2_regs, 'regs')} plan</div>
      </div>`;
    }
  }

  // Map curMetric to fmt() format tag for consistent rendering
  const fmtTag = curMetric === 'cost' ? '$' : (curMetric === 'cpa' ? 'cpa' : null);
  const labelForKpi = curMetric === 'regs' ? 'Registrations' : (curMetric === 'cost' ? 'Cost' : 'CPA');

  row.innerHTML = `
    <div class="hero-kpi">
      <div class="hero-kpi-label">YTD ${labelForKpi}</div>
      <div class="hero-kpi-value">${fmt(ytd, fmtTag)}</div>
      <div class="hero-kpi-delta">W1&ndash;W${maxWk}</div>
    </div>
    <div class="hero-kpi">
      <div class="hero-kpi-label">Latest Week</div>
      <div class="hero-kpi-value">${fmt(last[curMetric], fmtTag)}</div>
      <div class="hero-kpi-delta">${last.week || ''}</div>
    </div>
    <div class="hero-kpi">
      <div class="hero-kpi-label">WoW Change</div>
      <div class="hero-kpi-value">${wow != null ? (wow > 0 ? '+' : '') + wow + '%' : '\u2014'}</div>
      <div class="hero-kpi-delta ${wowClass}">vs prior</div>
    </div>
    ${op2PacingTile}
  `;
}

function renderChart() {
  if (!FORECAST) return;
  chart = CanonChart.render('mainChart', {
    forecastData: FORECAST,
    market: curMarket,
    mode: chartMode,
    highlightWeek: curWeek,
    chartInstance: chart,
  });
  const btn = document.getElementById('chartModeBtn');
  if (btn) {
    btn.textContent = chartMode === 'calibration' ? 'Show default view' : 'Show calibration detail';
    btn.onclick = () => {
      chartMode = chartMode === 'calibration' ? 'default' : 'calibration';
      renderChart();
    };
  }
}

function renderTable() {
  const body = document.getElementById('weeklyBody');
  const weeks = (FORECAST.weekly && FORECAST.weekly[curMarket]) || [];
  const maxWk = FORECAST.max_week || 15;
  body.innerHTML = weeks.map((w, i) => {
    const isActual = w.regs > 0 || w.cost > 0;
    const isFuture = w.wk > maxWk;
    const prev = i > 0 ? weeks[i - 1] : null;
    const prevRegs = prev && prev.regs > 0 ? prev.regs : (prev && prev.pred_regs ? prev.pred_regs : null);
    const curRegs = isActual ? w.regs : w.pred_regs;
    // WR-C1: use safeWoW helper for symmetric thresholds + 0-prior safety.
    const wowRaw = safeWoW(curRegs, prevRegs);
    const wow = wowRaw != null ? wowRaw.toFixed(1) : null;
    const wowCls = wowRaw == null ? 'warn' : cls(wowRaw, false);
    const wowTxt = wow != null ? `<span class="wr-delta ${wowCls}">${wow > 0 ? '+' : ''}${wow}%</span>` : '\u2014';

    const rowCls = [];
    if (isFuture) rowCls.push('future-row');
    const isSelected = w.week === curWeek || ('W' + String(w.wk).padStart(2, '0')) === curWeek;
    if (isSelected) rowCls.push('selected');
    const rowClsAttr = rowCls.length ? ' class="' + rowCls.join(' ') + '"' : '';

    const predLabel = isFuture ? ' <span class="pred-lbl">pred</span>' : '';
    // WR-C4: Regs column carries actual (past) or pred_regs (future, amber).
    // Pred column repurposed as "vs Pred" — past rows show calibration delta
    // (actual − predicted as %); future rows show em-dash since there's
    // nothing to calibrate against yet.
    const regsVal = isActual ? fmt(w.regs, 'regs') : (w.pred_regs ? `<span class="pred-val">${fmt(w.pred_regs, 'regs')}</span>` : '\u2014');
    const vsPredRaw = (isActual && w.pred_regs && w.regs)
      ? (w.regs - w.pred_regs) / w.pred_regs * 100
      : null;
    const vsPredCls = vsPredRaw == null ? 'warn' : cls(vsPredRaw, false);
    const vsPredVal = vsPredRaw != null
      ? `<span class="wr-delta ${vsPredCls}">${vsPredRaw > 0 ? '+' : ''}${vsPredRaw.toFixed(1)}%</span>`
      : '\u2014';
    const op2Val = w.op2_regs ? fmt(w.op2_regs, 'regs') : '\u2014';
    const costVal = isActual && w.cost ? fmt(w.cost, 'cost') : (w.pred_cost ? `<span class="pred-val">${fmt(w.pred_cost, 'cost')}</span>` : '\u2014');
    const cpaVal = isActual && w.cpa ? fmt(w.cpa, 'cpa') : (w.pred_cpa ? `<span class="pred-val">${fmt(w.pred_cpa, 'cpa')}</span>` : '\u2014');

    return `<tr${rowClsAttr}>
      <td>${w.week}${predLabel}</td>
      <td class="r">${regsVal}</td>
      <td class="r">${vsPredVal}</td>
      <td class="r" style="color:var(--color-text-subtle)">${op2Val}</td>
      <td class="r">${costVal}</td>
      <td class="r">${cpaVal}</td>
      <td class="r">${wowTxt}</td>
    </tr>`;
  }).join('');
}
</script>
