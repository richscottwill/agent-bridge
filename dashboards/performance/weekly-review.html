<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Weekly Review — Callout + Forecast Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
<script src="../canon-chart.js?v=2026-04-27"></script>
<link rel="preload" href="../data/callout-data.json" as="fetch" crossorigin>
<link rel="preload" href="../data/forecast-data.json" as="fetch" crossorigin>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e0e0e0}
.header{padding:24px 32px 16px;border-bottom:1px solid #2a2d35}
.header h1{font-size:22px;font-weight:600;color:#fff}
.header p{font-size:15px;color:#888;margin-top:4px}
.controls{display:flex;gap:12px;padding:16px 32px;border-bottom:1px solid #2a2d35;flex-wrap:wrap;align-items:center}
.controls label{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.tab-row{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;font-size:15px;cursor:pointer;background:transparent;border:1px solid #2a2d35;color:#888}
.tab.active{background:#1a3a5c;border-color:#4a9eff;color:#4a9eff}
.tab:hover{border-color:#4a9eff}
select{background:#1a1d27;border:1px solid #2a2d35;color:#e0e0e0;padding:6px 12px;border-radius:6px;font-size:15px;cursor:pointer}
select:hover{border-color:#4a9eff}
.nav-btn{background:#1a1d27;border:1px solid #2a2d35;color:#888;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:16px}
.nav-btn:hover{border-color:#4a9eff;color:#4a9eff}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.kpi-row{display:flex;gap:16px;padding:0 32px 16px;flex-wrap:wrap}
.kpi{background:#1a1d27;border:1px solid #2a2d35;border-radius:10px;padding:16px 20px;flex:1;min-width:140px}
.kpi .label{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.kpi .value{font-size:24px;font-weight:700;color:#fff;margin-top:4px}
.kpi .sub{font-size:14px;color:#888;margin-top:2px}
.good{color:#4ade80}.warn{color:#e0e0e0}.bad{color:#f87171}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 32px 16px}
.card{background:#1a1d27;border:1px solid #2a2d35;border-radius:10px;padding:20px}
.card-full{grid-column:1/-1}
.card h3{font-size:16px;font-weight:600;color:#ccc;margin-bottom:12px}
.chart-box{position:relative;height:400px}
.section-divider{padding:20px 32px 8px;font-size:11px;color:#555;text-transform:uppercase;letter-spacing:2px;border-top:1px solid #1a1d27}
table{width:100%;border-collapse:collapse;font-size:15px}
th{text-align:left;padding:8px 12px;border-bottom:1px solid #2a2d35;color:#888;font-weight:500;font-size:13px;text-transform:uppercase}
td{padding:8px 12px;border-bottom:1px solid #1f222b}
tr:hover{background:#1f222b}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:13px;font-weight:600}
.badge-green{background:#064e3b;color:#4ade80}
.badge-yellow{background:#2a2d35;color:#e0e0e0}
.badge-red{background:#7f1d1d;color:#f87171}
.badge-gray{background:#374151;color:#9ca3af}
.list{list-style:none;padding:0}
.list li{padding:5px 0;border-bottom:1px solid #1f222b;font-size:15px;line-height:1.4}
.list li:last-child{border-bottom:none}
.list li::before{content:"\2013";color:#666;margin-right:8px}
.list-important{color:#e0e0e0}
.list-important::before{content:"\25CF";color:#e0e0e0;margin-right:8px;font-size:10px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.proj-card{background:#0f1117;border:1px solid #2a2d35;border-radius:8px;padding:10px}
.proj-label{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.proj-value{font-size:19px;font-weight:700;color:#fff}
.proj-sub{font-size:13px;color:#888;margin-top:2px}
.proj-ci{font-size:12px;color:#555;margin-top:1px}
.dt td:first-child{color:#888;font-size:13px;text-transform:uppercase;letter-spacing:.3px;width:70px}
.dt td{padding:5px 8px}
.dt td:nth-child(2){width:80px}
.dt td:nth-child(3){width:70px}
.dt td:nth-child(4){width:70px}
.stakeholder-row{display:flex;justify-content:space-between;font-size:15px;padding:3px 0;border-bottom:1px solid #1f222b}
.stakeholder-row:last-child{border-bottom:none}
.stakeholder-row .role{color:#888}
.stakeholder-row .name{color:#fff;font-weight:500}
.empty-state{text-align:center;padding:40px;color:#888;font-size:16px}
.ts{font-size:13px;color:#444;text-align:right;padding:16px 32px}
.toc{display:flex;gap:6px;padding:6px 32px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #2a2d35;background:#12141c}
.toc-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-right:2px}
.toc a{font-size:12px;color:#888;text-decoration:none;padding:2px 8px;border-radius:3px;transition:all .15s}
.toc a:hover{color:#93b4f5;background:rgba(30,58,138,.15)}
.toc .toc-sep{color:#333;font-size:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="toc">
  <span class="toc-label">Jump to</span>
  <a href="#sec-callout">Callout</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-kpis">KPIs</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-trend">Trend</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-channels">Channels</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-projections">Projections</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-detail">Weekly Detail</a>
  <span class="toc-sep">&middot;</span>
  <a href="#sec-context">Context</a>
</div>
<div class="header">
  <h1>📊 Weekly Review</h1>
  <p>Callout narrative + full-year tracker • <span id="dataTs" style="color:#4a9eff"></span></p>
</div>
<div class="controls">
  <div><label>Market</label><br><div class="tab-row" id="marketTabs"></div></div>
  <div><label>Week</label><br>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="nav-btn" id="prevWeek">&#9664;</button>
      <select id="weekSelect"></select>
      <button class="nav-btn" id="nextWeek">&#9654;</button>
    </div>
  </div>
  <div style="margin-left:auto"><label>Metric</label><br>
    <div class="tab-row" id="metricTabs"></div>
  </div>
</div>

<!-- ============ CALLOUT SECTION (top — narrative first) ============ -->
<div class="grid" id="calloutGrid">
  <div class="card card-full empty-state">Loading&hellip;</div>
</div>

<!-- ============ TRACKER SECTION (bottom — full-year context) ============ -->
<div class="section-divider">Full-year tracker</div>
<div id="sec-kpis"></div>
<div class="kpi-row" id="kpiRow"></div>
<div class="grid">
  <div class="card card-full" id="sec-trend">
    <h3 style="display:flex;justify-content:space-between;align-items:center">
      Weekly Trend — highlighting selected week
      <span style="font-weight:400;font-size:13px">
        <button id="chartModeBtn" class="tab" style="font-size:12px;padding:3px 10px">Show calibration detail</button>
      </span>
    </h3>
    <div class="chart-box"><canvas id="mainChart"></canvas></div>
  </div>
  <div class="card card-full" id="sec-detail">
    <h3>Weekly Detail</h3>
    <div style="overflow-x:auto;max-height:500px;overflow-y:auto">
      <table><thead><tr>
        <th>Week</th><th style="text-align:right">Regs</th><th style="text-align:right">Pred</th><th style="text-align:right">OP2</th><th style="text-align:right">Cost</th>
        <th style="text-align:right">CPA</th><th>WoW &Delta;</th>
      </tr></thead><tbody id="weeklyBody"></tbody></table>
    </div>
  </div>
</div>
<div class="ts" id="genTs"></div>

<script>
// ============================================================================
// Weekly Review — merged forecast-tracker + callout-dashboard (shape A)
// Callout narrative on top, full-year tracker below. Both share the market
// tab row and the week selector; picking a week highlights it on the chart
// and drives the callout narrative.
// ============================================================================

let CALLOUTS = null;  // callout-data.json
let FORECAST = null;  // forecast-data.json
let curMarket = null;
let curWeek = null;
let curMetric = 'regs';
let chart = null;
let chartMode = 'default';

Promise.all([
  fetch('../data/callout-data.json?' + Date.now()).then(r => r.json()),
  fetch('../data/forecast-data.json?' + Date.now()).then(r => r.json()),
]).then(([cd, fc]) => {
  CALLOUTS = cd;
  FORECAST = fc;
  init();
}).catch((e) => {
  console.error('Weekly Review data load failed:', e);
  document.getElementById('calloutGrid').innerHTML =
    '<div class="card card-full empty-state bad">Failed to load data. Run refresh-forecast.py and refresh-callouts.py.</div>';
});

function init() {
  // Display order mirrors callout dashboard: WW + EU5 first, then key markets.
  const MARKET_ORDER = ['WW','US','EU5','CA','UK','DE','FR','IT','ES','JP','MX','AU'];
  // Intersect callout markets with forecast markets so every tab has both.
  const markets = MARKET_ORDER.filter(m =>
    (CALLOUTS.markets || []).includes(m) && (FORECAST.markets || []).includes(m)
  );
  curMarket = markets[0] || 'US';
  curWeek = (CALLOUTS.weeks && CALLOUTS.weeks[0]) || ('W' + (FORECAST.max_week || 15));

  // Market tabs
  const tabs = document.getElementById('marketTabs');
  markets.forEach(m => {
    const b = document.createElement('button');
    b.className = 'tab' + (m === curMarket ? ' active' : '');
    b.textContent = m;
    b.onclick = () => { curMarket = m; render(); };
    tabs.appendChild(b);
  });

  // Week selector + nav
  const sel = document.getElementById('weekSelect');
  (CALLOUTS.weeks || []).forEach(w => {
    const o = document.createElement('option');
    o.value = w; o.textContent = w;
    if (w === curWeek) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = () => { curWeek = sel.value; render(); };
  document.getElementById('prevWeek').onclick = () => navWeek(1);
  document.getElementById('nextWeek').onclick = () => navWeek(-1);

  // Metric tabs (for KPI display + future use — the chart shows regs+spend both)
  const metricTabs = document.getElementById('metricTabs');
  const metricDefs = [{key:'regs',label:'Registrations'},{key:'cost',label:'Cost'},{key:'cpa',label:'CPA'}];
  metricDefs.forEach(({key, label}) => {
    const b = document.createElement('button');
    b.className = 'tab' + (key === curMetric ? ' active' : '');
    b.textContent = label;
    b.dataset.metric = key;
    b.onclick = () => { curMetric = key; renderKPIs(); };
    metricTabs.appendChild(b);
  });

  document.getElementById('dataTs').textContent =
    'Callouts: ' + new Date(CALLOUTS.generated || Date.now()).toLocaleDateString() +
    ' • Forecast through: ' + (FORECAST.last_data_date || 'W' + FORECAST.max_week);
  document.getElementById('genTs').textContent = 'Generated: ' + new Date().toLocaleString();

  render();
}

function navWeek(dir) {
  const weeks = CALLOUTS.weeks || [];
  const i = weeks.indexOf(curWeek);
  const n = i + dir;
  if (n >= 0 && n < weeks.length) {
    curWeek = weeks[n];
    document.getElementById('weekSelect').value = curWeek;
    render();
  }
}

// ============================================================================
// Formatting helpers — shared across callout + tracker sections
// ============================================================================

function fmt(v, t) {
  if (v == null) return '\u2014';
  if (t === '$' || t === 'cost') return '$' + Math.round(v).toLocaleString();
  if (t === '%') return (v > 0 ? '+' : '') + Number(v).toFixed(1) + '%';
  if (t === 'cpa') return '$' + Number(v).toFixed(0);
  if (t === 'cvr') return Number(v).toFixed(2) + '%';
  return Math.round(v).toLocaleString();
}

function cls(v, inv) {
  if (v == null) return '';
  if (inv) return v > 5 ? 'bad' : v < -5 ? 'good' : 'warn';
  return v > 5 ? 'good' : v < -5 ? 'bad' : 'warn';
}

function delta(v, inv) {
  if (v == null) return '';
  const c = cls(v, inv);
  return '<span class="' + c + '">' + (v > 0 ? '+' : '') + v.toFixed(0) + '%</span>';
}

// ============================================================================
// RENDER — orchestrates callout + tracker on every market/week change
// ============================================================================

function render() {
  // Update active states
  document.querySelectorAll('#marketTabs .tab').forEach(b => {
    b.className = 'tab' + (b.textContent === curMarket ? ' active' : '');
  });
  const weeks = CALLOUTS.weeks || [];
  document.getElementById('prevWeek').disabled = weeks.indexOf(curWeek) >= weeks.length - 1;
  document.getElementById('nextWeek').disabled = weeks.indexOf(curWeek) <= 0;

  renderCallout();
  renderKPIs();
  renderChart();
  renderTable();
}

// ============================================================================
// CALLOUT — top section (narrative, decisions, stakeholders, channels)
// ============================================================================

function renderCallout() {
  const c = (CALLOUTS.callouts[curMarket] || {})[curWeek];
  const g = document.getElementById('calloutGrid');
  if (!c) {
    g.innerHTML = '<div class="card card-full empty-state" id="sec-callout">No callout for ' + curMarket + ' ' + curWeek + '</div>';
    return;
  }

  let html = '';

  // Full callout narrative
  const calloutHtml = (c.full_callout || c.headline || '').replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
  html += '<div class="card card-full" id="sec-callout" style="border-left:3px solid #4a9eff">' +
    '<h3>' + curWeek + ' &mdash; ' + curMarket +
    '<span style="color:#888;font-weight:400;font-size:14px;float:right">' + (c.period || '') + '</span></h3>' +
    '<div style="font-size:16px;line-height:1.6">' + calloutHtml + '</div></div>';

  // Brand + Non-Brand channel detail
  html += channelCard('Brand', c.brand_detail, 'sec-channels');
  html += channelCard('Nonbrand', c.nb_detail);

  // Projections (from callouts)
  html += '<div class="card card-full" id="sec-projections"><h3>Projections</h3><div id="projContent"></div></div>';

  // External factors
  html += '<div class="card card-full" id="sec-context"><h3>Context &amp; External Factors</h3><ul class="list" id="extList"></ul></div>';

  // Drivers + stakeholders
  html += '<div class="card"><h3>Performance Drivers</h3><ul class="list" id="driverList"></ul></div>';
  html += '<div class="card"><h3>Stakeholders</h3><div id="stakeCard"></div></div>';

  g.innerHTML = html;

  renderProj(c.projections || {});
  renderList('driverList', c.decisions);
  renderExternal(c.external_factors);
  renderStake((CALLOUTS.stakeholders || {})[curMarket] || {});
}

function channelCard(title, d, anchorId) {
  const idAttr = anchorId ? ' id="' + anchorId + '"' : '';
  if (!d) return '<div class="card"' + idAttr + '><h3>' + title + '</h3><div style="color:#888;font-size:15px">No data</div></div>';
  const cost = d.cost || ((d.cpa && d.regs) ? Math.round(d.cpa * d.regs) : null);
  const costFmt = cost ? '$' + cost.toLocaleString() : '\u2014';
  return '<div class="card"' + idAttr + '><h3>' + title + '</h3>' +
    '<table class="dt" style="table-layout:fixed"><colgroup><col style="width:60px"><col style="width:75px"><col style="width:65px"><col style="width:65px"><col style="width:65px"></colgroup>' +
    '<thead><tr><th></th><th style="text-align:right">Value</th><th style="text-align:right">WoW</th><th style="text-align:right">YoY</th><th style="text-align:right">4wk avg</th></tr></thead><tbody>' +
    mRow('Regs', fmt(d.regs), d.regs_wow, false, d.regs_yoy, false, d.regs_vs4wk, false) +
    mRow('Cost', costFmt, d.cost_wow, false, d.cost_yoy, false, d.cost_vs4wk, false) +
    mRow('CPA', fmt(d.cpa, 'cpa'), d.cpa_wow, true, d.cpa_yoy, true, d.cpa_vs4wk, true) +
    mRow('CVR', fmt(d.cvr, 'cvr'), d.cvr_wow, false, d.cvr_yoy, false, d.cvr_vs4wk, false) +
    mRow('Clicks', fmt(d.clicks), d.clicks_wow, false, d.clicks_yoy, false, d.clicks_vs4wk, false) +
    '</tbody></table></div>';
}

function mRow(label, value, wow, wInv, yoy, yInv, vs4, v4Inv) {
  return '<tr><td>' + label + '</td>' +
    '<td style="text-align:right;font-weight:600;color:#fff">' + value + '</td>' +
    '<td style="text-align:right">' + delta(wow, wInv) + '</td>' +
    '<td style="text-align:right">' + delta(yoy, yInv) + '</td>' +
    '<td style="text-align:right">' + delta(vs4, v4Inv) + '</td></tr>';
}

function renderProj(proj) {
  const el = document.getElementById('projContent');
  if (!el) return;
  if (!proj || (!proj.month_end && !proj.quarter_end && !proj.next_week)) {
    el.innerHTML = '<div style="color:#888;font-size:15px">No projection data</div>';
    return;
  }
  function pc(title, pe) {
    if (!pe) return '';
    const ci = pe.ci_lo && pe.ci_hi ? '<div class="proj-ci">CI: ' + fmt(pe.ci_lo) + '\u2013' + fmt(pe.ci_hi) + '</div>' : '';
    let vs = '';
    if (pe.vs_op2_spend != null) {
      const c = pe.vs_op2_spend > 0 ? 'warn' : 'good';
      vs = '<div class="proj-sub ' + c + '">' + (pe.vs_op2_spend > 0 ? '+' : '') + pe.vs_op2_spend.toFixed(1) + '% vs OP2</div>';
    }
    return '<div class="proj-card">' +
      '<div class="proj-label">' + title + (pe.period ? ' (' + pe.period + ')' : '') + '</div>' +
      '<div class="proj-value">' + fmt(pe.regs_proj) + ' regs</div>' + ci +
      '<div class="proj-sub">' + fmt(pe.spend_proj, '$') + '</div>' +
      (pe.cpa_proj ? '<div class="proj-sub">' + fmt(pe.cpa_proj, 'cpa') + ' CPA</div>' : '') +
      vs + '</div>';
  }
  el.innerHTML = '<div class="proj-grid">' +
    pc('Next Week', proj.next_week) +
    pc('Month-End', proj.month_end) +
    pc('Quarter-End', proj.quarter_end) +
    (proj.year_end ? pc('Year-End', proj.year_end) : '') +
    '</div>';
}

function renderList(id, items) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!items || !items.length) { el.innerHTML = '<li style="color:#888">None</li>'; return; }
  el.innerHTML = items.map(i => '<li>' + i + '</li>').join('');
}

function renderExternal(items) {
  const el = document.getElementById('extList');
  if (!el) return;
  if (!items || !items.length) { el.innerHTML = '<li style="color:#888">None</li>'; return; }
  el.innerHTML = items.map(i => {
    if (typeof i === 'string') return '<li>' + i + '</li>';
    if (i.important) return '<li class="list-important">' + i.text + '</li>';
    return '<li>' + i.text + '</li>';
  }).join('');
}

function renderStake(st) {
  const el = document.getElementById('stakeCard');
  if (!el) return;
  el.innerHTML = Object.entries(st).map(([r, n]) =>
    '<div class="stakeholder-row"><span class="role">' +
    r.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) +
    '</span><span class="name">' + n + '</span></div>'
  ).join('') || '<div style="color:#888">No data</div>';
}

// ============================================================================
// TRACKER — bottom section (KPIs, canon-chart, weekly detail table)
// ============================================================================

function renderKPIs() {
  const row = document.getElementById('kpiRow');
  // Highlight active metric tab
  document.querySelectorAll('#metricTabs .tab').forEach(b => {
    b.className = 'tab' + (b.dataset.metric === curMetric ? ' active' : '');
  });

  const weeks = (FORECAST.weekly && FORECAST.weekly[curMarket]) || [];
  if (!weeks.length) { row.innerHTML = '<div class="kpi"><div class="label">No Data</div></div>'; return; }
  const maxWk = FORECAST.max_week || 15;
  const actualWeeks = weeks.filter(w => w.wk <= maxWk && (w.regs > 0 || w.cost > 0));
  const ytd = actualWeeks.reduce((s, w) => s + (w[curMetric] || 0), 0);
  const last = actualWeeks[actualWeeks.length - 1] || {};
  const prev = actualWeeks.length > 1 ? actualWeeks[actualWeeks.length - 2] : null;
  const wow = prev && prev[curMetric] ? ((last[curMetric] - prev[curMetric]) / prev[curMetric] * 100).toFixed(1) : null;
  const wowClass = wow > 0 ? 'good' : wow < -5 ? 'bad' : 'warn';
  const w52 = weeks.find(w => w.wk === 52);
  const yearEndPred = w52 && w52.pred_regs ? w52.pred_regs : null;

  row.innerHTML = `
    <div class="kpi"><div class="label">YTD ${curMetric}</div><div class="value">${fmt(ytd, curMetric)}</div><div class="sub">W1&ndash;W${maxWk}</div></div>
    <div class="kpi"><div class="label">Latest Week</div><div class="value">${fmt(last[curMetric], curMetric)}</div><div class="sub">${last.week || ''}</div></div>
    <div class="kpi"><div class="label">WoW Change</div><div class="value ${wowClass}">${wow != null ? (wow > 0 ? '+' : '') + wow + '%' : '\u2014'}</div></div>
    ${curMetric === 'regs' && yearEndPred ? `<div class="kpi"><div class="label">Year-End Pred</div><div class="value">${fmt(yearEndPred, 'regs')}</div><div class="sub">W52 forecast</div></div>` : ''}
    ${curMetric === 'regs' && last.op2_regs ? `<div class="kpi"><div class="label">OP2 Target</div><div class="value">${fmt(last.op2_regs, 'regs')}</div><div class="sub">weekly</div></div>` : ''}
  `;
}

function renderChart() {
  if (!FORECAST) return;
  chart = CanonChart.render('mainChart', {
    forecastData: FORECAST,
    market: curMarket,
    mode: chartMode,
    highlightWeek: curWeek,
    chartInstance: chart,
  });
  const btn = document.getElementById('chartModeBtn');
  if (btn) {
    btn.textContent = chartMode === 'calibration' ? 'Show default view' : 'Show calibration detail';
    btn.onclick = () => {
      chartMode = chartMode === 'calibration' ? 'default' : 'calibration';
      renderChart();
    };
  }
}

function renderTable() {
  const body = document.getElementById('weeklyBody');
  const weeks = (FORECAST.weekly && FORECAST.weekly[curMarket]) || [];
  const maxWk = FORECAST.max_week || 15;
  body.innerHTML = weeks.map((w, i) => {
    const isActual = w.regs > 0 || w.cost > 0;
    const isFuture = w.wk > maxWk;
    const prev = i > 0 ? weeks[i - 1] : null;
    const prevRegs = prev && prev.regs > 0 ? prev.regs : (prev && prev.pred_regs ? prev.pred_regs : null);
    const curRegs = isActual ? w.regs : w.pred_regs;
    const wow = prevRegs && curRegs ? ((curRegs - prevRegs) / prevRegs * 100).toFixed(1) : null;
    const wowBadge = wow != null
      ? `<span class="badge ${wow > 5 ? 'badge-green' : wow < -5 ? 'badge-red' : 'badge-yellow'}">${wow > 0 ? '+' : ''}${wow}%</span>`
      : '<span class="badge badge-gray">\u2014</span>';
    const rowStyle = isFuture ? 'opacity:0.5' : '';
    const predLabel = isFuture ? ' <span style="color:#f97316;font-size:12px">pred</span>' : '';
    const orange = 'color:#f97316';

    const regsVal = isActual ? fmt(w.regs, 'regs') : (w.pred_regs ? `<span style="${orange}">${fmt(w.pred_regs, 'regs')}</span>` : '\u2014');
    const predVal = w.pred_regs ? fmt(w.pred_regs, 'regs') : '\u2014';
    const op2Val = w.op2_regs ? fmt(w.op2_regs, 'regs') : '\u2014';
    const costVal = isActual && w.cost ? fmt(w.cost, 'cost') : (w.pred_cost ? `<span style="${orange}">${fmt(w.pred_cost, 'cost')}</span>` : '\u2014');
    const cpaVal = isActual && w.cpa ? fmt(w.cpa, 'cpa') : (w.pred_cpa ? `<span style="${orange}">${fmt(w.pred_cpa, 'cpa')}</span>` : '\u2014');

    // Highlight the selected week's row to tie it to the callout above
    const isSelected = w.week === curWeek || ('W' + String(w.wk).padStart(2, '0')) === curWeek;
    const selBg = isSelected ? 'background:rgba(74,158,255,0.08);' : '';

    return `<tr style="${rowStyle}${selBg}">
      <td>${w.week}${predLabel}</td>
      <td style="text-align:right">${regsVal}</td>
      <td style="text-align:right;color:#f97316">${predVal}</td>
      <td style="text-align:right;color:#6c7086">${op2Val}</td>
      <td style="text-align:right">${costVal}</td>
      <td style="text-align:right">${cpaVal}</td>
      <td>${wowBadge}</td>
    </tr>`;
  }).join('');
}
</script>

<script src="../shared/section-freshness.js" defer></script>
