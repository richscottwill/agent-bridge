<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Performance — Weekly Review &amp; Projection Engine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#d0d8e0;display:flex;flex-direction:column}
.subnav{background:#14161e;border-bottom:1px solid #1e2028;padding:0 24px;display:flex;align-items:center;gap:0;flex-shrink:0;backdrop-filter:blur(12px)}
.subnav-brand{color:#f0f4f8;font-weight:700;font-size:0.92em;padding:12px 16px 12px 0;border-right:1px solid #1e2028;margin-right:4px;letter-spacing:1.3px;text-transform:uppercase}
.subnav-link{color:#8899aa;text-decoration:none;padding:12px 18px;font-size:0.94em;font-weight:500;border-bottom:2px solid transparent;transition:all .15s;cursor:pointer;letter-spacing:.3px;user-select:none}
.subnav-link:hover{color:#d0d8e0;background:rgba(74,158,255,0.06)}
.subnav-link.active{color:#4a9eff;border-bottom-color:#4a9eff}
.frame-wrap{flex:1;position:relative;min-height:0}
.frame-wrap iframe{width:100%;height:100%;border:none;display:block}
</style>
</head>
<body>
<div class="subnav">
  <span class="subnav-brand">Performance</span>
  <a class="subnav-link active" data-view="weekly-review.html">Weekly Review</a>
  <a class="subnav-link" data-view="../projection.html">Projection Engine</a>
</div>
<div class="frame-wrap">
  <iframe id="perfFrame" src="weekly-review.html"></iframe>
</div>
<script>
(function(){
  const frame = document.getElementById('perfFrame');
  const links = document.querySelectorAll('.subnav-link');
  const STORAGE_KEY = 'perf_subtab_view';
  // Legacy values that need to migrate to the new subtab layout. Anything else
  // in this list is a valid current subtab. Old values get rewritten to the
  // default ('weekly-review.html') so returning users don't land on a dead page.
  const CURRENT_VIEWS = ['weekly-review.html', '../projection.html'];
  const LEGACY_REMAP = {
    '../forecast-tracker.html': 'weekly-review.html',
    '../callout-dashboard.html': 'weekly-review.html',
  };

  function setActive(view){
    links.forEach(l => l.classList.toggle('active', l.dataset.view === view));
    frame.src = view + (view.includes('?') ? '&' : '?') + 't=' + Date.now();
    try { localStorage.setItem(STORAGE_KEY, view); } catch(e){}
  }

  // Restore last sub-tab on load (default: Weekly Review)
  let initial = 'weekly-review.html';
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved && LEGACY_REMAP[saved]) {
      initial = LEGACY_REMAP[saved];
      localStorage.setItem(STORAGE_KEY, initial);
    } else if (CURRENT_VIEWS.includes(saved)) {
      initial = saved;
    }
  } catch(e){}
  if (initial !== 'weekly-review.html') setActive(initial);

  links.forEach(l => {
    l.addEventListener('click', (e) => {
      e.preventDefault();
      setActive(l.dataset.view);
    });
  });
})();
</script>

<script src="../shared/section-freshness.js" defer></script>
</body>
</html>
