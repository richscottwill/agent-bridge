<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Kiro Dashboard Directory - Kiro Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#eaeaea;overflow:hidden;height:100vh}
.shell{display:flex;flex-direction:column;height:100vh}
.topbar{padding:12px 20px 0;flex-shrink:0}
.topbar h1{font-size:22px;font-weight:700;color:#fff;margin-bottom:2px}
.topbar .sub{font-size:14px;color:#888;margin-bottom:8px}
.nav{display:flex;gap:6px;padding:0 20px 8px;border-bottom:1px solid #1e2028;flex-shrink:0;flex-wrap:wrap}
.nav a{display:block;padding:6px 14px;border-radius:6px;font-size:15px;font-weight:500;text-decoration:none;color:#888;background:#14161e;border:1px solid #1e2028;transition:all .15s;cursor:pointer;white-space:nowrap}
.nav a:hover{border-color:#3b82f6;color:#d4d4d4}
.nav a.active{background:#172040;border-color:#3b82f6;color:#93b4f5}
.content{flex:1;position:relative;min-height:0}
.content iframe{width:100%;height:100%;border:none;position:absolute;top:0;left:0}
.home-wrap{height:100%;overflow-y:auto;padding:12px 20px 20px}

/* Hero */
.hero{background:linear-gradient(135deg,#172040 0%,#1a2a4a 100%);border:1px solid #2a3a5c;border-radius:8px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.hero-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#4a9eff;white-space:nowrap}
.hero-text{font-size:16px;font-weight:600;color:#fff;flex:1}
.hero-meta{font-size:14px;color:#6b8acd;white-space:nowrap}

/* WBR Health Score */
.wbr-health{background:linear-gradient(135deg,#0f1a2e 0%,#162040 100%);border:1px solid #2a3a5c;border-radius:8px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:16px}
.wbr-score-num{font-size:32px;font-weight:800;line-height:1;min-width:60px;text-align:center}
.wbr-score-num.score-high{color:#4ade80}
.wbr-score-num.score-mid{color:#fbbf24}
.wbr-score-num.score-low{color:#f87171}
.wbr-score-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#4a9eff;margin-bottom:2px}
.wbr-score-sub{font-size:12px;color:#6b8acd}
.wbr-trend{font-size:18px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.wbr-trend .arrow-up{color:#4ade80}
.wbr-trend .arrow-down{color:#f87171}
.wbr-trend .arrow-flat{color:#888}
.wbr-trend-delta{font-size:13px;color:#6b8acd}
.wbr-dims{display:flex;gap:8px;flex:1;justify-content:flex-end;flex-wrap:wrap}
.wbr-dim{text-align:center;min-width:48px}
.wbr-dim-val{font-size:14px;font-weight:600;color:#d4d4d4}
.wbr-dim-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.3px}

/* Section labels */
.section-label{font-size:13px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}

/* Unified card */
.unified-card{background:#14161e;border:1px solid #1e2028;border-radius:6px;padding:12px 14px;margin-bottom:10px}

/* Daily Blocks */
.blocks-columns{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.block-col{padding:0 10px;border-right:1px solid #1e2028}
.block-col:first-child{padding-left:0}
.block-col:last-child{border-right:none;padding-right:0}
.block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.block-name{font-size:15px;font-weight:600;color:#d4d4d4}
.block-count{font-size:13px;color:#888;background:#1e2028;padding:1px 7px;border-radius:4px}
.block-count.over{color:#fbbf24;background:rgba(113,63,18,.3)}
.block-cap{font-size:12px;color:#666;margin-bottom:6px}
.block-tasks{max-height:180px;overflow-y:auto}
.task-row{font-size:13px;padding:3px 0;border-bottom:1px solid #181a22;line-height:1.35;display:flex;align-items:baseline;gap:4px;cursor:pointer}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:#181a22;border-radius:3px}
.task-name{color:#d4d4d4;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.35}
.task-meta-inline{font-size:11px;color:#666;white-space:nowrap;flex-shrink:0}
.wip-warning{font-size:12px;color:#fbbf24;margin-top:4px;padding:3px 6px;background:rgba(113,63,18,.15);border-radius:4px}

/* Badges */
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:11px;font-weight:600;margin-left:3px;vertical-align:middle}
.badge-red{background:rgba(127,29,29,.4);color:#e8a0a0}
.badge-orange{background:rgba(113,63,18,.4);color:#e0c080}
.badge-gray{background:rgba(55,65,81,.4);color:#9ca3af}
.badge-blue{background:rgba(30,58,138,.4);color:#93b4f5}

/* Initiator badge */
.init-badge{font-size:10px;padding:1px 4px;border-radius:3px;font-weight:600;white-space:nowrap;flex-shrink:0}
.init-me{background:rgba(30,58,138,.25);color:#7da2d4}
.init-mgr{background:rgba(113,63,18,.25);color:#d4b070}
.init-other{background:rgba(55,65,81,.3);color:#9ca3af}

/* Status pills */
.status-pill{font-size:11px;padding:1px 5px;border-radius:3px;font-weight:600;cursor:pointer;border:none;line-height:1.4}
.status-pill.not-started{background:rgba(55,65,81,.4);color:#9ca3af}
.status-pill.in-progress{background:rgba(30,58,138,.3);color:#93b4f5}
.status-pill.done{background:rgba(6,78,59,.4);color:#4ade80}

/* Tables (shared) */
.dtable{width:100%;border-collapse:collapse;font-size:13px}
.dtable th{text-align:left;padding:6px 8px;color:#666;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #1e2028;position:sticky;top:0;background:#14161e;z-index:1}
.dtable td{padding:6px 8px;border-bottom:1px solid #181a22;vertical-align:top;line-height:1.4}
.dtable tr:last-child td{border-bottom:none}
.dtable tr:hover td{background:#181a22}
.dtable tr{cursor:pointer;transition:background .1s}
.td-text{color:#d4d4d4;max-width:300px}
.td-context{color:#888;font-size:12px;max-width:260px;line-height:1.35}
.td-meta{color:#666;font-size:12px;white-space:nowrap}
.td-type{white-space:nowrap}
.type-tag{font-size:11px;padding:2px 6px;border-radius:3px;font-weight:600;white-space:nowrap}
.type-diff{background:rgba(30,58,138,.25);color:#93b4f5}
.type-delegate{background:rgba(113,63,18,.2);color:#d4b070}
.type-comm{background:rgba(6,78,59,.25);color:#4ade80}

/* Table action buttons */
.tbl-btn{background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:3px;font-size:13px;line-height:1;transition:all .1s}
.tbl-btn:hover{background:rgba(255,255,255,.06)}
.tbl-dismiss{color:#555}
.tbl-dismiss:hover{color:#e8a0a0}
.tbl-check{color:#555;font-size:15px}
.tbl-check:hover{color:#4ade80}
.tbl-restore{color:#555;font-size:12px}
.tbl-restore:hover{color:#93b4f5}

/* Table scroll wrapper — dynamic height, no cap */
.tbl-wrap{overflow-y:auto;border-radius:4px}

/* Tab bar for ledger */
.tab-bar{display:flex;gap:4px;margin-bottom:8px}
.tab-btn{padding:4px 12px;border-radius:4px;font-size:13px;cursor:pointer;background:#1a1d27;border:1px solid #2a2d35;color:#888;transition:all .15s}
.tab-btn:hover{border-color:#3b82f6;color:#d4d4d4}
.tab-btn.active{background:#172040;border-color:#3b82f6;color:#93b4f5}
.tab-count{font-size:11px;color:#555;margin-left:3px}

/* Ledger stats row */
.ledger-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #1e2028}
.lstat{text-align:center}
.lstat .num{font-size:22px;font-weight:700;color:#fff}
.lstat .label{font-size:12px;color:#666;margin-top:1px}
.lstat .sub{font-size:12px;color:#555}

/* Detail panel */
.detail-panel{display:none;position:fixed;top:0;right:0;width:min(420px,90vw);height:100vh;background:#14161e;border-left:1px solid #2a2d35;z-index:100;overflow-y:auto;padding:20px;box-shadow:-4px 0 20px rgba(0,0,0,.4)}
.detail-panel.open{display:block}
.detail-close{position:absolute;top:12px;right:12px;background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px 8px}
.detail-close:hover{color:#fff}
.detail-panel h2{font-size:16px;font-weight:600;color:#fff;margin-bottom:12px;padding-right:30px}
.detail-section{margin-bottom:12px}
.detail-label{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-text{font-size:14px;color:#d4d4d4;line-height:1.5}
.detail-quote{font-size:14px;color:#777;font-style:italic;line-height:1.5}



/* TOC */
.toc{display:flex;gap:6px;padding:4px 20px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #1e2028;flex-shrink:0;background:#12141c}
.toc-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-right:2px}
.toc a{font-size:12px;color:#888;text-decoration:none;padding:2px 8px;border-radius:3px;transition:all .15s}
.toc a:hover{color:#93b4f5;background:rgba(30,58,138,.15)}
.toc .toc-sep{color:#333;font-size:12px}

/* Empty state */
.empty-row{color:#555;font-size:12px;padding:12px 8px;text-align:center}

.g{color:#4ade80}.w{color:#d4d4d4}.b{color:#f87171}.y{color:#e0e0e0}
.ts{font-size:13px;color:#444;text-align:right;padding-top:6px}

/* Data staleness indicator — #12 */
.fresh{color:#4ade80}
.stale-warn{color:#fbbf24}
.stale-danger{color:#f87171}

/* Change-since-last-look badges — #11 */
.change-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600;letter-spacing:.2px;margin-left:8px;vertical-align:middle;background:rgba(59,130,246,.15);color:#6b9bd2;line-height:1.5;white-space:nowrap;opacity:0;animation:badgeFadeIn .4s ease-out forwards}
@keyframes badgeFadeIn{to{opacity:1}}

@media(max-width:900px){
  .blocks-columns{grid-template-columns:repeat(2,1fr)}
  .block-col{border-bottom:1px solid #1e2028}
  .block-col:nth-child(2){border-right:none}
  .ledger-stats{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:700px){
  .hero{flex-direction:column;align-items:flex-start;gap:4px}
  .detail-panel{width:100%!important}
  .blocks-columns{grid-template-columns:1fr}
  .block-col{border-right:none}
  .ledger-stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="shell">
<div class="topbar">
  <h1>Kiro Dashboard</h1>
  <div class="sub">Richard Williams — Paid Search <span id="dataTs"></span></div>
</div>
<div class="nav" id="nav">
  <a data-view="home" class="active">Command Center</a>
  <a data-view="agent-activity.html">Agent Activity</a>
  <a data-view="system-flow.html">System Flow</a>
  <a data-view="contribute.html">Contribute</a>
  <a data-view="performance/index.html">Performance</a>
  <a data-view="body-system/index.html">Body System</a>
  <a data-view="state-files/index.html">State Files</a>
  <a data-view="wiki-search.html">Wiki Search</a>
  <a data-view="ps-test-calculator.html">Test Calculator</a>
  <a data-view="projection.html">Projections</a>
</div>
<div class="toc" id="tocSection"></div>
<div class="content" id="content">
  <div class="home-wrap" id="homeContent">
    <div id="heroSection"></div>
    <div id="blockSection"></div>
    <div id="ledgerSection"></div>
    <div id="intelSection"></div>

    <div class="ts" id="genTs"></div>
  </div>
  <iframe id="dashFrame" style="display:none"></iframe>
</div>
</div>
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">&times;</button>
  <div id="detailContent"></div>
</div>

<script>
/* ══ Nav ══ */
const nav=document.getElementById('nav'),home=document.getElementById('homeContent'),frame=document.getElementById('dashFrame');
function switchView(v){
  nav.querySelectorAll('a').forEach(x=>x.classList.remove('active'));
  const t=nav.querySelector('a[data-view="'+v+'"]');if(t)t.classList.add('active');
  const toc=document.getElementById('tocSection');
  if(v==='home'){home.style.display='block';frame.style.display='none';if(toc)toc.style.display='flex'}
  else{home.style.display='none';frame.style.display='block';frame.src=v+'?t='+Date.now();if(toc)toc.style.display='none'}
  localStorage.setItem('kiro_dash_view',v);
}
nav.addEventListener('click',e=>{const a=e.target.closest('a[data-view]');if(!a)return;e.preventDefault();switchView(a.dataset.view)});
const savedView=localStorage.getItem('kiro_dash_view');
if(savedView&&savedView!=='home'){
  // Migrate legacy saved views — forecast-tracker + callout-dashboard are now
  // under performance/, so redirect gracefully. Anything else must match a
  // current nav entry or we fall back to home.
  let targetView=savedView;
  if(savedView==='forecast-tracker.html'||savedView==='callout-dashboard.html'){
    targetView='performance/index.html';
    localStorage.setItem('kiro_dash_view',targetView);
  }
  if(nav.querySelector('a[data-view="'+targetView+'"]')){
    switchView(targetView);
  }
}

/* ══ Detail panel ══ */
let CC=null;
function openDetail(section,idx){
  if(!CC)return;const items=CC[section];if(!items||!items[idx])return;
  const item=items[idx],panel=document.getElementById('detailPanel'),content=document.getElementById('detailContent');
  let h='';
  if(section==='commitments'||section==='completed_commitments'||section==='dismissed_commitments'){
    const initLabel=item.said_by==='richard'?'You volunteered this':item.said_by==='other'?(extractName(item.person)?extractName(item.person)+' asked this of you':'Someone asked this of you'):'';
    h=`<h2>${item.text}</h2>
      ${initLabel?`<div class="detail-section"><div class="detail-label">Initiated By</div><div class="detail-text">${initLabel}</div></div>`:''}
      ${item.quote?`<div class="detail-section"><div class="detail-label">Quote</div><div class="detail-quote">\u201c${item.quote}\u201d</div></div>`:''}
      <div class="detail-section"><div class="detail-label">Source</div><div class="detail-text">${item.source||''}${item.person?' \u2014 '+item.person:''}</div></div>
      ${item.context?`<div class="detail-section"><div class="detail-label">Context</div><div class="detail-text">${item.context}</div></div>`:''}
      <div class="detail-section"><div class="detail-label">Age</div><div class="detail-text">${item.days_old||0} day(s)</div></div>`;
  } else if(section==='delegate'){
    h=`<h2>${item.task}</h2>
      <div class="detail-section"><div class="detail-label">Hand Off To</div><div class="detail-text">${item.to||''}</div></div>
      <div class="detail-section"><div class="detail-label">Rationale</div><div class="detail-text">${item.reason||''}</div></div>
      ${item.context?`<div class="detail-section"><div class="detail-label">Context</div><div class="detail-text">${item.context}</div></div>`:''}`;
  } else if(section==='communicate'){
    h=`<h2>${item.text}</h2>
      <div class="detail-section"><div class="detail-label">Audience</div><div class="detail-text">${item.audience||''}</div></div>
      ${item.context?`<div class="detail-section"><div class="detail-label">Context</div><div class="detail-text">${item.context}</div></div>`:''}`;
  } else if(section==='differentiate'||section==='completed_differentiate'){
    h=`<h2>${item.action}</h2>
      <div class="detail-section"><div class="detail-label">Why It Matters</div><div class="detail-text">${item.why||''}</div></div>
      ${item.context?`<div class="detail-section"><div class="detail-label">Context</div><div class="detail-text">${item.context}</div></div>`:''}`;
  }
  content.innerHTML=h;panel.classList.add('open');
}
function openBlockDetail(bi,ti){
  if(!CC||!CC.blocks)return;const block=CC.blocks[bi];if(!block)return;const task=block.tasks[ti];if(!task)return;
  document.getElementById('detailContent').innerHTML=`<h2>${task.name}</h2>
    <div class="detail-section"><div class="detail-label">Block</div><div class="detail-text">${block.name}</div></div>
    <div class="detail-section"><div class="detail-label">Project</div><div class="detail-text">${task.project||'\u2014'}</div></div>
    <div class="detail-section"><div class="detail-label">Due</div><div class="detail-text">${task.due||'No date'}${task.overdue?' <span class="b">('+task.days_overdue+'d overdue)</span>':''}</div></div>
    <div class="detail-section"><div class="detail-label">Priority</div><div class="detail-text">${task.priority||'\u2014'}</div></div>
    ${task.next_action?`<div class="detail-section"><div class="detail-label">Next Action</div><div class="detail-text" style="color:#6b8acd">${task.next_action}</div></div>`:''}
    ${task.kiro?`<div class="detail-section"><div class="detail-label">Kiro Notes</div><div class="detail-text" style="color:#888">${task.kiro}</div></div>`:''}`;
  document.getElementById('detailPanel').classList.add('open');
}
function closeDetail(){document.getElementById('detailPanel').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});

/* ══ Helpers ══ */
function priBadge(p){
  if(p==='Today')return'<span class="badge badge-orange">TODAY</span>';
  if(p==='Urgent')return'<span class="badge badge-red">URGENT</span>';return'';
}
function odBadge(d){return d>0?'<span class="badge badge-gray">'+d+'d</span>':''}
function initBadge(saidBy,person){
  if(saidBy==='richard')return'<span class="init-badge init-me">I said</span>';
  if(saidBy==='other'){const n=extractName(person);return n?'<span class="init-badge init-other">'+n+' asked</span>':'<span class="init-badge init-other">Asked of me</span>'}
  if(saidBy==='brandon')return'<span class="init-badge init-mgr">Brandon asked</span>';return'';
}
function extractName(p){
  if(!p)return'';p=p.trim();if(p.toLowerCase().startsWith('for '))return'';
  const f=p.split(/[\s,(/]+/)[0];
  if(f.length<2||/^(for|the|all|full|au|mx|us|ww)$/i.test(f))return'';return f;
}
function statusPill(s){
  const st=s||'not_started';
  const labels={'not_started':'\u2b1c','in_progress':'\ud83d\udd04','done':'\u2705'};
  const cls={'not_started':'not-started','in_progress':'in-progress','done':'done'};
  return'<span class="status-pill '+(cls[st]||'not-started')+'">'+(labels[st]||'\u2b1c')+'</span>';
}

/* ══ Dismiss / Ledger state (localStorage) ══ */
function getDismissed(k){return JSON.parse(localStorage.getItem('cc_d_'+k)||'[]')}
function setDismissed(k,a){localStorage.setItem('cc_d_'+k,JSON.stringify(a))}
function dismissIntel(section,idx){
  const d=getDismissed(section);if(!d.includes(idx))d.push(idx);setDismissed(section,d);renderIntel(CC);
}
function getLedgerState(){return JSON.parse(localStorage.getItem('cc_ledger_state')||'{"done":[],"dismissed":[]}')}
function saveLedgerState(s){localStorage.setItem('cc_ledger_state',JSON.stringify(s))}
function markCommitmentDone(hash){
  const note=prompt('Quick note (optional) — what did you do?','');
  const s=getLedgerState();if(!s.done.includes(hash))s.done.push(hash);
  s.dismissed=s.dismissed.filter(t=>t!==hash);saveLedgerState(s);
  persistLedgerAction(hash,'done',note||'');
  renderLedger(CC);
}
function dismissCommitment(hash){
  const note=prompt('Why dismiss? (optional)','');
  const s=getLedgerState();if(!s.dismissed.includes(hash))s.dismissed.push(hash);
  s.done=s.done.filter(t=>t!==hash);saveLedgerState(s);
  persistLedgerAction(hash,'dismissed',note||'');
  renderLedger(CC);
}
function restoreCommitment(hash){
  const s=getLedgerState();s.done=s.done.filter(t=>t!==hash);s.dismissed=s.dismissed.filter(t=>t!==hash);
  saveLedgerState(s);
  persistLedgerAction(hash,'not_started','Restored to active');
  renderLedger(CC);
}
function persistLedgerAction(hash,status,note){
  const item=(CC.commitments||[]).find(it=>(it.text_hash||it.text)===hash);
  const feedback={
    text_hash:hash,
    text:item?item.text:'',
    status:status,
    note:note||'',
    timestamp:new Date().toISOString(),
    tags:item?['commitment']:[],
    source:item?item.source:'',
    person:item?item.person:'',
    cascaded:false
  };
  // Store in localStorage as backup
  const existing=JSON.parse(localStorage.getItem('cc_ledger_actions')||'{"actions":[]}');
  existing.actions=existing.actions.filter(a=>a.text_hash!==hash);
  existing.actions.push(feedback);
  localStorage.setItem('cc_ledger_actions',JSON.stringify(existing));
  // POST to server API — writes to disk for DuckDB sync
  fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({actions:[feedback]})})
    .then(r=>r.json()).then(d=>{if(d.ok)console.log('Feedback synced to disk')})
    .catch(e=>console.warn('Feedback API unavailable, stored in localStorage',e));
  // Update pending count in UI
  const queue=JSON.parse(localStorage.getItem('cc_feedback_queue')||'{"pending":[]}');
  queue.pending=queue.pending.filter(p=>p.text_hash!==hash);
  queue.pending.push(feedback);
  localStorage.setItem('cc_feedback_queue',JSON.stringify(queue));
}
let ledgerTab='active';
function switchLedgerTab(tab){ledgerTab=tab;renderLedger(CC)}

/* ══ Ledger history (30-day rolling) ══ */
function getLedgerHistory(){return JSON.parse(localStorage.getItem('cc_ledger_history')||'{"entries":[]}')}
function saveLedgerHistory(h){localStorage.setItem('cc_ledger_history',JSON.stringify(h))}
function updateLedgerHistory(commitments){
  const hist=getLedgerHistory(),now=new Date(),cutoff=new Date(now.getTime()-30*24*60*60*1000);
  hist.entries=hist.entries.filter(e=>new Date(e.added_date)>=cutoff);
  const existing=new Set(hist.entries.map(e=>e.text));
  for(const c of commitments){
    if(!existing.has(c.text)){
      hist.entries.push({text:c.text,source:c.source||'',person:c.person||'',said_by:c.said_by||'',status:c.status||'not_started',added_date:now.toISOString(),days_old:c.days_old||0,overdue:c.overdue||false,context:c.context||'',quote:c.quote||''});
    } else {
      const ex=hist.entries.find(e=>e.text===c.text);
      if(ex){ex.days_old=c.days_old||ex.days_old;ex.overdue=c.overdue||ex.overdue;ex.context=c.context||ex.context}
    }
  }
  saveLedgerHistory(hist);return hist;
}



/* ══ Load data ══ */
fetch('data/command-center-data.json?'+Date.now()).then(r=>r.json()).then(cc=>{
  CC=cc;
  const dv=cc.generated||'',sv=localStorage.getItem('cc_data_version')||'';
  if(sv!==dv){['flags','differentiate','delegate','communicate'].forEach(k=>localStorage.removeItem('cc_d_'+k));localStorage.setItem('cc_data_version',dv)}
  const dataTsEl=document.getElementById('dataTs');
  dataTsEl.textContent='\u2022 Updated '+new Date(cc.generated).toLocaleString();
  /* Staleness indicator — #12: green <4h, yellow 4-12h, red >12h */
  const staleHours=(Date.now()-new Date(cc.generated).getTime())/3.6e6;
  dataTsEl.classList.remove('fresh','stale-warn','stale-danger');
  dataTsEl.classList.add(staleHours>12?'stale-danger':staleHours>4?'stale-warn':'fresh');
  document.getElementById('genTs').textContent='Generated: '+new Date().toLocaleString();
  updateLedgerHistory(cc.commitments||[]);
  renderHero(cc);renderToc();renderBlocks(cc);renderLedger(cc);renderIntel(cc);
  applyChangeBadges(cc);
}).catch(e=>{console.error(e);document.getElementById('blockSection').innerHTML='<div style="color:#f87171;padding:20px">Failed to load data</div>'});

/* ══ Hero ══ */
function renderHero(cc){
  let html='';

  /* WBR Health Score — one number, one trend arrow */
  const wbr=cc.wbr_health;
  if(wbr&&wbr.composite_score!=null){
    const score=wbr.composite_score;
    const scoreCls=score>=80?'score-high':score>=60?'score-mid':'score-low';
    const arrowMap={up:'\u25b2',down:'\u25bc',flat:'\u25b8'};
    const arrowCls={up:'arrow-up',down:'arrow-down',flat:'arrow-flat'};
    const arrow=arrowMap[wbr.trend]||'\u25b8';
    const cls=arrowCls[wbr.trend]||'arrow-flat';
    const deltaText=wbr.delta!=null&&wbr.delta!==0?(wbr.delta>0?'+':'')+wbr.delta:'\u2014';
    const dims=wbr.dimensions||{};
    const dimHtml=Object.entries(dims).map(([k,v])=>`<div class="wbr-dim"><div class="wbr-dim-val">${v}</div><div class="wbr-dim-label">${k.length>4?k.slice(0,4):k}</div></div>`).join('');
    html+=`<div class="wbr-health">
      <div><div class="wbr-score-label">WBR Health</div><div class="wbr-score-num ${scoreCls}">${score}</div><div class="wbr-score-sub">${wbr.week} \u00b7 ${wbr.market_count} markets</div></div>
      <div class="wbr-trend"><span class="${cls}">${arrow}</span><span class="wbr-trend-delta">${deltaText} vs ${wbr.prev_week||'\u2014'}</span></div>
      <div class="wbr-dims">${dimHtml}</div>
    </div>`;
  }

  /* Highest leverage item */
  const d=cc.differentiate;if(d&&d.length){const top=d[0];
    html+=`<div class="hero">
      <div class="hero-label">\u26a1 Highest Leverage</div>
      <div class="hero-text">${top.action}</div>
      <div class="hero-meta">${statusPill(top.status)}</div></div>`;
  }

  document.getElementById('heroSection').innerHTML=html;
}

/* ══ TOC ══ */
function renderToc(){
  document.getElementById('tocSection').innerHTML=`<span class="toc-label">Jump to</span>
    <a href="#sec-blocks">Blocks</a><span class="toc-sep">\u00b7</span>
    <a href="#sec-ledger">Ledger</a><span class="toc-sep">\u00b7</span>
    <a href="#sec-intel">Intelligence</a>`;
}

/* ══ Daily Blocks ══ */
function renderBlocks(cc){
  const cols=(cc.blocks||[]).map((b,bi)=>{
    const isOver=b.count>b.cap,countCls=isOver?'block-count over':'block-count';
    const info=[];if(b.today_count>0)info.push(b.today_count+' today');if(b.overdue_count>0)info.push(b.overdue_count+' overdue');
    const tasks=(b.tasks||[]).slice(0,8).map((t,ti)=>
      `<div class="task-row" onclick="openBlockDetail(${bi},${ti})"><span class="task-name">${t.name}${priBadge(t.priority)}${odBadge(t.days_overdue)}</span><span class="task-meta-inline">${t.project||''}</span></div>`
    ).join('');
    const wip=isOver?`<div class="wip-warning">\u26a0 Over capacity (${b.count}/${b.cap}) \u2014 defer, delegate, or drop</div>`:'';
    return`<div class="block-col"><div class="block-header"><span class="block-name">${b.name}</span><span class="${countCls}">${b.count}/${b.cap}</span></div>
      <div class="block-cap">${b.desc}${info.length?' \u2022 '+info.join(' \u2022 '):''}</div>
      <div class="block-tasks">${tasks||'<div style="color:#555;font-size:12px">Empty</div>'}</div>${wip}</div>`;
  }).join('');
  document.getElementById('blockSection').innerHTML=`<div class="section-label" id="sec-blocks">Daily Blocks</div><div class="unified-card"><div class="blocks-columns">${cols}</div></div>`;
}

/* ══ Actionable Intelligence — TABLE (exclusive categories, no commitments) ══ */
function typeBadge(type){
  const map={
    'Differentiate':'background:rgba(30,58,138,.25);color:#93b4f5',
    'Delegate':'background:rgba(113,63,18,.2);color:#d4b070',
    'Communicate':'background:rgba(6,78,59,.25);color:#4ade80'
  };
  const style=map[type]||'background:rgba(55,65,81,.3);color:#9ca3af';
  return `<span class="type-tag" style="${style}">${type}</span>`;
}

function renderIntel(cc){
  const rows=[];
  // Order: Communicate first (avoidance pattern), Delegate second (leverage), Differentiate last (reward)
  (cc.communicate||[]).forEach((item,i)=>{
    rows.push({section:'communicate',idx:i,text:item.text,type:'Communicate',audience:item.audience||'',context:item.context||''});
  });
  (cc.delegate||[]).forEach((item,i)=>{
    rows.push({section:'delegate',idx:i,text:item.task,type:'Delegate',audience:item.to||'',context:item.reason||item.context||''});
  });
  (cc.differentiate||[]).filter(i=>i.status!=='done').forEach((item,i)=>{
    rows.push({section:'differentiate',idx:i,text:item.action,type:'Differentiate',audience:'',context:item.why||item.context||''});
  });

  const dismissed=getDismissed('intel');
  const visible=rows.filter(r=>!dismissed.includes(r.section+'-'+r.idx));

  let tbody='';
  if(!visible.length){
    tbody=`<tr><td colspan="5" class="empty-row">All clear — nothing actionable right now</td></tr>`;
  } else {
    visible.forEach(r=>{
      const dismissId=r.section+'-'+r.idx;
      tbody+=`<tr onclick="openDetail('${r.section}',${r.idx})">
        <td class="td-text">${r.text}</td>
        <td class="td-type">${typeBadge(r.type)}</td>
        <td class="td-meta">${r.audience}</td>
        <td class="td-context">${r.context}</td>
        <td style="width:30px"><button class="tbl-btn tbl-dismiss" onclick="event.stopPropagation();dismissIntelItem('${esc(dismissId)}')" title="Dismiss">\u00d7</button></td>
      </tr>`;
    });
  }

  document.getElementById('intelSection').innerHTML=`
    <div class="section-label" id="sec-intel">Actionable Intelligence <span style="font-size:11px;color:#555;font-weight:400;text-transform:none;letter-spacing:0">(${visible.length} items)</span></div>
    <div class="unified-card"><div class="tbl-wrap"><table class="dtable">
      <thead><tr><th>Item</th><th>Type</th><th>Audience</th><th>Context</th><th></th></tr></thead>
      <tbody>${tbody}</tbody>
    </table></div></div>`;
}
function dismissIntelItem(id){
  const d=getDismissed('intel');if(!d.includes(id))d.push(id);setDismissed('intel',d);renderIntel(CC);
}

/* ══ Integrity Ledger — TABBED TABLE (commitments only, exclusive) ══ */
function renderLedger(cc){
  const allCommitments=cc.commitments||[];
  const ls=getLedgerState();

  const active=[],completed=[],dismissed=[];
  allCommitments.forEach((c,i)=>{
    const id=c.text_hash||c.text;
    const obj={...c,_idx:i,_id:id};
    if(ls.done.includes(id)||c.status==='done') completed.push(obj);
    else if(ls.dismissed.includes(id)||c.status==='dismissed') dismissed.push(obj);
    else active.push(obj);
  });

  CC.commitments=allCommitments;
  CC.completed_commitments=completed;
  CC.dismissed_commitments=dismissed;

  const total=allCommitments.length,doneN=completed.length;
  const pct=total?Math.round(doneN/total*100):0;
  const pctColor=pct>=70?'g':pct>=40?'y':'b';
  const overdueActive=active.filter(c=>c.overdue||c.days_old>5);
  const avgAge=active.length?Math.round(active.reduce((s,c)=>s+(c.days_old||0),0)/active.length):0;

  const tabs=[
    {id:'active',label:'Active',count:active.length},
    {id:'completed',label:'Completed',count:completed.length},
    {id:'dismissed',label:'Dismissed',count:dismissed.length},
  ];
  const tabHtml=tabs.map(t=>`<button class="tab-btn${ledgerTab===t.id?' active':''}" onclick="switchLedgerTab('${t.id}')">${t.label}<span class="tab-count">${t.count}</span></button>`).join('');

  let tbody='';
  function commitRow(c,actions){
    const initHtml=initBadge(c.said_by,c.person);
    const srcShort=(c.source||'').replace(/^Slack /,'').replace(/^Asana /,'');
    const ageColor=c.days_old>5?'b':c.days_old>2?'y':'w';
    return`<tr onclick="openDetail('commitments',${c._idx})">
      <td style="width:30px;text-align:center">${actions}</td>
      <td class="td-text">${c.text}</td>
      <td class="td-meta">${initHtml}</td>
      <td class="td-meta">${srcShort}</td>
      <td class="td-meta"><span class="${ageColor}">${c.days_old||0}d</span></td>
      <td class="td-context">${c.context||''}</td>
    </tr>`;
  }

  if(ledgerTab==='active'){
    if(!active.length) tbody=`<tr><td colspan="7" class="empty-row">No active commitments — clean slate</td></tr>`;
    else active.forEach(c=>{
      const actions=`<button class="tbl-btn tbl-check" onclick="event.stopPropagation();markCommitmentDone('${esc(c._id)}')" title="Mark done">\u25cb</button>`;
      const dismissBtn=`<button class="tbl-btn tbl-dismiss" onclick="event.stopPropagation();dismissCommitment('${esc(c._id)}')" title="Dismiss">\u00d7</button>`;
      tbody+=commitRow(c,actions).replace('</tr>',`<td style="width:30px">${dismissBtn}</td></tr>`);
    });
  } else if(ledgerTab==='completed'){
    if(!completed.length) tbody=`<tr><td colspan="7" class="empty-row">No completed commitments yet</td></tr>`;
    else completed.forEach(c=>{
      const actions=`<span style="color:#4ade80">\u2713</span>`;
      const restoreBtn=`<button class="tbl-btn tbl-restore" onclick="event.stopPropagation();restoreCommitment('${esc(c._id)}')" title="Restore to active">\u21a9</button>`;
      tbody+=commitRow(c,actions).replace('</tr>',`<td style="width:30px">${restoreBtn}</td></tr>`);
    });
  } else {
    if(!dismissed.length) tbody=`<tr><td colspan="7" class="empty-row">No dismissed commitments</td></tr>`;
    else dismissed.forEach(c=>{
      const actions=`<span style="color:#666">\u2014</span>`;
      const restoreBtn=`<button class="tbl-btn tbl-restore" onclick="event.stopPropagation();restoreCommitment('${esc(c._id)}')" title="Restore to active">\u21a9</button>`;
      tbody+=commitRow(c,actions).replace('</tr>',`<td style="width:30px">${restoreBtn}</td></tr>`);
    });
  }

  const pendingQueue=JSON.parse(localStorage.getItem('cc_feedback_queue')||'{"pending":[]}');
  const pendingCount=pendingQueue.pending.filter(p=>!p.cascaded).length;
  const pendingBadge=pendingCount?` <span style="font-size:11px;color:#d4b070;background:rgba(113,63,18,.2);padding:1px 6px;border-radius:3px">${pendingCount} pending sync</span>`:'';

  document.getElementById('ledgerSection').innerHTML=`
    <div class="section-label" id="sec-ledger">Integrity Ledger <span style="font-size:11px;color:#555;font-weight:400;text-transform:none;letter-spacing:0">(${total} total)</span>${pendingBadge}</div>
    <div class="unified-card">
      <div class="ledger-stats">
        <div class="lstat"><div class="num ${pctColor}">${pct}%</div><div class="label">Promises Kept</div><div class="sub">${doneN}/${total}</div></div>
        <div class="lstat"><div class="num">${active.length}</div><div class="label">Active</div><div class="sub">open commitments</div></div>
        <div class="lstat"><div class="num ${overdueActive.length>2?'b':overdueActive.length?'y':'g'}">${overdueActive.length}</div><div class="label">Aging (5d+)</div><div class="sub">avg ${avgAge}d</div></div>
        <div class="lstat"><div class="num">${dismissed.length}</div><div class="label">Dismissed</div><div class="sub">not applicable</div></div>
      </div>
      <div class="tab-bar">${tabHtml}</div>
      <div class="tbl-wrap"><table class="dtable">
        <thead><tr><th style="width:30px"></th><th>Commitment</th><th>From</th><th>Source</th><th>Age</th><th>Context</th><th></th></tr></thead>
        <tbody>${tbody}</tbody>
      </table></div>
    </div>`;
}

function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}

/* ══ Change-since-last-look badges — #11 ══
 * Soul: Invisible over visible — badges appear only when something changed.
 * First visit: no badges (everything is "new" which is meaningless).
 * Updates cc_last_seen after 5s so badges persist long enough to notice.
 */
function getLastSeen(){try{return JSON.parse(localStorage.getItem('cc_last_seen'))}catch(e){return null}}
function saveLastSeen(snapshot){localStorage.setItem('cc_last_seen',JSON.stringify(snapshot))}

function buildSnapshot(cc){
  return{
    ts:cc.generated||'',
    blocks_count:(cc.blocks||[]).reduce(function(s,b){return s+b.count},0),
    blocks_tasks:(cc.blocks||[]).reduce(function(s,b){return s+(b.tasks||[]).length},0),
    commitments_count:(cc.commitments||[]).length,
    commitments_hashes:(cc.commitments||[]).map(function(c){return c.text_hash||c.text}).sort().join(','),
    intel_count:(cc.communicate||[]).length+(cc.delegate||[]).length+(cc.differentiate||[]).filter(function(d){return d.status!=='done'}).length,
    communicate_count:(cc.communicate||[]).length,
    delegate_count:(cc.delegate||[]).length,
    differentiate_count:(cc.differentiate||[]).filter(function(d){return d.status!=='done'}).length,
    overdue_count:cc.total_overdue||0,
    wbr_score:cc.wbr_health&&cc.wbr_health.composite_score!=null?cc.wbr_health.composite_score:null
  };
}

function computeChangeBadges(prev,curr){
  var badges={};
  if(!prev)return badges; // first visit — no badges

  // Daily Blocks
  var blockDiff=curr.blocks_count-prev.blocks_count;
  if(blockDiff>0)badges.blocks=blockDiff+' new';
  else if(blockDiff<0)badges.blocks=Math.abs(blockDiff)+' cleared';
  else if(curr.blocks_tasks!==prev.blocks_tasks)badges.blocks='updated';

  // Integrity Ledger
  var ledgerDiff=curr.commitments_count-prev.commitments_count;
  if(ledgerDiff>0)badges.ledger=ledgerDiff+' new';
  else if(ledgerDiff<0)badges.ledger=Math.abs(ledgerDiff)+' resolved';
  else if(curr.commitments_hashes!==prev.commitments_hashes)badges.ledger='updated';

  // Actionable Intelligence
  var intelDiff=curr.intel_count-prev.intel_count;
  if(intelDiff>0)badges.intel=intelDiff+' new';
  else if(intelDiff<0)badges.intel=Math.abs(intelDiff)+' cleared';
  else{
    // Check sub-category changes
    var subChanged=curr.communicate_count!==prev.communicate_count||curr.delegate_count!==prev.delegate_count||curr.differentiate_count!==prev.differentiate_count;
    if(subChanged)badges.intel='updated';
  }

  // WBR Health (shown in hero area)
  if(curr.wbr_score!==null&&prev.wbr_score!==null&&curr.wbr_score!==prev.wbr_score){
    var delta=curr.wbr_score-prev.wbr_score;
    badges.wbr=(delta>0?'+':'')+delta.toFixed(1);
  }

  return badges;
}

function injectBadge(sectionEl,text){
  if(!sectionEl||!text)return;
  var badge=document.createElement('span');
  badge.className='change-badge';
  badge.textContent=text;
  sectionEl.appendChild(badge);
}

function applyChangeBadges(cc){
  var prev=getLastSeen();
  var curr=buildSnapshot(cc);
  var badges=computeChangeBadges(prev,curr);

  // Inject badges into section headers (rendered by this point)
  if(badges.blocks)injectBadge(document.getElementById('sec-blocks'),badges.blocks);
  if(badges.ledger)injectBadge(document.getElementById('sec-ledger'),badges.ledger);
  if(badges.intel)injectBadge(document.getElementById('sec-intel'),badges.intel);

  // Schedule last_seen update after 5 seconds of viewing
  // Not on immediate load — badges persist long enough to be noticed
  setTimeout(function(){saveLastSeen(curr)},5000);
}
</script>

  if (document.readyState === 'loading') {

    setTimeout(tryApply, 500);
  }
})();
